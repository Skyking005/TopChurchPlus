<script>
let lineBotDashboard = null;
let lineBotActiveTab = 'dashboard';
let lineBotUsersState = { page: 1, pageSize: 20, total: 0, rows: [] };
let lineBotLinksState = { page: 1, pageSize: 20, total: 0, rows: [] };
let lineBotEventsState = { page: 1, pageSize: 20, total: 0, rows: [] };
let lineBotModules = [];
let lineBotChannels = [];
let lineBotRichMenus = [];

function openLineBotSystem() {
  recordFeatureUsage('linebot');
  document.getElementById('mainTitle').textContent = 'LINE BOT 管理系統';
  hideAllMainViews();
  document.getElementById('lineBotView').classList.remove('d-none');
  switchLineBotTab('dashboard');
  loadLineBotDashboard();
}

function switchLineBotTab(tab) {
  lineBotActiveTab = tab;
  document.querySelectorAll('[data-linebot-tab]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.linebotTab === tab);
  });
  ['dashboard', 'users', 'settings', 'links', 'richMenus', 'modules', 'events'].forEach(key => {
    document.getElementById(`lineBot${capitalizeLineBotKey(key)}Pane`).classList.toggle('d-none', key !== tab);
  });
  if (tab === 'users') loadLineBotUsers(lineBotUsersState.page || 1);
  if (tab === 'settings') loadLineBotChannels();
  if (tab === 'links') loadLineBotLinks(lineBotLinksState.page || 1);
  if (tab === 'richMenus') loadLineBotRichMenus();
  if (tab === 'modules') loadLineBotModules();
  if (tab === 'events') loadLineBotEvents(lineBotEventsState.page || 1);
}

function loadLineBotDashboard() {
  document.getElementById('lineBotBoundMembers').textContent = '...';
  document.getElementById('lineBotUsers').textContent = '...';
  document.getElementById('lineBotActiveLinks').textContent = '...';
  document.getElementById('lineBotLastInteraction').textContent = '...';
  setListLoading('lineBotChurchStatsBody', true, 'LINE 綁定資料載入中...');
  google.script.run
    .withSuccessHandler(data => {
      lineBotDashboard = data || {};
      renderLineBotDashboard();
    })
    .withFailureHandler(showError)
    .getLineBotDashboard(currentUser);
}

function renderLineBotDashboard() {
  document.getElementById('lineBotBoundMembers').textContent = lineBotDashboard.boundMemberCount || 0;
  document.getElementById('lineBotUsers').textContent = lineBotDashboard.lineUserCount || 0;
  document.getElementById('lineBotActiveLinks').textContent = lineBotDashboard.activeLinkCount || 0;
  document.getElementById('lineBotLastInteraction').textContent = formatLineBotDateTime(lineBotDashboard.lastInteractionAt) || '尚無互動';
  renderLineBotChurchStats(lineBotDashboard.churchStats || []);
  renderLineBotFeatureList(lineBotDashboard.features?.rows || lineBotDashboard.features || [], 'lineBotFeatureList', false);
}

function renderLineBotChurchStats(rows) {
  const body = document.getElementById('lineBotChurchStatsBody');
  body.innerHTML = '';
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="4" class="text-muted text-center py-3">尚無會堂綁定統計</td></tr>';
    return;
  }
  rows.forEach(row => {
    const rate = row.memberCount ? Math.round((row.boundCount / row.memberCount) * 1000) / 10 : 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(row.churchName)}</td>
      <td class="text-end">${escapeHtml(row.memberCount)}</td>
      <td class="text-end">${escapeHtml(row.boundCount)}</td>
      <td class="text-end">${escapeHtml(rate)}%</td>
    `;
    body.appendChild(tr);
  });
}

function loadLineBotUsers(page = 1) {
  lineBotUsersState.page = page;
  setListLoading('lineBotUsersBody', true, 'LINE 綁定名單載入中...');
  google.script.run
    .withSuccessHandler(data => {
      lineBotUsersState = Object.assign({ page, pageSize: 20, total: 0, rows: [] }, data || {});
      renderLineBotUsers();
    })
    .withFailureHandler(showError)
    .getLineBotUsers({
      keyword: document.getElementById('lineBotUserKeyword').value,
      binding: document.getElementById('lineBotUserBinding').value,
      page,
      pageSize: 20
    }, currentUser);
}

function renderLineBotUsers() {
  const body = document.getElementById('lineBotUsersBody');
  body.innerHTML = '';
  if (!lineBotUsersState.rows.length) {
    body.innerHTML = '<tr><td colspan="5" class="text-muted text-center py-4">沒有符合條件的會友綁定資料</td></tr>';
  } else {
    lineBotUsersState.rows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(row.memberName || '')}</td>
        <td>${escapeHtml(row.churchName || '')}</td>
        <td>${escapeHtml(row.lineDisplayName || '')}</td>
        <td><code>${escapeHtml(row.lineUserId || '未綁定')}</code></td>
        <td>${escapeHtml(formatLineBotDateTime(row.lastInteractionAt) || '')}</td>
      `;
      body.appendChild(tr);
    });
  }
  renderLineBotPager('lineBotUsersPager', lineBotUsersState, 'loadLineBotUsers');
}

function loadLineBotChannels() {
  setListLoading('lineBotChannelsBody', true, 'LINE Channel 設定載入中...');
  google.script.run
    .withSuccessHandler(data => {
      lineBotChannels = data?.rows || [];
      renderLineBotChannels();
    })
    .withFailureHandler(showError)
    .getLineBotChannels(currentUser);
}

function renderLineBotChannels() {
  const body = document.getElementById('lineBotChannelsBody');
  const canEdit = getFeatureAccess('linebot') === 'edit';
  body.innerHTML = '';
  document.getElementById('saveLineBotChannelBtn').classList.toggle('d-none', !canEdit);
  if (!lineBotChannels.length) {
    body.innerHTML = '<tr><td colspan="7" class="text-muted text-center py-4">尚未建立 LINE Channel 設定</td></tr>';
    return;
  }
  lineBotChannels.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="fw-semibold">${escapeHtml(row.channelName)}</div>
        <div class="text-muted small">${escapeHtml(row.channelKey)}</div>
      </td>
      <td>${escapeHtml(formatLineBotChannelType(row.channelType))}</td>
      <td>${row.webhookUrl ? `<a href="${escapeAttr(row.webhookUrl)}" target="_blank" rel="noopener">${escapeHtml(truncateLineBotText(row.webhookUrl, 42))}</a>` : ''}</td>
      <td>${formatLineBotSecretStatus(row.hasChannelAccessToken)}</td>
      <td>${formatLineBotSecretStatus(row.hasChannelSecret)}</td>
      <td>${row.isActive ? '<span class="badge bg-success">啟用</span>' : '<span class="badge bg-secondary">停用</span>'}</td>
      <td>${canEdit ? `<button type="button" class="btn btn-sm btn-outline-primary" onclick="editLineBotChannel('${escapeAttr(row.channelId)}')">編輯</button>` : ''}</td>
    `;
    body.appendChild(tr);
  });
}

function editLineBotChannel(channelId) {
  const row = lineBotChannels.find(item => String(item.channelId) === String(channelId));
  if (!row) return;
  document.getElementById('lineBotChannelId').value = row.channelId;
  document.getElementById('lineBotChannelKey').value = row.channelKey || '';
  document.getElementById('lineBotChannelName').value = row.channelName || '';
  document.getElementById('lineBotChannelType').value = row.channelType || 'official';
  document.getElementById('lineBotWebhookUrl').value = row.webhookUrl || '';
  document.getElementById('lineBotLoginRedirectUri').value = row.loginRedirectUri || '';
  document.getElementById('lineBotLiffRollcall').value = row.liffIds?.rollcall || '';
  document.getElementById('lineBotLiffSpiritualLife').value = row.liffIds?.spiritualLife || '';
  document.getElementById('lineBotLiffSelfCheckIn').value = row.liffIds?.selfCheckIn || '';
  document.getElementById('lineBotLiffQtOrder').value = row.liffIds?.qtOrder || '';
  document.getElementById('lineBotRichMenuUnbound').value = row.richMenuIds?.unbound || '';
  document.getElementById('lineBotRichMenuBound').value = row.richMenuIds?.bound || '';
  document.getElementById('lineBotRichMenuAdvanced').value = row.richMenuIds?.advanced || '';
  document.getElementById('lineBotChannelIsActive').checked = row.isActive !== false;
  ['lineBotChannelAccessToken', 'lineBotChannelSecret', 'lineBotLoginClientId', 'lineBotLoginClientSecret', 'lineBotNotifyAdministrative', 'lineBotNotifyCheckInOut'].forEach(id => {
    document.getElementById(id).value = '';
  });
  setLineBotSecretStatus('lineBotChannelAccessTokenStatus', row.hasChannelAccessToken);
  setLineBotSecretStatus('lineBotChannelSecretStatus', row.hasChannelSecret);
  setLineBotSecretStatus('lineBotLoginClientIdStatus', row.hasLoginClientId);
  setLineBotSecretStatus('lineBotLoginClientSecretStatus', row.hasLoginClientSecret);
  setLineBotSecretStatus('lineBotNotifyAdministrativeStatus', row.hasAdministrativeNotifyToken);
  setLineBotSecretStatus('lineBotNotifyCheckInOutStatus', row.hasCheckInOutNotifyToken);
}

function submitLineBotChannel() {
  const btn = document.getElementById('saveLineBotChannelBtn');
  const errorBox = document.getElementById('lineBotChannelError');
  errorBox.textContent = '';
  const channelId = document.getElementById('lineBotChannelId').value;
  const channel = {
    channelId,
    channelKey: document.getElementById('lineBotChannelKey').value.trim(),
    channelName: document.getElementById('lineBotChannelName').value.trim(),
    channelType: document.getElementById('lineBotChannelType').value,
    webhookUrl: document.getElementById('lineBotWebhookUrl').value.trim(),
    channelAccessToken: document.getElementById('lineBotChannelAccessToken').value.trim(),
    channelSecret: document.getElementById('lineBotChannelSecret').value.trim(),
    loginClientId: document.getElementById('lineBotLoginClientId').value.trim(),
    loginClientSecret: document.getElementById('lineBotLoginClientSecret').value.trim(),
    loginRedirectUri: document.getElementById('lineBotLoginRedirectUri').value.trim(),
    liffIds: {
      rollcall: document.getElementById('lineBotLiffRollcall').value.trim(),
      spiritualLife: document.getElementById('lineBotLiffSpiritualLife').value.trim(),
      selfCheckIn: document.getElementById('lineBotLiffSelfCheckIn').value.trim(),
      qtOrder: document.getElementById('lineBotLiffQtOrder').value.trim()
    },
    richMenuIds: {
      unbound: document.getElementById('lineBotRichMenuUnbound').value.trim(),
      bound: document.getElementById('lineBotRichMenuBound').value.trim(),
      advanced: document.getElementById('lineBotRichMenuAdvanced').value.trim()
    },
    notifyTokens: {
      administrative: document.getElementById('lineBotNotifyAdministrative').value.trim(),
      checkInOut: document.getElementById('lineBotNotifyCheckInOut').value.trim()
    },
    isActive: document.getElementById('lineBotChannelIsActive').checked
  };
  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      alert(res.message);
      resetLineBotChannelSecrets();
      loadLineBotChannels();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .saveLineBotChannel({ channelId, channel, currentUser });
}

function resetLineBotChannelSecrets() {
  ['lineBotChannelAccessToken', 'lineBotChannelSecret', 'lineBotLoginClientId', 'lineBotLoginClientSecret', 'lineBotNotifyAdministrative', 'lineBotNotifyCheckInOut'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function loadLineBotLinks(page = 1) {
  lineBotLinksState.page = page;
  setListLoading('lineBotLinksBody', true, 'LINE 連結載入中...');
  google.script.run
    .withSuccessHandler(data => {
      lineBotLinksState = Object.assign({ page, pageSize: 20, total: 0, rows: [] }, data || {});
      renderLineBotLinks();
    })
    .withFailureHandler(showError)
    .getLineBotLinks({
      keyword: document.getElementById('lineBotLinkKeyword').value,
      page,
      pageSize: 20
    }, currentUser);
}

function renderLineBotLinks() {
  const body = document.getElementById('lineBotLinksBody');
  const canEdit = getFeatureAccess('linebot') === 'edit';
  body.innerHTML = '';
  document.getElementById('saveLineBotLinkBtn').classList.toggle('d-none', !canEdit);
  if (!lineBotLinksState.rows.length) {
    body.innerHTML = '<tr><td colspan="6" class="text-muted text-center py-4">尚無 LINE 連結</td></tr>';
  } else {
    lineBotLinksState.rows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(row.title)}</td>
        <td><a href="${escapeAttr(row.url)}" target="_blank" rel="noopener">${escapeHtml(truncateLineBotText(row.url, 54))}</a></td>
        <td>${escapeHtml(formatLineBotLinkType(row.linkType))}</td>
        <td>${escapeHtml(formatLineBotVisibility(row.visibility))}</td>
        <td>${row.isActive ? '<span class="badge bg-success">啟用</span>' : '<span class="badge bg-secondary">停用</span>'}</td>
        <td>
          ${canEdit ? `<button type="button" class="btn btn-sm btn-outline-primary" onclick="editLineBotLink('${escapeAttr(row.linkId)}')">編輯</button>` : ''}
          ${canEdit && row.isActive ? `<button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteLineBotLinkItem('${escapeAttr(row.linkId)}')">停用</button>` : ''}
        </td>
      `;
      body.appendChild(tr);
    });
  }
  renderLineBotPager('lineBotLinksPager', lineBotLinksState, 'loadLineBotLinks');
}

function submitLineBotLink() {
  const btn = document.getElementById('saveLineBotLinkBtn');
  const errorBox = document.getElementById('lineBotLinkError');
  errorBox.textContent = '';
  const linkId = document.getElementById('lineBotLinkId').value;
  const link = {
    linkId,
    title: document.getElementById('lineBotLinkTitle').value.trim(),
    url: document.getElementById('lineBotLinkUrl').value.trim(),
    linkType: document.getElementById('lineBotLinkType').value,
    visibility: document.getElementById('lineBotLinkVisibility').value,
    note: document.getElementById('lineBotLinkNote').value.trim(),
    sortOrder: Number(document.getElementById('lineBotLinkSortOrder').value || 100),
    isActive: document.getElementById('lineBotLinkIsActive').checked
  };
  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      resetLineBotLinkForm();
      loadLineBotLinks(1);
      alert(res.message);
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .saveLineBotLink({ linkId, link, currentUser });
}

function editLineBotLink(linkId) {
  const row = lineBotLinksState.rows.find(item => String(item.linkId) === String(linkId));
  if (!row) return;
  document.getElementById('lineBotLinkId').value = row.linkId;
  document.getElementById('lineBotLinkTitle').value = row.title || '';
  document.getElementById('lineBotLinkUrl').value = row.url || '';
  document.getElementById('lineBotLinkType').value = row.linkType || 'form';
  document.getElementById('lineBotLinkVisibility').value = row.visibility || 'public';
  document.getElementById('lineBotLinkNote').value = row.note || '';
  document.getElementById('lineBotLinkSortOrder').value = row.sortOrder || 100;
  document.getElementById('lineBotLinkIsActive').checked = row.isActive !== false;
}

function deleteLineBotLinkItem(linkId) {
  if (!confirm('確定要停用此 LINE 連結？')) return;
  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      loadLineBotLinks(lineBotLinksState.page || 1);
    })
    .withFailureHandler(showError)
    .deleteLineBotLink({ linkId, currentUser });
}

function resetLineBotLinkForm() {
  document.getElementById('lineBotLinkId').value = '';
  document.getElementById('lineBotLinkTitle').value = '';
  document.getElementById('lineBotLinkUrl').value = '';
  document.getElementById('lineBotLinkType').value = 'form';
  document.getElementById('lineBotLinkVisibility').value = 'public';
  document.getElementById('lineBotLinkNote').value = '';
  document.getElementById('lineBotLinkSortOrder').value = '100';
  document.getElementById('lineBotLinkIsActive').checked = true;
}

function loadLineBotModules() {
  const box = document.getElementById('lineBotModulesBody');
  box.innerHTML = '<div class="list-loading-box"><span class="spinner-border spinner-border-sm me-2"></span>BOT 模組載入中...</div>';
  google.script.run
    .withSuccessHandler(data => {
      lineBotModules = data?.rows || [];
      renderLineBotFeatureList(lineBotModules, 'lineBotModulesBody', getFeatureAccess('linebot') === 'edit');
    })
    .withFailureHandler(showError)
    .getLineBotModules(currentUser);
}

function loadLineBotRichMenus() {
  setListLoading('lineBotRichMenusBody', true, 'Rich Menu 設定載入中...');
  google.script.run
    .withSuccessHandler(data => {
      lineBotRichMenus = data?.rows || [];
      renderLineBotRichMenus();
    })
    .withFailureHandler(showError)
    .getLineBotRichMenus(currentUser);
}

function renderLineBotRichMenus() {
  const body = document.getElementById('lineBotRichMenusBody');
  const canEdit = getFeatureAccess('linebot') === 'edit';
  body.innerHTML = '';
  document.getElementById('saveLineBotRichMenuBtn').classList.toggle('d-none', !canEdit);
  if (!lineBotRichMenus.length) {
    body.innerHTML = '<tr><td colspan="5" class="text-muted text-center py-4">尚未建立 Rich Menu 設定</td></tr>';
    return;
  }
  lineBotRichMenus.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(row.menuName)}</td>
      <td><code>${escapeHtml(row.lineRichMenuId || '')}</code></td>
      <td>${escapeHtml(formatLineBotAudienceType(row.audienceType))}</td>
      <td>${escapeHtml(formatLineBotRichMenuStatus(row.status))}</td>
      <td>${canEdit ? `<button type="button" class="btn btn-sm btn-outline-primary" onclick="editLineBotRichMenu('${escapeAttr(row.richMenuId)}')">編輯</button>` : ''}</td>
    `;
    body.appendChild(tr);
  });
}

function submitLineBotRichMenu() {
  const btn = document.getElementById('saveLineBotRichMenuBtn');
  const errorBox = document.getElementById('lineBotRichMenuError');
  errorBox.textContent = '';
  const richMenuId = document.getElementById('lineBotRichMenuId').value;
  const richMenu = {
    richMenuId,
    menuName: document.getElementById('lineBotRichMenuName').value.trim(),
    lineRichMenuId: document.getElementById('lineBotRichMenuLineId').value.trim(),
    audienceType: document.getElementById('lineBotRichMenuAudienceType').value,
    audienceNote: document.getElementById('lineBotRichMenuAudienceNote').value.trim(),
    status: document.getElementById('lineBotRichMenuStatus').value,
    sortOrder: Number(document.getElementById('lineBotRichMenuSortOrder').value || 100)
  };
  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      alert(res.message);
      resetLineBotRichMenuForm();
      loadLineBotRichMenus();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .saveLineBotRichMenu({ richMenuId, richMenu, currentUser });
}

function editLineBotRichMenu(richMenuId) {
  const row = lineBotRichMenus.find(item => String(item.richMenuId) === String(richMenuId));
  if (!row) return;
  document.getElementById('lineBotRichMenuId').value = row.richMenuId;
  document.getElementById('lineBotRichMenuName').value = row.menuName || '';
  document.getElementById('lineBotRichMenuLineId').value = row.lineRichMenuId || '';
  document.getElementById('lineBotRichMenuAudienceType').value = row.audienceType || 'bound';
  document.getElementById('lineBotRichMenuAudienceNote').value = row.audienceRule?.note || '';
  document.getElementById('lineBotRichMenuStatus').value = row.status || 'draft';
  document.getElementById('lineBotRichMenuSortOrder').value = row.sortOrder || 100;
}

function resetLineBotRichMenuForm() {
  document.getElementById('lineBotRichMenuId').value = '';
  document.getElementById('lineBotRichMenuName').value = '';
  document.getElementById('lineBotRichMenuLineId').value = '';
  document.getElementById('lineBotRichMenuAudienceType').value = 'bound';
  document.getElementById('lineBotRichMenuAudienceNote').value = '';
  document.getElementById('lineBotRichMenuStatus').value = 'draft';
  document.getElementById('lineBotRichMenuSortOrder').value = '100';
}

function renderLineBotFeatureList(features, elementId, editable) {
  const box = document.getElementById(elementId);
  box.innerHTML = '';
  if (!features.length) {
    box.innerHTML = '<div class="linebot-placeholder">尚未設定 BOT 功能模組。</div>';
    return;
  }
  features.forEach(feature => {
    const item = document.createElement('div');
    item.className = 'linebot-feature-item';
    item.innerHTML = `
      <div>
        <div class="fw-semibold">${escapeHtml(feature.title)}</div>
        <div class="text-muted small">${escapeHtml(feature.description)}</div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge ${feature.enabled ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary'}">${feature.enabled ? '啟用' : '停用'}</span>
        ${editable ? `<div class="form-check form-switch m-0"><input class="form-check-input" type="checkbox" ${feature.enabled ? 'checked' : ''} onchange="toggleLineBotModule('${escapeAttr(feature.key)}', this.checked)"></div>` : ''}
      </div>
    `;
    box.appendChild(item);
  });
}

function toggleLineBotModule(moduleKey, enabled) {
  google.script.run
    .withSuccessHandler(() => loadLineBotModules())
    .withFailureHandler(showError)
    .updateLineBotModule({ moduleKey, module: { enabled }, currentUser });
}

function loadLineBotEvents(page = 1) {
  lineBotEventsState.page = page;
  setListLoading('lineBotEventsBody', true, 'LINE 事件紀錄載入中...');
  google.script.run
    .withSuccessHandler(data => {
      lineBotEventsState = Object.assign({ page, pageSize: 20, total: 0, rows: [] }, data || {});
      renderLineBotEvents();
    })
    .withFailureHandler(showError)
    .getLineBotEvents({
      keyword: document.getElementById('lineBotEventKeyword').value,
      page,
      pageSize: 20
    }, currentUser);
}

function renderLineBotEvents() {
  const body = document.getElementById('lineBotEventsBody');
  body.innerHTML = '';
  if (!lineBotEventsState.rows.length) {
    body.innerHTML = '<tr><td colspan="6" class="text-muted text-center py-4">尚無 LINE webhook 事件紀錄</td></tr>';
  } else {
    lineBotEventsState.rows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(formatLineBotDateTime(row.receivedAt))}</td>
        <td>${escapeHtml(row.eventType)}</td>
        <td>${escapeHtml(row.messageType || '')}</td>
        <td><code>${escapeHtml(row.lineUserId || '')}</code></td>
        <td>${escapeHtml(formatLineBotEventStatus(row.handledStatus))}</td>
        <td>${escapeHtml(row.errorMessage || '')}</td>
      `;
      body.appendChild(tr);
    });
  }
  renderLineBotPager('lineBotEventsPager', lineBotEventsState, 'loadLineBotEvents');
}

function renderLineBotPager(elementId, state, fnName) {
  const box = document.getElementById(elementId);
  const page = Number(state.page || 1);
  const pageSize = Number(state.pageSize || 20);
  const total = Number(state.total || 0);
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  box.innerHTML = `
    <div class="text-muted small">共 ${escapeHtml(total)} 筆，第 ${escapeHtml(page)} / ${escapeHtml(totalPages)} 頁</div>
    <div class="btn-group">
      <button type="button" class="btn btn-sm btn-outline-secondary" ${page <= 1 ? 'disabled' : ''} onclick="${fnName}(${page - 1})">上一頁</button>
      <button type="button" class="btn btn-sm btn-outline-secondary" ${page >= totalPages ? 'disabled' : ''} onclick="${fnName}(${page + 1})">下一頁</button>
    </div>
  `;
}

function handleLineBotUsersSearchKey(event) {
  if (event.key === 'Enter') loadLineBotUsers(1);
}

function handleLineBotLinksSearchKey(event) {
  if (event.key === 'Enter') loadLineBotLinks(1);
}

function handleLineBotEventsSearchKey(event) {
  if (event.key === 'Enter') loadLineBotEvents(1);
}

function formatLineBotDateTime(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  const hh = String(date.getHours()).padStart(2, '0');
  const min = String(date.getMinutes()).padStart(2, '0');
  return `${yyyy}/${mm}/${dd} ${hh}:${min}`;
}

function capitalizeLineBotKey(value) {
  return String(value || '').charAt(0).toUpperCase() + String(value || '').slice(1);
}

function setLineBotSecretStatus(elementId, hasValue) {
  document.getElementById(elementId).textContent = hasValue ? '已設定；留空儲存不會覆蓋' : '尚未設定';
}

function formatLineBotSecretStatus(hasValue) {
  return hasValue ? '<span class="badge bg-success-subtle text-success">已設定</span>' : '<span class="badge bg-secondary-subtle text-secondary">未設定</span>';
}

function formatLineBotChannelType(value) {
