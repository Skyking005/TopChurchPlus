<div class="modal fade" id="permissionModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">新增專案管理權限</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">人員</label>
          <select id="permissionStaffId" class="form-select"></select>
        </div>

        <div class="mb-3">
          <label class="form-label">專案權限</label>
          <select id="permissionType" class="form-select"></select>
        </div>

        <div id="permissionModalError" class="text-danger small"></div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" id="confirmAddPermissionBtn" class="btn btn-primary" onclick="submitProjectPermission()">新增</button>
      </div>
    </div>
  </div>
</div>
