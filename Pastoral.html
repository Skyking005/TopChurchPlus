<div id="pastoralView" class="d-none">
  <div class="section-card">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h5 class="mb-1">牧養管理系統</h5>
        <div class="text-muted small">會友管理與牧區管理</div>
      </div>
      <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-primary active" id="pastoralMembersTabBtn" onclick="switchPastoralTab('members')">會友管理</button>
        <button type="button" class="btn btn-outline-primary" id="pastoralGroupsTabBtn" onclick="switchPastoralTab('groups')">牧區管理</button>
      </div>
    </div>

    <div id="pastoralMembersPanel">
      <div class="row g-2 align-items-end mb-3">
        <div class="col-12 col-lg-4">
          <label class="form-label">關鍵字</label>
          <input id="pastoralKeyword" class="form-control" placeholder="姓名、手機、Line、牧區" onkeydown="handlePastoralSearchKey(event)">
        </div>
        <div class="col-12 col-md-4 col-lg-2">
          <label class="form-label">會堂</label>
          <select id="pastoralChurchFilter" class="form-select"></select>
        </div>
        <div class="col-12 col-md-4 col-lg-2">
          <label class="form-label">分類</label>
          <select id="pastoralCategoryFilter" class="form-select"></select>
        </div>
        <div class="col-12 col-md-4 col-lg-3">
          <label class="form-label">牧區</label>
          <select id="pastoralGroupFilter" class="form-select"></select>
        </div>
        <div class="col-12 col-lg-1 d-grid">
          <button type="button" class="btn btn-primary" onclick="resetPastoralPageAndLoad()">搜尋</button>
        </div>
      </div>

      <div class="table-responsive d-none d-md-block">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>操作</th>
              <th>會堂</th>
              <th>建檔日期</th>
              <th>跟進同工</th>
              <th>燈號</th>
              <th>分類</th>
              <th>姓名</th>
              <th>信仰狀態</th>
              <th>婚姻</th>
              <th>生日</th>
              <th>電話</th>
              <th>地址</th>
              <th>社區</th>
            </tr>
          </thead>
          <tbody id="pastoralMemberTableBody"></tbody>
        </table>
      </div>

      <div id="mobilePastoralMemberList" class="d-md-none"></div>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <span id="pastoralPageInfo" class="text-muted small"></span>
        <div class="btn-group">
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="prevPastoralPage()">上一頁</button>
          <button type="button" class="btn btn-outline-secondary btn-sm disabled" id="pastoralPager">1 / 1</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="nextPastoralPage()">下一頁</button>
        </div>
      </div>
    </div>

    <div id="pastoralGroupsPanel" class="d-none">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>牧區</th>
              <th>類型</th>
              <th>會堂</th>
              <th>直屬人數</th>
            </tr>
          </thead>
          <tbody id="pastoralGroupTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="pastoralDetailPanel" class="section-card d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">會友資料</h5>
      <button type="button" class="btn btn-outline-secondary btn-sm" onclick="closePastoralDetailPanel()">全部關閉</button>
    </div>
    <ul id="pastoralDetailTabs" class="nav nav-tabs mb-3"></ul>

    <div class="row g-3">
      <div class="col-12 col-lg-4">
        <div class="pastoral-detail-block">
          <h6>基本資料</h6>
          <dl id="pastoralBasicInfo" class="detail-dl"></dl>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="pastoral-detail-block">
          <h6>聯絡資料</h6>
          <dl id="pastoralContactInfo" class="detail-dl"></dl>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="pastoral-detail-block">
          <h6>信仰與家庭</h6>
          <dl id="pastoralFaithInfo" class="detail-dl"></dl>
        </div>
      </div>
      <div class="col-12">
        <div class="pastoral-detail-block">
          <h6>最近關懷紀錄</h6>
          <div id="pastoralCareRecords" class="pastoral-care-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>
