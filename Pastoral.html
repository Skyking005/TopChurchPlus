<div id="pastoralView" class="d-none">
  <div class="section-card">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h5 class="mb-1">牧養管理系統</h5>
        <div class="text-muted small">會友管理與牧區管理</div>
      </div>
      <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-primary active" id="pastoralMembersTabBtn" onclick="switchPastoralTab('members')">會友管理</button>
        <button type="button" class="btn btn-outline-primary" id="pastoralGroupsTabBtn" onclick="switchPastoralTab('groups')">牧區管理</button>
      </div>
      <button type="button" class="btn btn-primary d-none" id="addPastoralMemberBtn" onclick="openPastoralMemberEditor()">新增會友</button>
    </div>

    <div id="pastoralMembersPanel">
      <div class="row g-2 align-items-end mb-3">
        <div class="col-12 col-lg-4">
          <label class="form-label">關鍵字</label>
          <input id="pastoralKeyword" class="form-control" placeholder="姓名、手機、Line、牧區" onkeydown="handlePastoralSearchKey(event)">
        </div>
        <div class="col-12 col-md-4 col-lg-2">
          <label class="form-label">會堂</label>
          <select id="pastoralChurchFilter" class="form-select"></select>
        </div>
        <div class="col-12 col-md-4 col-lg-2">
          <label class="form-label">分類</label>
          <select id="pastoralCategoryFilter" class="form-select"></select>
        </div>
        <div class="col-12 col-md-4 col-lg-3">
          <label class="form-label">牧區</label>
          <select id="pastoralGroupFilter" class="form-select"></select>
        </div>
        <div class="col-12 col-lg-1 d-grid">
          <button type="button" class="btn btn-primary" onclick="resetPastoralPageAndLoad()">搜尋</button>
        </div>
      </div>

      <div class="table-responsive d-none d-md-block">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>操作</th>
              <th>會堂</th>
              <th>建檔日期</th>
              <th>跟進同工</th>
              <th>燈號</th>
              <th>分類</th>
              <th>姓名</th>
              <th>信仰狀態</th>
              <th>婚姻</th>
              <th>生日</th>
              <th>電話</th>
              <th>地址</th>
              <th>社區</th>
            </tr>
          </thead>
          <tbody id="pastoralMemberTableBody"></tbody>
        </table>
      </div>

      <div id="mobilePastoralMemberList" class="d-md-none"></div>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <span id="pastoralPageInfo" class="text-muted small"></span>
        <div class="btn-group">
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="prevPastoralPage()">上一頁</button>
          <button type="button" class="btn btn-outline-secondary btn-sm disabled" id="pastoralPager">1 / 1</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="nextPastoralPage()">下一頁</button>
        </div>
      </div>
    </div>

    <div id="pastoralGroupsPanel" class="d-none">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>牧區</th>
              <th>類型</th>
              <th>會堂</th>
              <th>直屬人數</th>
            </tr>
          </thead>
          <tbody id="pastoralGroupTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="pastoralDetailPanel" class="section-card d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">會友資料</h5>
      <div class="btn-group">
        <button type="button" class="btn btn-outline-primary btn-sm d-none" id="editPastoralMemberBtn" onclick="editActivePastoralMember()">編輯</button>
        <button type="button" class="btn btn-outline-secondary btn-sm d-none" id="cancelPastoralEditBtn" onclick="cancelPastoralInlineEdit()">取消編輯</button>
        <button type="button" class="btn btn-outline-danger btn-sm d-none" id="deletePastoralMemberBtn" onclick="deleteActivePastoralMember()">停用</button>
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="closePastoralDetailPanel()">全部關閉</button>
      </div>
    </div>
    <ul id="pastoralDetailTabs" class="nav nav-tabs mb-3"></ul>

    <div id="pastoralDetailReadView" class="row g-3">
      <div class="col-12 col-lg-4">
        <div class="pastoral-detail-block">
          <h6>基本資料</h6>
          <dl id="pastoralBasicInfo" class="detail-dl"></dl>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="pastoral-detail-block">
          <h6>聯絡資料</h6>
          <dl id="pastoralContactInfo" class="detail-dl"></dl>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="pastoral-detail-block">
          <h6>信仰與家庭</h6>
          <dl id="pastoralFaithInfo" class="detail-dl"></dl>
        </div>
      </div>
      <div class="col-12">
        <div class="pastoral-detail-block">
          <h6>課程狀態</h6>
          <div id="pastoralEducationStatus" class="pastoral-care-list"></div>
        </div>
      </div>
      <div class="col-12">
        <div class="pastoral-detail-block">
          <h6>最近關懷紀錄</h6>
          <div id="pastoralCareRecords" class="pastoral-care-list"></div>
        </div>
      </div>
    </div>
    <div id="pastoralDetailEditView" class="d-none">
      <div class="pastoral-detail-block">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="mb-0" id="pastoralMemberEditorTitle">編輯會友</h6>
          <div class="btn-group">
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="cancelPastoralInlineEdit()">取消</button>
            <button type="button" class="btn btn-primary btn-sm" id="savePastoralMemberBtn" onclick="submitPastoralMember()">儲存</button>
          </div>
        </div>
        <input type="hidden" id="pastoralEditMemberId">
        <div class="row g-3">
            <div class="col-12 col-md-3">
              <label class="form-label">會堂</label>
              <select id="pastoralEditChurchId" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">姓名</label>
              <input id="pastoralEditName" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">性別</label>
              <select id="pastoralEditGender" class="form-select pastoral-edit-input">
                <option value="">未填</option>
                <option value="1">男</option>
                <option value="0">女</option>
              </select>
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">生日</label>
              <input id="pastoralEditBirthday" type="date" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">燈號</label>
              <select id="pastoralEditLightStatus" class="form-select pastoral-edit-input">
                <option value="">未填</option>
                <option value="0">灰燈</option>
                <option value="1">綠燈</option>
                <option value="2">黃燈</option>
                <option value="3">紅燈</option>
              </select>
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">分類</label>
              <select id="pastoralEditCategoryCode" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">職分</label>
              <select id="pastoralEditTitleId" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">職業</label>
              <select id="pastoralEditProfessionId" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">職業備註</label>
              <input id="pastoralEditProfessionNote" class="form-control pastoral-edit-input">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">婚姻</label>
              <select id="pastoralEditMaritalStatusId" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">跟進同工</label>
              <select id="pastoralEditFollowupStaffId" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">牧區</label>
              <select id="pastoralEditGroupId" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">建檔日期</label>
              <input id="pastoralEditCreatedDate" type="date" class="form-control pastoral-edit-input">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">手機</label>
              <input id="pastoralEditMobilePhone" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">住家電話</label>
              <input id="pastoralEditHomePhone" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">公司電話</label>
              <input id="pastoralEditOfficePhone" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">Email</label>
              <input id="pastoralEditEmail" type="email" class="form-control pastoral-edit-input">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">地區</label>
              <select id="pastoralEditRegionId" class="form-select pastoral-edit-input"></select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">城市</label>
              <input id="pastoralEditCity" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">行政區</label>
              <input id="pastoralEditDistrict" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">郵遞區號</label>
              <input id="pastoralEditPostalCode" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12">
              <label class="form-label">地址</label>
              <input id="pastoralEditAddressLine" class="form-control pastoral-edit-input">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">是否基督徒</label>
              <select id="pastoralEditIsChristian" class="form-select pastoral-edit-input">
                <option value="">未填</option>
                <option value="true">是</option>
                <option value="false">否</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">已決志</label>
              <select id="pastoralEditAcceptedChrist" class="form-select pastoral-edit-input">
                <option value="">未填</option>
                <option value="true">是</option>
                <option value="false">否</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">願意受洗</label>
              <select id="pastoralEditWillingBaptism" class="form-select pastoral-edit-input">
                <option value="">未填</option>
                <option value="true">是</option>
                <option value="false">否</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">受洗日期</label>
              <input id="pastoralEditBaptizedDate" type="date" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">原教會</label>
              <input id="pastoralEditPreviousChurchText" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">資料來源</label>
              <input id="pastoralEditSourceText" class="form-control pastoral-edit-input">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">配偶</label>
              <input id="pastoralEditSpouseText" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">父親</label>
              <input id="pastoralEditFatherText" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">母親</label>
              <input id="pastoralEditMotherText" class="form-control pastoral-edit-input">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label">子女</label>
              <input id="pastoralEditChildrenText" class="form-control pastoral-edit-input">
            </div>

            <div class="col-12">
              <label class="form-label">備註</label>
              <textarea id="pastoralEditNote" class="form-control pastoral-edit-input" rows="3"></textarea>
            </div>
        </div>
        <div id="pastoralMemberModalError" class="text-danger small mt-3"></div>
      </div>
    </div>
  </div>
</div>
