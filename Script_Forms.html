<script>
let forms = [];
let currentFormQuestions = [];
let currentFormDetail = null;
let currentFormResponsesFormId = '';
let formAttachmentModalInstance = null;

const FORM_TYPES = {
  survey: '問卷調查',
  event_registration: '活動報名',
  general: '一般表單'
};

const FORM_QUESTION_TYPES = [
  { value: 'short_text', label: '簡答' },
  { value: 'paragraph', label: '段落' },
  { value: 'single_choice', label: '單選' },
  { value: 'multiple_choice', label: '複選' },
  { value: 'dropdown', label: '下拉選單' },
  { value: 'date', label: '日期' },
  { value: 'number', label: '數字' },
  { value: 'image_upload', label: '圖片上傳' }
];

function openFormsSystem() {
  recordFeatureUsage('forms');
  const canEdit = getFeatureAccess('forms') === 'edit' && currentUser.deviceType !== 'mobile';
  isPublicFormMode = false;
  document.getElementById('mainTitle').textContent = '表單系統';
  ['featureSelectionView', 'overviewView', 'purchaseView', 'assetView', 'venueView', 'zoomView', 'pastoralView', 'attendanceView', 'meetingsView', 'educationView', 'qtView', 'lineBotView', 'qrcodeView', 'counterWorkbenchView', 'detailView', 'systemView'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });
  document.getElementById('formsView').classList.remove('d-none');
  document.getElementById('addFormBtn').classList.toggle('d-none', !canEdit);
  document.getElementById('saveFormBtn').classList.toggle('d-none', !canEdit);
  document.getElementById('deleteFormBtn').classList.toggle('d-none', !canEdit);
  document.getElementById('previewFormBtn').classList.toggle('d-none', !canEdit);
  document.getElementById('copyPublicFormLinkBtn').classList.toggle('d-none', !canEdit);
  document.getElementById('viewFormResponsesBtn').classList.toggle('d-none', !canEdit);
  document.getElementById('viewFormStatisticsBtn').classList.toggle('d-none', !canEdit);
  mountFormsShortLinkAdmin();
  backToFormsList(false);
  loadForms();
}

function isShortLinkAdminUser() {
  const roles = Array.isArray(currentUser?.roles) ? currentUser.roles : [];
  return Boolean(currentUser?.isAdmin || currentUser?.isSuperAdmin || roles.includes('管理員') || roles.includes('超級管理者'));
}

function mountFormsShortLinkAdmin() {
  const block = document.getElementById('formsShortLinkAdminBlock');
  const host = document.getElementById('formsShortLinkHost');
  const pane = document.getElementById('shortLinkManagePane');
  if (!block || !host || !pane) return;
  const canManage = isShortLinkAdminUser();
  block.classList.toggle('d-none', !canManage);
  if (!canManage) return;
  host.appendChild(pane);
  pane.classList.add('show', 'active');
  pane.classList.remove('fade');
  loadShortLinks();
}

function openPublicFormFill(formId) {
  isPublicFormMode = true;
  publicFormEditContext = null;
  currentUser = null;
  document.getElementById('loginView')?.classList.add('d-none');
  document.getElementById('mainView')?.classList.remove('d-none');
  document.querySelector('.topbar')?.classList.add('d-none');
  ['featureSelectionView', 'overviewView', 'purchaseView', 'assetView', 'venueView', 'zoomView', 'pastoralView', 'attendanceView', 'meetingsView', 'educationView', 'qtView', 'lineBotView', 'qrcodeView', 'counterWorkbenchView', 'detailView', 'systemView'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });
  document.getElementById('formsView').classList.remove('d-none');
  document.getElementById('formsListView').classList.add('d-none');
  document.getElementById('formEditorView').classList.add('d-none');
  document.getElementById('formResponsesView').classList.add('d-none');
  document.getElementById('formFillView').classList.remove('d-none');
  document.getElementById('formFillTitle').textContent = '表單載入中...';
  document.getElementById('formFillDescription').textContent = '';
  document.getElementById('formFillQuestions').innerHTML = '<div class="list-loading-box"><span class="spinner-border spinner-border-sm me-2"></span>表單載入中...</div>';
  document.getElementById('formFillError').textContent = '';
  document.getElementById('submitFormResponseBtn').classList.remove('d-none');
  document.getElementById('submitFormResponseBtn').textContent = '送出表單';
  google.script.run
    .withSuccessHandler(setFormFill)
    .withFailureHandler(err => {
      renderPublicFormUnavailable(err, '表單');
    })
    .getPublicFormDetail(formId);
}

function openPublicFormEdit(formId, responseId, token) {
  isPublicFormMode = true;
  publicFormEditContext = { formId, responseId, token };
  currentUser = null;
  document.getElementById('loginView')?.classList.add('d-none');
  document.getElementById('mainView')?.classList.remove('d-none');
  document.querySelector('.topbar')?.classList.add('d-none');
  ['featureSelectionView', 'overviewView', 'purchaseView', 'assetView', 'venueView', 'zoomView', 'pastoralView', 'attendanceView', 'meetingsView', 'educationView', 'qtView', 'lineBotView', 'qrcodeView', 'counterWorkbenchView', 'detailView', 'systemView'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });
  document.getElementById('formsView').classList.remove('d-none');
  document.getElementById('formsListView').classList.add('d-none');
  document.getElementById('formEditorView').classList.add('d-none');
  document.getElementById('formResponsesView').classList.add('d-none');
  document.getElementById('formFillView').classList.remove('d-none');
  document.getElementById('formFillTitle').textContent = '回覆載入中...';
  document.getElementById('formFillQuestions').innerHTML = '<div class="list-loading-box"><span class="spinner-border spinner-border-sm me-2"></span>回覆載入中...</div>';
  document.getElementById('formFillError').textContent = '';
  document.getElementById('submitFormResponseBtn').classList.remove('d-none');
  document.getElementById('submitFormResponseBtn').textContent = '更新表單';
  google.script.run
    .withSuccessHandler(setFormFill)
    .withFailureHandler(err => {
      renderPublicFormUnavailable(err, '回覆');
    })
    .getPublicFormResponseForEdit({ formId, responseId, token });
}

function renderPublicFormUnavailable(err, targetLabel) {
  const message = String((err && err.message) || err || '');
  const isStopped = message.includes('已停止') || message.includes('已關閉') || message.includes('已封存');
  const isExpired = message.includes('已過期') || message.includes('過期');
  document.getElementById('submitFormResponseBtn').classList.add('d-none');
  document.getElementById('formFillTitle').textContent = isExpired
    ? `${targetLabel}已過期`
    : (isStopped ? '表單已停止' : `無法開啟${targetLabel}`);
  document.getElementById('formFillDescription').textContent = '';
  document.getElementById('formFillQuestions').innerHTML = `
    <div class="alert ${isStopped || isExpired ? 'alert-warning' : 'alert-danger'} mb-0">
      ${escapeHtml(message || `無法開啟${targetLabel}`)}
    </div>
  `;
  document.getElementById('formFillError').textContent = '';
}

function loadForms() {
  setListLoading('formsTableBody', true, '表單載入中...');
  google.script.run
    .withSuccessHandler(rows => {
      forms = rows || [];
      renderFormsTable();
    })
    .withFailureHandler(showError)
    .getForms({
      keyword: document.getElementById('formsKeyword').value,
      status: document.getElementById('formsStatusFilter').value
    }, currentUser);
}

function renderFormsTable() {
  const body = document.getElementById('formsTableBody');
  body.innerHTML = '';
  if (!forms.length) {
    body.innerHTML = '<tr><td colspan="10" class="text-muted text-center py-4">尚無表單</td></tr>';
    return;
  }
  forms.forEach(form => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <button type="button" class="project-link" onclick="openFormEditor('${escapeAttr(form.formId)}')">${escapeHtml(form.title)}</button>
        <div class="text-muted small">${escapeHtml(form.description || '')}</div>
      </td>
      <td>${escapeHtml(formatFormType(form.formType))}</td>
      <td>${escapeHtml(formatFormStatus(form.status))}</td>
      <td>${form.hasFee ? `<span class="badge bg-warning text-dark">${escapeHtml(formatMoney(form.feeAmount || 0))}</span>` : '<span class="text-muted">無</span>'}</td>
      <td>${escapeHtml(formatFormVisibility(form.visibility))}</td>
      <td>${escapeHtml(form.questionCount)}</td>
      <td>${escapeHtml(form.responseCount || 0)}</td>
      <td>${escapeHtml(form.createdBy || '')}</td>
      <td>${escapeHtml(formatFormsDateTime(form.updatedAt))}</td>
      <td>
        <div class="btn-group btn-group-sm">
          <button type="button" class="btn btn-outline-secondary" onclick="openFormEditor('${escapeAttr(form.formId)}')">編輯</button>
          <button type="button" class="btn btn-outline-primary" onclick="openFormFill('${escapeAttr(form.formId)}')">填寫</button>
          <button type="button" class="btn btn-outline-secondary" onclick="copyPublicFormLink('${escapeAttr(form.formId)}', '${escapeAttr(form.visibility)}', '${escapeAttr(form.status)}', ${form.requireLogin ? 'true' : 'false'})">連結</button>
          <button type="button" class="btn btn-outline-secondary" onclick="openFormResponses('${escapeAttr(form.formId)}')">回覆</button>
        </div>
      </td>
    `;
    body.appendChild(tr);
  });
}

function newForm() {
  setFormEditor({
    form: {
      formId: '',
      title: '',
      description: '',
      formType: 'survey',
      status: 'draft',
      visibility: 'internal',
      requireLogin: true,
      allowMultipleResponses: true,
      hasFee: false,
      feeTitle: '',
      feeAmount: 0,
      paymentDescription: ''
    },
    questions: [createEmptyQuestion('short_text')]
  });
}

function openFormEditor(formId) {
  google.script.run
    .withSuccessHandler(setFormEditor)
    .withFailureHandler(showError)
    .getFormDetail(formId, currentUser);
}

function setFormEditor(data) {
  currentFormDetail = data;
  const form = data.form || {};
  currentFormQuestions = (data.questions || []).map(question => ({
    questionType: question.questionType || 'short_text',
    title: question.title || '',
    description: question.description || '',
    isRequired: Boolean(question.isRequired),
    options: Array.isArray(question.options) ? [...question.options] : []
  }));
  if (!currentFormQuestions.length) currentFormQuestions.push(createEmptyQuestion('short_text'));

  document.getElementById('formsListView').classList.add('d-none');
  document.getElementById('formEditorView').classList.remove('d-none');
  document.getElementById('formFillView').classList.add('d-none');
  document.getElementById('formResponsesView').classList.add('d-none');
  document.getElementById('formId').value = form.formId || '';
  document.getElementById('formTitle').value = form.title || '';
  document.getElementById('formDescription').value = form.description || '';
  document.getElementById('formType').value = form.formType || 'survey';
  document.getElementById('formStatus').value = form.status || 'draft';
  document.getElementById('formVisibility').value = form.visibility || 'internal';
  document.getElementById('formRequireLogin').checked = form.requireLogin !== false;
  document.getElementById('formAllowMultipleResponses').checked = form.allowMultipleResponses !== false;
  document.getElementById('formHasFee').checked = Boolean(form.hasFee);
  document.getElementById('formFeeTitle').value = form.feeTitle || '';
  document.getElementById('formFeeAmount').value = form.feeAmount || '';
  document.getElementById('formPaymentDescription').value = form.paymentDescription || '';
  toggleFormFeeFields();
  handleFormVisibilityChange();
  renderFormQuestions();
}

function handleFormVisibilityChange() {
  const visibility = document.getElementById('formVisibility')?.value || 'internal';
  const requireLogin = document.getElementById('formRequireLogin');
  if (!requireLogin) return;
  if (visibility === 'public') {
    requireLogin.checked = false;
    requireLogin.disabled = true;
  } else {
    requireLogin.disabled = false;
  }
}

function toggleFormFeeFields() {
  const enabled = document.getElementById('formHasFee').checked;
  document.querySelectorAll('.form-fee-field').forEach(el => el.classList.toggle('d-none', !enabled));
  if (!enabled) {
    document.getElementById('formFeeTitle').value = '';
    document.getElementById('formFeeAmount').value = '';
    document.getElementById('formPaymentDescription').value = '';
  }
}

function backToFormsList(shouldLoad = true) {
  if (isPublicFormMode) return;
  const list = document.getElementById('formsListView');
  const editor = document.getElementById('formEditorView');
  const fill = document.getElementById('formFillView');
  const responses = document.getElementById('formResponsesView');
  if (list) list.classList.remove('d-none');
  if (editor) editor.classList.add('d-none');
  if (fill) fill.classList.add('d-none');
  if (responses) responses.classList.add('d-none');
  if (shouldLoad) loadForms();
}

function previewCurrentForm() {
  const formId = document.getElementById('formId').value;
  if (!formId) return alert('請先儲存表單後再預覽');
  openFormFill(formId);
}

function copyCurrentFormPublicLink() {
  const formId = document.getElementById('formId').value;
  if (!formId) return alert('請先儲存表單後再複製公開連結');
  copyPublicFormLink(
    formId,
    document.getElementById('formVisibility').value,
    document.getElementById('formStatus').value,
    document.getElementById('formRequireLogin').checked
  );
}

function copyPublicFormLink(formId, visibility, status, requireLogin) {
  if (visibility !== 'public' || status !== 'published' || requireLogin) {
    alert('公開連結需將表單設定為「已發布 / 公開 / 不需要登入」。');
    return;
  }
  google.script.run
    .withSuccessHandler(url => {
      copyTextToClipboard(url)
        .then(() => alert('公開表單連結已複製'))
        .catch(() => prompt('請複製公開表單連結', url));
    })
    .withFailureHandler(err => {
      const url = buildPublicFormUrlFallback(formId);
      prompt(`無法取得正式公開連結，請先使用此備用連結。\n${err.message || err}`, url);
    })
    .getPublicFormUrl(formId, currentUser);
}

function buildPublicFormUrlFallback(formId) {
  const url = new URL(window.location.href);
  url.search = '';
  url.hash = '';
  url.searchParams.set('form', formId);
  return url.toString();
}

function copyTextToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve, reject) => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy') ? resolve() : reject(new Error('copy failed'));
    } catch (err) {
      reject(err);
    } finally {
      document.body.removeChild(textarea);
    }
  });
}

function viewCurrentFormResponses() {
  const formId = document.getElementById('formId').value;
  if (!formId) return alert('請先儲存表單後再查看回覆');
  openFormResponses(formId);
}

function viewCurrentFormStatistics() {
  const formId = document.getElementById('formId').value;
  if (!formId) return alert('請先儲存表單後再產出統計');
  openFormResponses(formId);
  loadCurrentFormStatistics();
}

function openFormFill(formId) {
  google.script.run
    .withSuccessHandler(setFormFill)
    .withFailureHandler(showError)
    .getFormDetail(formId, currentUser);
}

function setFormFill(data) {
  currentFormDetail = data;
  const form = data.form || {};
  document.getElementById('formsListView').classList.add('d-none');
  document.getElementById('formEditorView').classList.add('d-none');
  document.getElementById('formResponsesView').classList.add('d-none');
  document.getElementById('formFillView').classList.remove('d-none');
  document.getElementById('formFillTitle').textContent = form.title || '';
  document.getElementById('formFillDescription').textContent = form.description || '';
  const respondentBlock = document.getElementById('formRespondentNameBlock');
  const respondentInput = document.getElementById('formRespondentName');
  const respondentEmailBlock = document.getElementById('formRespondentEmailBlock');
  const respondentEmailInput = document.getElementById('formRespondentEmail');
  const showRespondent = isPublicFormMode || !currentUser;
  respondentBlock.classList.toggle('d-none', !showRespondent);
  respondentEmailBlock.classList.toggle('d-none', !isPublicFormMode);
  const response = data.response || {};
  respondentInput.value = showRespondent ? (response.respondentName || '') : (currentUser?.name || '');
  respondentEmailInput.value = isPublicFormMode ? (response.respondentEmail || '') : '';
  const notice = document.getElementById('formFillFeeNotice');
  if (form.hasFee) {
    notice.classList.remove('d-none');
    notice.textContent = `${form.feeTitle || '此表單'}：${formatMoney(form.feeAmount || 0)}，送出後會建立櫃台待繳費紀錄。`;
  } else {
    notice.classList.add('d-none');
    notice.textContent = '';
  }
  document.getElementById('formFillError').textContent = '';
  renderFormFillQuestions(data.questions || []);
  if (response.answers) fillFormResponseAnswers(response.answers);
}

function renderFormFillQuestions(questions) {
  const container = document.getElementById('formFillQuestions');
  container.innerHTML = '';
  questions.forEach(question => {
    const card = document.createElement('div');
    card.className = 'form-question-card';
    card.dataset.questionId = question.questionId;
    card.dataset.questionType = question.questionType;
    card.innerHTML = `
      <label class="form-label fw-bold">${escapeHtml(question.title)}${question.isRequired ? ' <span class="text-danger">*</span>' : ''}</label>
      ${question.description ? `<div class="text-muted small mb-2">${escapeHtml(question.description)}</div>` : ''}
      ${renderFormAnswerInput(question)}
    `;
    container.appendChild(card);
  });
}

function fillFormResponseAnswers(answers) {
  const byQuestionId = new Map((answers || []).map(answer => [String(answer.questionId), answer.value]));
  document.querySelectorAll('#formFillQuestions .form-question-card').forEach(card => {
    const questionId = String(card.dataset.questionId || '');
    const questionType = card.dataset.questionType;
    const value = byQuestionId.get(questionId);
    if (value === undefined || value === null) return;
    if (questionType === 'image_upload') {
      const preview = card.querySelector('.form-image-preview');
      if (preview) preview.innerHTML = '<div class="text-muted small">已上傳圖片；若需更換，請重新選擇圖片。</div>';
      return;
    }
    if (questionType === 'multiple_choice') {
      const selected = new Set(Array.isArray(value) ? value.map(String) : []);
      card.querySelectorAll('.form-answer-option').forEach(el => { el.checked = selected.has(el.value); });
      return;
    }
    if (questionType === 'single_choice') {
      card.querySelectorAll('.form-answer-option').forEach(el => { el.checked = String(value) === el.value; });
      return;
    }
    const input = card.querySelector('.form-answer-value');
    if (input) input.value = String(value || '');
  });
}

function renderFormAnswerInput(question) {
  if (question.questionType === 'image_upload') {
    return `
      <input type="file" class="form-control form-answer-file" accept="image/*" onchange="previewFormImageAnswer(this)">
      <div class="form-image-preview mt-2"></div>
      <div class="text-muted small mt-1">支援 JPG、PNG、WEBP、GIF，單張上限 5MB。</div>
    `;
  }
  if (question.questionType === 'paragraph') return '<textarea class="form-control form-answer-value" rows="3"></textarea>';
  if (question.questionType === 'date') return '<input type="date" class="form-control form-answer-value">';
  if (question.questionType === 'number') return '<input type="number" class="form-control form-answer-value">';
  if (question.questionType === 'dropdown') {
    return `
      <select class="form-select form-answer-value">
        <option value="">請選擇</option>
        ${(question.options || []).map(option => `<option value="${escapeAttr(option)}">${escapeHtml(option)}</option>`).join('')}
      </select>
    `;
  }
  if (question.questionType === 'single_choice' || question.questionType === 'multiple_choice') {
    const type = question.questionType === 'single_choice' ? 'radio' : 'checkbox';
    const name = `answer_${question.questionId}`;
    return (question.options || []).map(option => `
      <div class="form-check">
        <input class="form-check-input form-answer-option" type="${type}" name="${escapeAttr(name)}" value="${escapeAttr(option)}" id="${escapeAttr(name)}_${escapeAttr(option)}">
        <label class="form-check-label" for="${escapeAttr(name)}_${escapeAttr(option)}">${escapeHtml(option)}</label>
      </div>
    `).join('');
  }
  return '<input class="form-control form-answer-value">';
}

async function collectFormResponseAnswers() {
  const answers = [];
  for (const card of [...document.querySelectorAll('#formFillQuestions .form-question-card')]) {
    const questionId = card.dataset.questionId;
    const questionType = card.dataset.questionType;
    let value = '';
    if (questionType === 'image_upload') {
      const file = card.querySelector('.form-answer-file')?.files?.[0];
      value = file ? await readFormImageFile(file) : null;
    } else if (questionType === 'multiple_choice') {
      value = [...card.querySelectorAll('.form-answer-option:checked')].map(el => el.value);
    } else if (questionType === 'single_choice') {
      const checked = card.querySelector('.form-answer-option:checked');
      value = checked ? checked.value : '';
    } else {
      const input = card.querySelector('.form-answer-value');
      value = input ? input.value : '';
    }
    answers.push({ questionId, value });
  }
  return answers;
}

async function submitCurrentFormResponse() {
  const form = currentFormDetail && currentFormDetail.form ? currentFormDetail.form : {};
  const btn = document.getElementById('submitFormResponseBtn');
  const errorBox = document.getElementById('formFillError');
  errorBox.textContent = '';
  setButtonLoading(btn, true, '送出中...');
  let answers = [];
  try {
    answers = await collectFormResponseAnswers();
  } catch (err) {
    setButtonLoading(btn, false);
    errorBox.textContent = err.message || err;
    return;
  }
  const respondentName = document.getElementById('formRespondentName')?.value.trim()
    || (currentUser && currentUser.name ? currentUser.name : '');
  const respondentEmail = document.getElementById('formRespondentEmail')?.value.trim() || '';
  if (isPublicFormMode && !isValidEmail(respondentEmail)) {
    setButtonLoading(btn, false);
    errorBox.textContent = '請填寫有效的 Email';
    return;
  }
  const runner = google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      if (isPublicFormMode) {
        renderPublicFormSuccess(res);
      } else {
        alert(res.message);
        backToFormsList(true);
      }
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    });
  const payload = {
    formId: form.formId,
    response: {
      respondentName,
      respondentEmail,
      answers
    }
  };
  if (isPublicFormMode && publicFormEditContext?.responseId) {
    runner.updatePublicFormResponse({
      formId: form.formId,
      responseId: publicFormEditContext.responseId,
      token: publicFormEditContext.token,
      response: payload.response
    });
  } else if (isPublicFormMode) {
    runner.submitPublicFormResponse(payload);
  } else {
    payload.currentUser = currentUser;
    runner.submitFormResponse(payload);
  }
}

function renderPublicFormSuccess(res) {
  document.getElementById('submitFormResponseBtn').classList.add('d-none');
  document.getElementById('formFillQuestions').innerHTML = `
    <div class="alert alert-success mb-0">
      <h5 class="mb-2">表單已送出</h5>
      <div>${escapeHtml(res.message || '感謝您的填寫。')}</div>
      ${res.respondentEmail ? `<div class="mt-2">系統已寄送表單回覆與修改連結至：${escapeHtml(res.respondentEmail)}</div>` : ''}
      ${res.paymentAmount ? `<div class="mt-2">待繳金額：${escapeHtml(formatMoney(res.paymentAmount))}</div>` : ''}
    </div>
  `;
  document.getElementById('formFillError').textContent = '';
}

function isValidEmail(value) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || '').trim());
}

function openFormResponses(formId) {
  currentFormResponsesFormId = formId;
  document.getElementById('formsListView').classList.add('d-none');
  document.getElementById('formEditorView').classList.add('d-none');
  document.getElementById('formFillView').classList.add('d-none');
  document.getElementById('formResponsesView').classList.remove('d-none');
  loadCurrentFormResponses();
  loadCurrentFormStatistics();
}

function loadCurrentFormResponses() {
  setListLoading('formResponsesTableBody', true, '回覆載入中...');
  google.script.run
    .withSuccessHandler(renderFormResponses)
    .withFailureHandler(showError)
    .getFormResponses(currentFormResponsesFormId, currentUser);
}

function renderFormResponses(rows) {
  const body = document.getElementById('formResponsesTableBody');
  body.innerHTML = '';
  if (!rows || !rows.length) {
    body.innerHTML = '<tr><td colspan="5" class="text-muted text-center py-4">尚無回覆</td></tr>';
    return;
  }
  rows.forEach(row => {
    const answers = (row.answers || []).slice(0, 3).map(answer => `${answer.questionTitle}: ${formatAnswerValue(answer.value)}`).join('；');
    const attachmentButtons = (row.attachments || []).map(file => `
      <button type="button" class="btn btn-sm btn-outline-primary me-1 mb-1" onclick="viewFormAttachment('${escapeAttr(row.responseId)}', '${escapeAttr(file.attachmentId)}', '${escapeAttr(file.fileName)}')">
        ${escapeHtml(file.fileName)}
      </button>
    `).join('');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(row.respondentName || '')}</td>
      <td>${escapeHtml(formatFormsDateTime(row.submittedAt))}</td>
      <td>${escapeHtml(formatPaymentStatus(row.paymentStatus))}${row.paymentAmount ? ` ${escapeHtml(formatMoney(row.paymentAmount))}` : ''}${row.counterTransactionCode ? `<div class="text-muted small">${escapeHtml(row.counterTransactionCode)}</div>` : ''}</td>
      <td>${escapeHtml(answers)}</td>
      <td>${attachmentButtons || '<span class="text-muted">無</span>'}</td>
    `;
    body.appendChild(tr);
  });
}

function loadCurrentFormStatistics() {
  if (!currentFormResponsesFormId) return;
  const body = document.getElementById('formStatisticsTableBody');
  const summary = document.getElementById('formStatisticsSummary');
  if (summary) summary.textContent = '';
  if (body) setListLoading('formStatisticsTableBody', true, '統計產生中...');
  google.script.run
    .withSuccessHandler(renderFormStatistics)
    .withFailureHandler(showError)
    .getFormStatistics(currentFormResponsesFormId, currentUser);
}

function renderFormStatistics(data) {
  const body = document.getElementById('formStatisticsTableBody');
  const summary = document.getElementById('formStatisticsSummary');
  body.innerHTML = '';
  const questions = data && Array.isArray(data.questions) ? data.questions : [];
  if (summary) {
    summary.textContent = `回覆 ${escapeHtml(data?.responseCount || 0)} 筆，題目 ${escapeHtml(questions.length)} 題`;
  }
  if (!questions.length) {
    body.innerHTML = '<tr><td colspan="4" class="text-muted text-center py-4">沒有可統計的題目</td></tr>';
    return;
  }

  questions.forEach(question => {
    const values = Array.isArray(question.values) && question.values.length
      ? question.values
      : [{ label: '尚無答覆', count: 0, ratio: 0 }];
    values.forEach((item, index) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${index === 0 ? `
          <div class="fw-semibold">${escapeHtml(question.questionTitle || '')}</div>
          <div class="text-muted small">${escapeHtml(formatFormQuestionType(question.questionType))}，答覆 ${escapeHtml(question.answerCount || 0)} 筆</div>
        ` : ''}</td>
        <td>${escapeHtml(item.label || '')}</td>
        <td class="text-end">${escapeHtml(item.count || 0)}</td>
        <td class="text-end">${escapeHtml(formatPercent(item.ratio || 0))}</td>
      `;
      body.appendChild(tr);
    });
  });
}

function formatFormQuestionType(type) {
  const option = FORM_QUESTION_TYPES.find(item => item.value === type);
  return option ? option.label : (type || '');
}

function formatPercent(value) {
  const number = Number(value || 0);
  return `${Math.round(number * 1000) / 10}%`;
}

function createEmptyQuestion(type) {
  return {
    questionType: type,
    title: '',
    description: '',
    isRequired: false,
    options: ['選項 1']
  };
}

function addFormQuestion(type = 'short_text') {
  currentFormQuestions.push(createEmptyQuestion(type));
  renderFormQuestions();
}

function renderFormQuestions() {
  const container = document.getElementById('formQuestionsList');
  container.innerHTML = '';
  currentFormQuestions.forEach((question, index) => {
    const card = document.createElement('div');
    card.className = 'form-question-card';
    card.innerHTML = `
      <div class="d-flex justify-content-between gap-2 mb-2">
        <input class="form-control form-question-title" value="${escapeAttr(question.title)}" placeholder="問題" oninput="updateQuestionField(${index}, 'title', this.value)">
        <select class="form-select form-question-type" onchange="updateQuestionType(${index}, this.value)">
          ${FORM_QUESTION_TYPES.map(type => `<option value="${type.value}" ${type.value === question.questionType ? 'selected' : ''}>${type.label}</option>`).join('')}
        </select>
      </div>
      <input class="form-control form-control-sm mb-2" value="${escapeAttr(question.description || '')}" placeholder="題目說明" oninput="updateQuestionField(${index}, 'description', this.value)">
      <div class="form-question-preview mb-2">${renderQuestionPreview(question, index)}</div>
      <div class="d-flex justify-content-between align-items-center">
        <div class="btn-group btn-group-sm">
          <button type="button" class="btn btn-outline-secondary" onclick="moveQuestion(${index}, -1)">上移</button>
          <button type="button" class="btn btn-outline-secondary" onclick="moveQuestion(${index}, 1)">下移</button>
          <button type="button" class="btn btn-outline-danger" onclick="removeQuestion(${index})">刪除</button>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="questionRequired_${index}" ${question.isRequired ? 'checked' : ''} onchange="updateQuestionRequired(${index}, this.checked)">
          <label class="form-check-label" for="questionRequired_${index}">必填</label>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function renderQuestionPreview(question, index) {
  if (['single_choice', 'multiple_choice', 'dropdown'].includes(question.questionType)) {
    const inputType = question.questionType === 'multiple_choice' ? 'checkbox' : 'radio';
    const options = question.options && question.options.length ? question.options : ['選項 1'];
    if (question.questionType === 'dropdown') {
      return `
        <div class="form-options-editor">
          ${options.map((option, optionIndex) => renderOptionInput(index, optionIndex, option)).join('')}
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addQuestionOption(${index})">新增選項</button>
        </div>
        <select class="form-select mt-2" disabled><option>填寫時以下拉選單呈現</option></select>
      `;
    }
    return `
      <div class="form-options-editor">
        ${options.map((option, optionIndex) => `
          <div class="input-group input-group-sm mb-2">
            <span class="input-group-text"><input type="${inputType}" disabled></span>
            ${renderOptionInput(index, optionIndex, option)}
          </div>
        `).join('')}
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addQuestionOption(${index})">新增選項</button>
      </div>
    `;
  }
  if (question.questionType === 'paragraph') return '<textarea class="form-control" rows="3" disabled placeholder="長答文字"></textarea>';
  if (question.questionType === 'date') return '<input type="date" class="form-control" disabled>';
  if (question.questionType === 'number') return '<input type="number" class="form-control" disabled placeholder="數字">';
  if (question.questionType === 'image_upload') return '<input type="file" class="form-control" disabled><div class="text-muted small mt-1">填寫者可上傳一張圖片</div>';
  return '<input class="form-control" disabled placeholder="簡短回答">';
}

function renderOptionInput(questionIndex, optionIndex, option) {
  return `
    <input class="form-control" value="${escapeAttr(option)}" oninput="updateQuestionOption(${questionIndex}, ${optionIndex}, this.value)">
    <button type="button" class="btn btn-outline-danger" onclick="removeQuestionOption(${questionIndex}, ${optionIndex})">刪除</button>
  `;
}

function updateQuestionField(index, field, value) {
  currentFormQuestions[index][field] = value;
}

function updateQuestionType(index, type) {
  currentFormQuestions[index].questionType = type;
  if (['single_choice', 'multiple_choice', 'dropdown'].includes(type) && !currentFormQuestions[index].options.length) {
    currentFormQuestions[index].options = ['選項 1'];
  }
  renderFormQuestions();
}

function updateQuestionRequired(index, checked) {
  currentFormQuestions[index].isRequired = checked;
}

function addQuestionOption(questionIndex) {
  currentFormQuestions[questionIndex].options.push(`選項 ${currentFormQuestions[questionIndex].options.length + 1}`);
  renderFormQuestions();
}

function updateQuestionOption(questionIndex, optionIndex, value) {
  currentFormQuestions[questionIndex].options[optionIndex] = value;
}

function removeQuestionOption(questionIndex, optionIndex) {
  currentFormQuestions[questionIndex].options.splice(optionIndex, 1);
  if (!currentFormQuestions[questionIndex].options.length) currentFormQuestions[questionIndex].options.push('選項 1');
  renderFormQuestions();
}

function moveQuestion(index, delta) {
  const target = index + delta;
  if (target < 0 || target >= currentFormQuestions.length) return;
  const item = currentFormQuestions.splice(index, 1)[0];
  currentFormQuestions.splice(target, 0, item);
  renderFormQuestions();
}

function removeQuestion(index) {
  if (currentFormQuestions.length <= 1) {
    alert('至少需要一題');
    return;
  }
  currentFormQuestions.splice(index, 1);
  renderFormQuestions();
}

function submitForm() {
  const errorBox = document.getElementById('formEditorError');
  const btn = document.getElementById('saveFormBtn');
  errorBox.textContent = '';
  const form = {
    formId: document.getElementById('formId').value,
    title: document.getElementById('formTitle').value.trim(),
    description: document.getElementById('formDescription').value.trim(),
    formType: document.getElementById('formType').value,
    status: document.getElementById('formStatus').value,
    visibility: document.getElementById('formVisibility').value,
    requireLogin: document.getElementById('formRequireLogin').checked,
    allowMultipleResponses: document.getElementById('formAllowMultipleResponses').checked,
    hasFee: document.getElementById('formHasFee').checked,
    feeTitle: document.getElementById('formFeeTitle').value.trim(),
    feeAmount: Number(document.getElementById('formFeeAmount').value || 0),
    paymentDescription: document.getElementById('formPaymentDescription').value.trim(),
    questions: currentFormQuestions
  };
  if (!form.title) {
    errorBox.textContent = '請填寫表單標題';
    return;
  }
  if (form.hasFee && form.feeAmount <= 0) {
    errorBox.textContent = '收費表單請填寫大於 0 的金額';
    return;
  }

  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      alert(res.message);
      openFormEditor(res.formId);
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .saveForm({ formId: form.formId, form, currentUser });
}

function archiveCurrentForm() {
  const formId = document.getElementById('formId').value;
  if (!formId) return;
  if (!confirm('確定要封存此表單？')) return;
  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      backToFormsList(true);
    })
    .withFailureHandler(showError)
    .deleteForm({ formId, currentUser });
}

function handleFormsSearchKey(event) {
  if (event.key === 'Enter') loadForms();
}

function formatFormStatus(status) {
  return { draft: '草稿', published: '已發布', closed: '已關閉', archived: '已封存' }[status] || status || '';
}

function formatFormType(type) {
  return FORM_TYPES[type] || type || '';
}

function formatFormVisibility(value) {
  return { internal: '內部同工', members: '會友', public: '公開' }[value] || value || '';
}

function formatPaymentStatus(value) {
  return { none: '無收費', pending: '待繳費', paid: '已繳費', canceled: '已取消' }[value] || value || '';
}

function formatAnswerValue(value) {
  if (value && typeof value === 'object' && value.fileName) return value.fileName;
  if (Array.isArray(value)) return value.join('、');
  if (value && typeof value === 'object') return JSON.stringify(value);
  return String(value || '');
}

function previewFormImageAnswer(input) {
  const preview = input.closest('.form-question-card')?.querySelector('.form-image-preview');
  if (!preview) return;
  preview.innerHTML = '';
  const file = input.files && input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    input.value = '';
    preview.innerHTML = '<div class="text-danger small">請選擇圖片檔案</div>';
    return;
  }
  const img = document.createElement('img');
  img.className = 'form-image-thumb';
  img.alt = file.name;
  img.src = URL.createObjectURL(file);
  preview.appendChild(img);
}

function readFormImageFile(file) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) {
      reject(new Error('圖片格式僅支援 JPG、PNG、WEBP、GIF'));
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      reject(new Error('單張圖片不可超過 5MB'));
      return;
    }
    const reader = new FileReader();
    reader.onload = () => resolve({
      fileName: file.name,
      mimeType: file.type,
      fileSize: file.size,
      data: reader.result
    });
    reader.onerror = () => reject(new Error('圖片讀取失敗'));
    reader.readAsDataURL(file);
  });
}

function viewFormAttachment(responseId, attachmentId, fileName) {
  google.script.run
    .withSuccessHandler(file => {
      document.getElementById('formAttachmentTitle').textContent = file.fileName || fileName || '圖片附件';
      document.getElementById('formAttachmentImage').src = file.dataUrl;
      formAttachmentModalInstance = new bootstrap.Modal(document.getElementById('formAttachmentModal'));
      formAttachmentModalInstance.show();
    })
    .withFailureHandler(showError)
    .getFormResponseAttachmentData({ responseId, attachmentId }, currentUser);
}

function formatFormsDateTime(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('zh-TW', { hour12: false });
}
</script>
