<div id="formsView" class="d-none tc-page">
  <div class="section-card tc-card">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h5 class="mb-1">表單系統</h5>
        <div class="text-muted small">建立問卷、活動報名表與收費表單</div>
      </div>
      <button type="button" class="btn btn-primary" id="addFormBtn" onclick="newForm()">新增表單</button>
    </div>

    <div id="formsShortLinkAdminBlock" class="d-none mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">短連結管理</h6>
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="loadShortLinks()">重新整理</button>
      </div>
      <div id="formsShortLinkHost"></div>
    </div>

    <div id="formsListView">
      <div class="row g-2 align-items-end mb-3 tc-page-filter-area">
        <div class="col-12 col-md-6">
          <label class="form-label">關鍵字</label>
          <input id="formsKeyword" class="form-control" placeholder="表單標題或說明" onkeydown="handleFormsSearchKey(event)">
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">狀態</label>
          <select id="formsStatusFilter" class="form-select">
            <option value="">未封存</option>
            <option value="draft">草稿</option>
            <option value="published">已發布</option>
            <option value="closed">已關閉</option>
            <option value="archived">已封存</option>
          </select>
        </div>
        <div class="col-12 col-md-3 d-grid">
          <button type="button" class="btn btn-primary" onclick="loadForms()">搜尋</button>
        </div>
      </div>

      <div class="table-responsive tc-table-wrapper">
        <table class="table table-hover tc-table align-middle">
          <thead>
            <tr>
              <th>表單</th>
              <th>用途</th>
              <th>狀態</th>
              <th>收費</th>
              <th>可見範圍</th>
              <th>題數</th>
              <th>回覆</th>
              <th>建立者</th>
              <th>更新時間</th>
              <th>功能</th>
            </tr>
          </thead>
          <tbody id="formsTableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="formEditorView" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="btn-group">
          <button type="button" class="btn btn-outline-secondary" onclick="backToFormsList()">返回清單</button>
        </div>
        <div class="btn-group">
          <button type="button" class="btn btn-outline-secondary" id="previewFormBtn" onclick="previewCurrentForm()">預覽填寫</button>
          <button type="button" class="btn btn-outline-secondary" id="copyPublicFormLinkBtn" onclick="copyCurrentFormPublicLink()">公開連結</button>
          <button type="button" class="btn btn-outline-secondary" id="viewFormResponsesBtn" onclick="viewCurrentFormResponses()">查看回覆</button>
          <button type="button" class="btn btn-outline-secondary" id="viewFormStatisticsBtn" onclick="viewCurrentFormStatistics()">回覆統計</button>
          <button type="button" class="btn btn-outline-danger" id="deleteFormBtn" onclick="archiveCurrentForm()">封存</button>
          <button type="button" class="btn btn-primary" id="saveFormBtn" onclick="submitForm()">儲存表單</button>
        </div>
      </div>

      <input type="hidden" id="formId">
      <div class="form-builder-shell">
        <div class="form-builder-main">
          <div class="form-title-panel">
            <input id="formTitle" class="form-control form-title-input" placeholder="未命名表單">
            <textarea id="formDescription" class="form-control mt-2" rows="2" placeholder="表單說明"></textarea>
            <div class="row g-2 mt-2">
              <div class="col-12 col-md-3">
                <label class="form-label">表單用途</label>
                <select id="formType" class="form-select form-builder-input">
                  <option value="survey">問卷調查</option>
                  <option value="event_registration">活動報名</option>
                  <option value="general">一般表單</option>
                </select>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label">狀態</label>
                <select id="formStatus" class="form-select form-builder-input">
                  <option value="draft">草稿</option>
                  <option value="published">已發布</option>
                  <option value="closed">已關閉</option>
                </select>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label">可見範圍</label>
                <select id="formVisibility" class="form-select form-builder-input" onchange="handleFormVisibilityChange()">
                  <option value="internal">內部同工</option>
                  <option value="members">會友</option>
                  <option value="public">公開</option>
                </select>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label">回覆設定</label>
                <div class="form-check">
                  <input id="formRequireLogin" class="form-check-input form-builder-input" type="checkbox" checked>
                  <label class="form-check-label" for="formRequireLogin">需要登入</label>
                </div>
                <div class="form-check">
                  <input id="formAllowMultipleResponses" class="form-check-input form-builder-input" type="checkbox" checked>
                  <label class="form-check-label" for="formAllowMultipleResponses">允許重複填寫</label>
                </div>
              </div>
            </div>
            <div class="row g-2 mt-2 align-items-end">
              <div class="col-12 col-md-3">
                <div class="form-check form-switch mt-4">
                  <input id="formHasFee" class="form-check-input form-builder-input" type="checkbox" onchange="toggleFormFeeFields()">
                  <label class="form-check-label" for="formHasFee">此表單需要收費</label>
                </div>
              </div>
              <div class="col-12 col-md-3 form-fee-field d-none">
                <label class="form-label">收費項目</label>
                <input id="formFeeTitle" class="form-control form-builder-input" placeholder="例如：活動報名費">
              </div>
              <div class="col-12 col-md-2 form-fee-field d-none">
                <label class="form-label">金額</label>
                <input id="formFeeAmount" type="number" min="0" class="form-control form-builder-input text-end">
              </div>
              <div class="col-12 col-md-4 form-fee-field d-none">
                <label class="form-label">櫃台繳費備註</label>
                <input id="formPaymentDescription" class="form-control form-builder-input" placeholder="櫃台收款時顯示的說明">
              </div>
            </div>
          </div>

          <div id="formQuestionsList" class="form-questions-list"></div>
          <div id="formEditorError" class="text-danger small mt-3"></div>
        </div>

        <div class="form-builder-tools">
          <button type="button" class="btn btn-outline-primary w-100" onclick="addFormQuestion('short_text')">新增題目</button>
          <button type="button" class="btn btn-outline-secondary w-100" onclick="addFormQuestion('single_choice')">單選題</button>
          <button type="button" class="btn btn-outline-secondary w-100" onclick="addFormQuestion('multiple_choice')">複選題</button>
          <button type="button" class="btn btn-outline-secondary w-100" onclick="addFormQuestion('paragraph')">段落題</button>
          <button type="button" class="btn btn-outline-secondary w-100" onclick="addFormQuestion('date')">日期題</button>
          <button type="button" class="btn btn-outline-secondary w-100" onclick="addFormQuestion('image_upload')">圖片上傳</button>
        </div>
      </div>
    </div>

    <div id="formFillView" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <button type="button" class="btn btn-outline-secondary" onclick="backToFormsList()">返回清單</button>
        <button type="button" class="btn btn-primary" id="submitFormResponseBtn" onclick="submitCurrentFormResponse()">送出表單</button>
      </div>
      <div class="form-title-panel mb-3">
        <h5 id="formFillTitle" class="mb-1"></h5>
        <div id="formFillDescription" class="text-muted"></div>
        <div id="formFillFeeNotice" class="alert alert-warning mt-3 mb-0 d-none"></div>
        <div id="formRespondentNameBlock" class="mt-3 d-none">
          <label class="form-label">填寫者姓名</label>
          <input id="formRespondentName" class="form-control" placeholder="請輸入姓名">
        </div>
        <div id="formRespondentEmailBlock" class="mt-3 d-none">
          <label class="form-label">Email <span class="text-danger">*</span></label>
          <input id="formRespondentEmail" type="email" class="form-control" placeholder="請輸入 Email，以便寄送表單回覆與修改連結">
          <div class="form-text">系統會寄送表單完成通知與修改連結到此信箱。</div>
        </div>
      </div>
      <div id="formFillQuestions" class="form-questions-list"></div>
      <div id="formFillError" class="text-danger small mt-3"></div>
    </div>

    <div id="formResponsesView" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <button type="button" class="btn btn-outline-secondary" onclick="backToFormsList()">返回清單</button>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-primary" onclick="loadCurrentFormStatistics()">產出統計表</button>
          <button type="button" class="btn btn-outline-primary" onclick="loadCurrentFormResponses()">重新整理</button>
        </div>
      </div>
      <div class="table-responsive tc-table-wrapper">
        <table class="table table-hover tc-table align-middle">
          <thead>
            <tr>
              <th>填寫者</th>
              <th>送出時間</th>
              <th>付款狀態</th>
              <th>答案摘要</th>
              <th>附件</th>
            </tr>
          </thead>
          <tbody id="formResponsesTableBody"></tbody>
        </table>
      </div>
      <div class="card tc-card mt-3">
        <div class="card-header section-header">
          <span>問題答覆統計表</span>
          <span id="formStatisticsSummary" class="text-muted small"></span>
        </div>
        <div class="table-responsive tc-table-wrapper">
          <table class="table table-hover tc-table align-middle mb-0">
            <thead>
              <tr>
                <th>題目</th>
                <th>答覆 / 選項</th>
                <th class="text-end">次數</th>
                <th class="text-end">比例</th>
              </tr>
            </thead>
            <tbody id="formStatisticsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade tc-modal" id="formAttachmentModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="formAttachmentTitle">圖片附件</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img id="formAttachmentImage" class="form-attachment-image" alt="表單圖片附件">
      </div>
    </div>
  </div>
</div>
