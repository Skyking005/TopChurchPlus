<div id="meetingsView" class="d-none">
  <div class="section-card">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h5 class="mb-1">會議管理</h5>
        <div class="text-muted small">管理獨立會議與專案相關會議</div>
      </div>
      <button type="button" class="btn btn-primary" id="addStandaloneMeetingBtn" onclick="saveStandaloneMeeting()">新增會議</button>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-3">
            <label class="form-label">會議時間</label>
            <input id="standaloneMeetingTime" type="datetime-local" class="form-control">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">會議主題</label>
            <input id="standaloneMeetingTopic" class="form-control">
          </div>
          <div class="col-12 col-md-2">
            <label class="form-label">狀態</label>
            <select id="standaloneMeetingStatus" class="form-select"></select>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">與會者</label>
            <input id="standaloneMeetingAttendees" class="form-control" placeholder="以逗號分隔">
          </div>
          <div class="col-12">
            <label class="form-label">討論議題</label>
            <textarea id="standaloneMeetingAgenda" class="form-control" rows="2"></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-2 align-items-end mb-3">
      <div class="col-12 col-md-5">
        <label class="form-label">關鍵字</label>
        <input id="meetingKeyword" class="form-control" placeholder="會議編號、主題、專案" onkeydown="handleMeetingSearchKey(event)">
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label">類型</label>
        <select id="meetingProjectMode" class="form-select" onchange="loadMeetings()">
          <option value="">全部</option>
          <option value="standalone">獨立會議</option>
          <option value="project">專案會議</option>
        </select>
      </div>
      <div class="col-12 col-md-2">
        <label class="form-label">狀態</label>
        <select id="meetingStatusFilter" class="form-select" onchange="loadMeetings()"></select>
      </div>
      <div class="col-12 col-md-2 d-grid">
        <button type="button" class="btn btn-primary" onclick="loadMeetings()">搜尋</button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>會議編號</th>
            <th>時間</th>
            <th>主題</th>
            <th>專案</th>
            <th>與會者</th>
            <th>狀態</th>
          </tr>
        </thead>
        <tbody id="meetingsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>
