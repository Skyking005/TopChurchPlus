<section id="zoomView" class="d-none">
  <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
    <div>
      <h5 class="mb-1">Zoom 帳號管理</h5>
      <div class="text-muted small">以行事曆方式查看 Zoom 帳號借用狀況，避免同時段重複借用。</div>
    </div>
    <button type="button" class="btn btn-outline-primary btn-sm" onclick="loadZoomAvailability()">重新整理</button>
  </div>

  <div class="filter-panel mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label">日期</label>
        <input id="zoomDate" type="date" class="form-control">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">開始時間</label>
        <input id="zoomStartTime" type="time" class="form-control" value="08:00">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">結束時間</label>
        <input id="zoomEndTime" type="time" class="form-control" value="22:00">
      </div>
      <div class="col-12 col-md-5 text-end">
        <button type="button" class="btn btn-primary" onclick="loadZoomAvailability()">查詢借用狀況</button>
        <button id="openZoomReservationBtn" type="button" class="btn btn-outline-primary" onclick="openZoomReservationModal()">新增借用</button>
      </div>
    </div>
  </div>

  <div id="zoomError" class="text-danger small mb-2"></div>
  <div id="zoomCalendarGrid" class="resource-calendar-grid"></div>

  <div class="modal fade" id="zoomReservationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新增 Zoom 借用</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">可借用帳號</label>
              <select id="zoomReservationAccount" class="form-select"></select>
            </div>
            <div class="col-12">
              <label class="form-label">借用主題</label>
              <input id="zoomReservationTitle" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">開始</label>
              <input id="zoomReservationStartAt" type="datetime-local" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">結束</label>
              <input id="zoomReservationEndAt" type="datetime-local" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label">借用人</label>
              <input id="zoomReservationBorrower" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label">會議主題/備註</label>
              <textarea id="zoomReservationNote" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div id="zoomReservationError" class="text-danger small mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button id="saveZoomReservationBtn" type="button" class="btn btn-primary" onclick="submitZoomReservation()">儲存借用</button>
        </div>
      </div>
    </div>
  </div>
</section>
