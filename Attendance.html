<div id="attendanceView" class="d-none">
  <div class="section-card">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h5 class="mb-1">聚會統計系統</h5>
        <div class="text-muted small">小家統計與聚會統計</div>
      </div>
      <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-primary active" id="attendanceSmallGroupTabBtn" onclick="switchAttendanceTab('smallGroups')">小家統計</button>
        <button type="button" class="btn btn-outline-primary" id="attendanceMeetingTabBtn" onclick="switchAttendanceTab('meetings')">聚會統計</button>
      </div>
    </div>

    <div class="row g-2 align-items-end mb-3">
      <div class="col-12 col-md-3 col-lg-2">
        <label class="form-label">起始日期</label>
        <input id="attendanceStartDate" type="date" class="form-control">
      </div>
      <div class="col-12 col-md-3 col-lg-2">
        <label class="form-label">結束日期</label>
        <input id="attendanceEndDate" type="date" class="form-control">
      </div>
      <div class="col-12 col-md-3 col-lg-2">
        <label class="form-label">會堂</label>
        <select id="attendanceChurchFilter" class="form-select"></select>
      </div>
      <div class="col-12 col-md-3 col-lg-2">
        <label class="form-label">點名類型</label>
        <select id="attendanceTypeFilter" class="form-select"></select>
      </div>
      <div class="col-12 col-lg-3" id="attendanceGroupFilterWrap">
        <label class="form-label">牧區</label>
        <select id="attendanceGroupFilter" class="form-select"></select>
      </div>
      <div class="col-12 col-lg-1 d-grid">
        <button type="button" class="btn btn-primary" onclick="loadAttendanceCurrentTab()">查詢</button>
      </div>
    </div>

    <div id="attendanceSmallGroupsPanel">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>會堂</th>
              <th>牧區</th>
              <th>成員</th>
              <th>聚會次數</th>
              <th>出席人次</th>
              <th>平均出席</th>
              <th>出席率</th>
              <th>近三次未出席</th>
              <th>功能</th>
            </tr>
          </thead>
          <tbody id="attendanceSmallGroupTableBody"></tbody>
        </table>
      </div>
      <div id="attendanceSmallGroupDetail" class="attendance-detail-block d-none mt-3">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
          <h6 class="mb-0" id="attendanceSmallGroupDetailTitle">小家成員出席</h6>
          <span class="text-muted small" id="attendanceSmallGroupEventHint"></span>
        </div>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead id="attendanceSmallGroupMemberHead"></thead>
            <tbody id="attendanceSmallGroupMemberBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="attendanceMeetingsPanel" class="d-none">
      <div class="row g-2 mb-3">
        <div class="col-12 col-md-4">
          <div class="stat-card">
            <span>總出席人次</span>
            <strong id="attendanceTotalCount">0</strong>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="stat-card">
            <span>平均每次</span>
            <strong id="attendanceAverageCount">0</strong>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="stat-card">
            <span>最高出席</span>
            <strong id="attendanceMaxCount">0</strong>
          </div>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>日期</th>
              <th>類型</th>
              <th>會堂</th>
              <th>實體</th>
              <th>線上</th>
              <th>總計</th>
            </tr>
          </thead>
          <tbody id="attendanceMeetingTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
