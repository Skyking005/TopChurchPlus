<script>
let counterTransactions = [];
let counterPinCodes = [];

function openCounterWorkbench() {
  recordFeatureUsage('counter');
  document.getElementById('mainTitle').textContent = '志工櫃台';
  hideAllMainViews();
  document.getElementById('counterWorkbenchView').classList.remove('d-none');
  toggleCounterPinManagement();
  loadCounterTransactions();
  if (canManageCounterPins()) loadCounterPins();
}

function loadCounterTransactions() {
  setListLoading('counterTransactionTableBody', true, '櫃台資料載入中...');
  google.script.run
    .withSuccessHandler(rows => {
      counterTransactions = rows || [];
      renderCounterTransactions();
    })
    .withFailureHandler(showError)
    .getCounterTransactions({ status: 'pending' }, currentUser);
}

function renderCounterTransactions() {
  const body = document.getElementById('counterTransactionTableBody');
  body.innerHTML = '';
  if (!counterTransactions.length) {
    body.innerHTML = '<tr><td colspan="6" class="text-muted text-center py-4">目前沒有待繳費資料</td></tr>';
    return;
  }

  counterTransactions.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(row.transactionCode || '')}</td>
      <td>${escapeHtml(formatCounterSource(row))}</td>
      <td>${escapeHtml(row.payerName || '')}</td>
      <td class="text-end">${formatMoney(row.amount || 0)}</td>
      <td>${escapeHtml(formatCounterStatus(row.status))}</td>
      <td class="text-end">
        <button type="button" class="btn btn-sm btn-success" onclick="markCounterTransactionPaid('${escapeAttr(row.transactionId)}')">已收款</button>
      </td>
    `;
    body.appendChild(tr);
  });
}

function toggleCounterPinManagement() {
  const canManage = canManageCounterPins();
  const panel = document.getElementById('counterPinManagementPanel');
  const tab = document.getElementById('counterPinManagementTab');
  if (panel) panel.classList.toggle('d-none', !canManage);
  if (tab) tab.classList.toggle('d-none', !canManage);
}

function canManageCounterPins() {
  if (!currentUser || currentUser.workspaceMode === 'counter') return false;
  return getFeatureAccess('counter') === 'edit';
}

function loadCounterPins() {
  setListLoading('counterPinTableBody', true, 'PIN 載入中...');
  google.script.run
    .withSuccessHandler(rows => {
      counterPinCodes = rows || [];
      renderCounterPins();
    })
    .withFailureHandler(showError)
    .getCounterPinCodes(currentUser);
}

function renderCounterPins() {
  const body = document.getElementById('counterPinTableBody');
  if (!body) return;
  body.innerHTML = '';
  if (!counterPinCodes.length) {
    body.innerHTML = '<tr><td colspan="5" class="text-muted text-center py-3">本週尚未建立 PIN Code</td></tr>';
    return;
  }

  counterPinCodes.forEach(pin => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="badge bg-dark fs-6">${escapeHtml(pin.pinCode)}</span></td>
      <td>${escapeHtml(formatFormsDateTime(pin.validUntil))}</td>
      <td>${escapeHtml(pin.usageCount || 0)}</td>
      <td>${pin.isActive ? '<span class="badge bg-success">啟用中</span>' : '<span class="badge bg-secondary">已停用</span>'}</td>
      <td class="text-end">
        ${pin.isActive ? `<button type="button" class="btn btn-sm btn-outline-danger" onclick="deactivateCounterPin('${escapeAttr(pin.pinId)}')">停用</button>` : ''}
      </td>
    `;
    body.appendChild(tr);
  });
}

function createCounterPin() {
  google.script.run
    .withSuccessHandler(res => {
      alert(`已新增 PIN Code：${res.pinCode}`);
      loadCounterPins();
    })
    .withFailureHandler(showError)
    .createCounterPinCode({ currentUser });
}

function deactivateCounterPin(pinId) {
  if (!confirm('確定要停用此 PIN Code？')) return;
  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      loadCounterPins();
    })
    .withFailureHandler(showError)
    .deactivateCounterPinCode({ pinId, currentUser });
}

function resetCounterPins() {
  if (!confirm('確定要停用本週所有 PIN Code 並產生一組新的 PIN？')) return;
  google.script.run
    .withSuccessHandler(res => {
      alert(`${res.message}：${res.pinCode.pinCode}`);
      loadCounterPins();
    })
    .withFailureHandler(showError)
    .resetCurrentWeekCounterPinCodes({ currentUser });
}

function markCounterTransactionPaid(transactionId) {
  if (!confirm('確認已完成收款？')) return;
  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      loadCounterTransactions();
    })
    .withFailureHandler(showError)
    .markCounterTransactionPaid({ transactionId, currentUser });
}

function formatCounterSource(row) {
  if (row.sourceSystem === 'forms') return '表單報名';
  if (row.businessType === 'qt') return 'QT 業務';
  return row.sourceSystem || row.businessType || '櫃台';
}

function formatCounterStatus(status) {
  return { pending: '待繳費', paid: '已繳費', canceled: '已取消' }[status] || status || '';
}
</script>
