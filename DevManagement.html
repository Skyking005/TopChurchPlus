<section id="devManagementView" class="d-none">
  <div class="section-card">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h5 class="mb-1">系統開發管理</h5>
        <div class="text-muted small">提交開發 Issue、檢視核心文件與版本更新歷程。</div>
      </div>
      <button type="button" class="btn btn-outline-primary" onclick="refreshDevManagement()">重新整理</button>
    </div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <button type="button" class="nav-link active" data-dev-management-tab="issues" onclick="switchDevManagementTab('issues')">Issue 提案</button>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link" data-dev-management-tab="documents" onclick="switchDevManagementTab('documents')">文件 Review</button>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link" data-dev-management-tab="releases" onclick="switchDevManagementTab('releases')">版本歷程</button>
      </li>
    </ul>

    <div id="devManagementIssuesPane">
      <div class="row g-3">
        <div class="col-12 col-xl-4">
          <div class="dev-panel">
            <h6 class="mb-3">新增 / 編輯 Issue</h6>
            <input id="devIssueId" type="hidden">
            <div class="row g-2">
              <div class="col-12 col-md-4">
                <label class="form-label">類型</label>
                <select id="devIssueType" class="form-select">
                  <option value="feature">feature</option>
                  <option value="issue">issue</option>
                  <option value="maintain">maintain</option>
                </select>
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label">狀態</label>
                <select id="devIssueStatus" class="form-select">
                  <option value="提案">提案</option>
                  <option value="取消">取消</option>
                  <option value="完成">完成</option>
                </select>
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label">優先度</label>
                <select id="devIssuePriority" class="form-select">
                  <option value="低">低</option>
                  <option value="中" selected>中</option>
                  <option value="高">高</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">描述</label>
                <textarea id="devIssueDescription" class="form-control" rows="7" placeholder="請描述需求、問題或維護事項"></textarea>
              </div>
              <div class="col-12 d-flex gap-2">
                <button id="saveDevIssueBtn" type="button" class="btn btn-primary" onclick="submitDevIssue()">儲存 Issue</button>
                <button type="button" class="btn btn-outline-secondary" onclick="resetDevIssueForm()">清空</button>
              </div>
              <div class="col-12">
                <div id="devIssueFormError" class="text-danger small"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-8">
          <div class="filter-panel mb-3">
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md-4">
                <label class="form-label">關鍵字</label>
                <input id="devIssueKeyword" class="form-control" placeholder="描述、編號或建立人" onkeydown="handleDevIssueSearchKey(event)">
              </div>
              <div class="col-12 col-md-2">
                <label class="form-label">類型</label>
                <select id="devIssueTypeFilter" class="form-select" onchange="loadDevIssues(1)">
                  <option value="">全部</option>
                  <option value="feature">feature</option>
                  <option value="issue">issue</option>
                  <option value="maintain">maintain</option>
                </select>
              </div>
              <div class="col-12 col-md-2">
                <label class="form-label">狀態</label>
                <select id="devIssueStatusFilter" class="form-select" onchange="loadDevIssues(1)">
                  <option value="">全部</option>
                  <option value="提案">提案</option>
                  <option value="取消">取消</option>
                  <option value="完成">完成</option>
                </select>
              </div>
              <div class="col-12 col-md-2">
                <label class="form-label">優先度</label>
                <select id="devIssuePriorityFilter" class="form-select" onchange="loadDevIssues(1)">
                  <option value="">全部</option>
                  <option value="低">低</option>
                  <option value="中">中</option>
                  <option value="高">高</option>
                </select>
              </div>
              <div class="col-12 col-md-2 d-grid">
                <button type="button" class="btn btn-outline-primary" onclick="loadDevIssues(1)">搜尋</button>
              </div>
            </div>
          </div>
          <div id="devIssueListError" class="text-danger small mb-2"></div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>編號</th>
                  <th>類型</th>
                  <th>狀態</th>
                  <th>優先度</th>
                  <th>描述</th>
                  <th>建立</th>
                  <th class="text-end">功能</th>
                </tr>
              </thead>
              <tbody id="devIssuesBody"></tbody>
            </table>
          </div>
          <div id="devIssuesPager" class="d-flex justify-content-between align-items-center mt-2"></div>
        </div>
      </div>
    </div>

    <div id="devManagementDocumentsPane" class="d-none">
      <div class="row g-3">
        <div class="col-12 col-lg-4">
          <div class="dev-panel">
            <h6 class="mb-3">文件清單</h6>
            <div id="devDocumentsList" class="list-group dev-doc-list"></div>
          </div>
        </div>
        <div class="col-12 col-lg-8">
          <div class="dev-panel">
            <div class="d-flex flex-wrap justify-content-between gap-2 mb-2">
              <div>
                <h6 id="devDocumentTitle" class="mb-1">請選擇文件</h6>
                <div id="devDocumentMeta" class="text-muted small"></div>
              </div>
              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="loadDevDocuments()">重新掃描</button>
            </div>
            <pre id="devDocumentContent" class="dev-document-content">尚未選擇文件</pre>
          </div>
        </div>
      </div>
    </div>

    <div id="devManagementReleasesPane" class="d-none">
      <div class="row g-3">
        <div class="col-12 col-xl-4">
          <div class="dev-panel">
            <h6 class="mb-3">新增版本歷程</h6>
            <div class="row g-2">
              <div class="col-12 col-md-6">
                <label class="form-label">Commit Hash</label>
                <input id="devReleaseCommitHash" class="form-control" placeholder="例如 c5ea324">
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">GAS 版本</label>
                <input id="devReleaseGasVersion" class="form-control" placeholder="例如 @47">
              </div>
              <div class="col-12">
                <label class="form-label">Commit 訊息</label>
                <input id="devReleaseCommitMessage" class="form-control">
              </div>
              <div class="col-12">
                <label class="form-label">版本摘要</label>
                <textarea id="devReleaseSummary" class="form-control" rows="5" placeholder="本次更新完成內容"></textarea>
              </div>
              <div class="col-12">
                <label class="form-label">驗證結果</label>
                <textarea id="devReleaseVerification" class="form-control" rows="4" placeholder="測試、部署、DB 備份等結果"></textarea>
              </div>
              <div class="col-12 d-flex flex-wrap gap-3">
                <div class="form-check">
                  <input id="devReleaseApiDeployed" class="form-check-input" type="checkbox">
                  <label class="form-check-label" for="devReleaseApiDeployed">NAS API 已部署</label>
                </div>
                <div class="form-check">
                  <input id="devReleaseGasDeployed" class="form-check-input" type="checkbox">
                  <label class="form-check-label" for="devReleaseGasDeployed">Google Apps Script 已推送</label>
                </div>
              </div>
              <div class="col-12 d-grid">
                <button id="saveDevReleaseBtn" type="button" class="btn btn-primary" onclick="submitDevRelease()">新增版本歷程</button>
              </div>
              <div class="col-12">
                <div id="devReleaseFormError" class="text-danger small"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-8">
          <div id="devReleaseListError" class="text-danger small mb-2"></div>
          <div id="devReleaseList" class="dev-release-list"></div>
        </div>
      </div>
    </div>
  </div>
</section>
