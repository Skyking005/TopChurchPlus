<style>
  body {
    background: #f5f7fb;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
  }

  .login-brand-square,
  .login-brand-wordmark,
  .topbar-brand {
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    flex: 0 0 auto;
  }

  .login-brand-square {
    width: 96px;
    height: 96px;
    background-image: var(--brand-logo-square);
    border-radius: 18px;
    box-shadow: 0 12px 28px rgba(16, 24, 40, 0.12);
  }

  .login-brand-wordmark {
    width: 220px;
    height: 64px;
    background-image: var(--brand-logo-wordmark);
  }

  .login-entry-card.login-entry-active {
    max-width: 760px;
  }

  .login-entry-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .login-entry-option {
    min-height: 210px;
    border: 1px solid #d9e2ef;
    border-radius: 14px;
    background: #fff;
    padding: 24px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }

  .login-entry-option:hover,
  .login-entry-option:focus {
    border-color: #2f6fdd;
    box-shadow: 0 14px 28px rgba(47, 111, 221, 0.14);

    outline: none;
  }

  .login-entry-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #eef4ff;
    color: #245fc7;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.1rem;
  }

  .login-entry-title {
    font-size: 1.25rem;
    font-weight: 800;
    color: #172033;
  }

  .login-entry-desc {
    color: #5e6b7e;
    line-height: 1.6;
  }

  .login-verification-box {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #edf0f5;
  }

  #counterPinCode {

    font-weight: 700;
  }

      align-items: flex-start;
      padding: 24px 12px;
    }

    .login-card {
      padding: 24px;
    }

    .login-entry-grid {
      grid-template-columns: 1fr;
    }

    .login-entry-option {
      min-height: 170px;
    }
  }

  .topbar {
    background: white;
    margin: 16px 0;
    padding: 16px 20px;
    border-radius: 16px;
    display: flex;
    gap: 16px;
    justify-content: space-between;
    align-items: center;
  }

  .topbar-left,
  .topbar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .topbar-brand {
    width: 150px;
    height: 42px;
    background-image: var(--brand-logo-wordmark);
    border: 0;
    padding: 0;
    background-color: transparent;
    cursor: pointer;
    border-radius: 6px;
    transition: opacity .15s ease, box-shadow .15s ease;
  }

  .topbar-brand:hover {
    opacity: .82;
  }

  .topbar-brand:focus-visible {
    outline: 0;
    box-shadow: 0 0 0 3px rgba(13, 110, 253, .22);
  }

  .topbar-title {
    flex: 1;
    min-width: 160px;
  }

  .topbar-user {
    justify-content: flex-end;
    text-align: right;
    flex-wrap: wrap;
  }

  #userInfo {
    max-width: 520px;
    overflow-wrap: anywhere;
  }

  .card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
  }

  .card-body {
    background: #fbfcff;
    border-radius: 0 0 16px 16px;
  }

  .form-control,
  .form-select {
    background-color: #fff;
    border-color: #b8c2d2;
    box-shadow: inset 0 1px 2px rgba(16, 24, 40, 0.04);
  }

  .form-control:focus,
  .form-select:focus {
    border-color: #2f6fdd;
    box-shadow: 0 0 0 0.18rem rgba(47, 111, 221, 0.14);
  }

  .form-control:disabled,
  .form-select:disabled,
  .form-control[readonly] {
    background-color: #eef2f7;
    border-color: #c6cfdd;
    color: #475467;
    opacity: 1;
  }

  .card-header {
    background: #fff;
    font-weight: 700;
    border-bottom: 1px solid #edf0f5;
    border-radius: 16px 16px 0 0 !important;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pagination-area {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    margin: 20px 0;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 13px;
    color: white;
  }

  .status-規劃中 {
    background: #6c757d;
  }

  .status-進行中 {
    background: #198754;
  }

  .status-已結案 {
    background: #0d6efd;
  }

  .status-終止 {
    background: #6c757d;
  }

  .project-link {
    border: none;
    background: none;
    color: #0d6efd;
    font-weight: 700;
    padding: 0;
  }

  .summary-box {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    font-size: 18px;
  }

  .compact-summary {
    gap: 12px;
    align-items: center;
    min-height: 38px;
    font-size: 15px;
  }

  .action-bar {
    position: sticky;
    bottom: 0;
    background: rgba(245, 247, 251, 0.95);
    padding: 16px 0;
    text-align: right;
  }

  .mobile-only {
    display: none;
  }

  .project-card-mobile {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
  }

  .project-card-mobile h6 {
    margin-bottom: 6px;
    font-weight: 700;
  }

  .project-meta {
    color: #6c757d;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    max-width: 1120px;
    margin: 48px auto;
  }

  .feature-option {
    border: 1px solid #dfe5ee;
    background: #fff;
    border-radius: 8px;
    padding: 22px;
    text-align: left;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    min-height: 190px;
    cursor: pointer;
  }

  .feature-option:hover,
  .feature-option:focus {
    border-color: #0d6efd;
    box-shadow: 0 12px 28px rgba(13, 110, 253, 0.12);
    transform: translateY(-2px);
    outline: none;
  }

  .feature-option-pinned {
    border-color: #7fb2ff;
    background: #fbfdff;
  }

  .feature-card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .feature-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 44px;
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: #f1f6ff;
    color: #0d6efd;
  }

  .feature-icon svg {
    width: 25px;
    height: 25px;
  }

  .feature-title {
    display: inline-block;
    color: #1f2937;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0;
  }

  .feature-desc {
    display: block;
    color: #6c757d;
    font-size: 15px;
    line-height: 1.5;
  }

  .feature-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .feature-toolbar {
    max-width: 1120px;
    margin: 28px auto -24px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .feature-toolbar-note {
    color: #667085;
    font-size: 13px;
  }

  .feature-custom-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .feature-action-btn,
  .feature-action-icon {
    border: 1px solid #d7dee8;
    background: #fff;
    color: #344054;
    border-radius: 6px;
    min-height: 30px;
    font-size: 13px;
    font-weight: 700;
  }

  .feature-action-btn {
    padding: 4px 10px;
  }

  .feature-action-icon {
    width: 32px;
    padding: 0;
  }

  .feature-action-btn:hover,
  .feature-action-icon:hover:not(:disabled) {
    border-color: #0d6efd;
    color: #0d6efd;
  }

  .feature-action-btn-active {
    border-color: #0d6efd;
    background: #e9f2ff;
    color: #0d6efd;
  }

  .feature-action-icon:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .feature-access {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    background: #e9f2ff;
    color: #0d6efd;
    font-size: 13px;
    font-weight: 700;
  }

  .feature-hint {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    background: #eaf7ef;
    color: #198754;
    font-size: 13px;
    font-weight: 700;
  }

  .feature-soon {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    background: #f8f9fa;
    color: #6c757d;
    font-size: 13px;
    font-weight: 700;
  }

  .list-loading-cell,
  .list-loading-box {
    color: #667085;
    text-align: center;
    padding: 24px !important;
  }

  .feature-empty {
    grid-column: 1 / -1;
    background: #fff;
    border: 1px solid #dfe5ee;
    border-radius: 12px;
    padding: 24px;
    color: #6c757d;
    text-align: center;
  }

  @media (max-width: 768px) {
    .container-fluid {
      padding: 10px;
    }

    .desktop-only {
      display: none !important;
    }

    .mobile-only {
      display: block;
    }

    .feature-grid {
      grid-template-columns: 1fr;
      margin: 24px auto;
    }

    #addProjectBtn,
    .edit-only,
    #saveBtn {
      display: none !important;
    }

    .topbar {
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar-brand {
      width: 118px;
      height: 34px;
    }

    .topbar-title {
      order: 3;
      flex-basis: 100%;
    }

    .topbar-user {
      margin-left: auto;
      max-width: calc(100% - 80px);
    }

    .summary-box {
      display: block;
      font-size: 16px;
    }

    .summary-box div {
      margin-bottom: 8px;
    }

    table {
      min-width: 680px;
    }

    .action-bar {
      display: none;
    }

    .feature-grid {
      grid-template-columns: 1fr;
      margin: 24px auto;
    }
  }

  .balance-positive {
    color: #198754;
    font-weight: 700;
  }

  .balance-negative {
    color: #dc3545;
    font-weight: 700;
  }

  .checkbox-group {
    border: 1px solid #dee2e6;
    border-radius: 10px;
    padding: 12px;
    background: white;

    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
  }

  .checkbox-group .form-check {
    margin-bottom: 6px;
  }

  .purchase-sub-list {
    display: grid;
    gap: 10px;
  }

  .purchase-sub-item {
    border: 1px solid #edf0f5;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fff;
  }

  .asset-status-badge {
    display: inline-block;
    min-width: 56px;
    padding: 4px 10px;
    border-radius: 999px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
  }

  .asset-status-active {
    background: #198754;
  }

  .asset-status-repair {
    background: #fd7e14;
  }

  .asset-status-retired {
    background: #6c757d;
  }

  .asset-status-pending {
    background: #0d6efd;
  }

  .asset-status-disabled {
    background: #dc3545;
  }

  .asset-status-default {
    background: #495057;
  }

  .advanced-editor {
    min-height: 280px;
  }

  .note-editor.note-frame {
    border-color: #dee2e6 !important;
    border-radius: 8px;
    overflow: hidden;
  }

  .note-editor .note-editable {
    min-height: 280px;
    background: #fff;
  }

  .pastoral-light {
    display: inline-block;
    min-width: 48px;
    padding: 3px 9px;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
  }

  .pastoral-light.is-green {
    background: #198754;
  }

  .pastoral-light.is-yellow {
    background: #f0ad00;
    color: #1f2933;
  }

  .pastoral-light.is-red {
    background: #dc3545;
  }

  .pastoral-light.is-gray {
    background: #6c757d;
  }

  .pastoral-detail-block {
    border: 1px solid #e7ebf2;
    border-radius: 8px;
    background: #fff;
    padding: 14px;
    height: 100%;
  }

  .pastoral-detail-block h6 {
    font-weight: 800;
    margin-bottom: 12px;
  }

  .attendance-detail-block {
    border: 1px solid #dbe4ef;
    border-radius: 8px;
    background: #f8fafc;
    padding: 1rem;
  }

  .attendance-rate {
    display: inline-flex;
    min-width: 52px;
    justify-content: center;
    border-radius: 999px;
    padding: .2rem .55rem;
    font-weight: 700;
    font-size: .82rem;
  }

  .attendance-rate.is-good {
    color: #166534;
    background: #dcfce7;
  }

  .attendance-rate.is-mid {
    color: #854d0e;
    background: #fef3c7;
  }

  .attendance-rate.is-low {
    color: #991b1b;
    background: #fee2e2;
  }

  .attendance-dots {
    display: flex;
    flex-wrap: wrap;
    gap: .45rem;
  }

  .attendance-dot-wrap {
    display: inline-flex;
    align-items: center;
    gap: .25rem;
    color: #64748b;
    font-size: .78rem;
  }

  .attendance-dot {
    display: inline-block;
    width: .72rem;
    height: .72rem;
    border-radius: 999px;
    border: 1px solid #cbd5e1;
    background: #e2e8f0;
  }

  .attendance-dot.is-present {
    border-color: #22c55e;
    background: #22c55e;
  }

  .attendance-dot.is-online {
    border-color: #3b82f6;
    background: #3b82f6;
  }

  .attendance-dot.is-empty {
    border-color: #cbd5e1;
    background: #f8fafc;
  }

  .detail-dl {
    display: grid;
    grid-template-columns: minmax(84px, 120px) 1fr;
    gap: 8px 12px;
    margin: 0;
  }

  .detail-dl dt {
    color: #667085;
    font-weight: 700;
  }

  .detail-dl dd {
    margin: 0;
    min-width: 0;
    word-break: break-word;
  }

  .pastoral-group-dl {
    grid-template-columns: 120px minmax(0, 1fr);
  }

  .pastoral-group-dl dd {
    overflow-wrap: anywhere;
    white-space: normal;
  }

  .pastoral-member-files {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .pastoral-file-card {
    border: 1px solid #edf0f5;
    border-radius: 8px;
    background: #fbfcfe;
    padding: 12px;
    min-width: 0;
  }

  .pastoral-file-card h6 {
    margin-bottom: 10px;
    font-size: 14px;
  }

  .pastoral-file-preview {
    width: 100%;
    height: 220px;
    object-fit: contain;
    border: 1px solid #e7ebf2;
    border-radius: 8px;
    background: #fff;
  }

  .pastoral-file-empty {
    display: grid;
    place-items: center;
    min-height: 120px;
    border: 1px dashed #cfd6e1;
    border-radius: 8px;
    color: #667085;
    background: #fff;
    font-size: 14px;
  }

  .pastoral-care-list {
    display: grid;
    gap: 10px;
  }

  .pastoral-care-item {
    border: 1px solid #edf0f5;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fbfcfe;
  }

  .pastoral-care-meta {
    color: #667085;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .form-builder-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 180px;
    gap: 16px;
    align-items: start;
  }

  .form-builder-main {
    display: grid;
    gap: 14px;
  }

  .form-title-panel,
  .form-question-card {
    background: #fff;
    border: 1px solid #dfe5ee;
    border-radius: 8px;
    padding: 18px;
  }

  .form-title-panel {
    border-top: 6px solid #0d6efd;
  }

  .form-title-input {
    border: 0;
    border-bottom: 1px solid #dfe5ee;
    border-radius: 0;
    font-size: 24px;
    font-weight: 700;
    padding-left: 0;
  }

  .form-title-input:focus {
    box-shadow: none;
    border-bottom-color: #0d6efd;
  }

  .form-questions-list {
    display: grid;
    gap: 14px;
  }

  .form-question-card {
    border-left: 4px solid #0d6efd;
  }

  .form-question-title {
    min-width: 0;
  }

  .form-question-type {
    width: 156px;
    flex: 0 0 156px;
  }

  .form-question-preview {
    padding: 10px 0;
  }

  .form-options-editor {
    display: grid;
    gap: 8px;
  }

  .form-builder-tools {
    position: sticky;
    top: 16px;
    display: grid;
    gap: 8px;
    background: #fff;
    border: 1px solid #dfe5ee;
    border-radius: 8px;
    padding: 12px;
  }

  @media (max-width: 992px) {
    .form-builder-shell {
      grid-template-columns: 1fr;
    }

    .form-builder-tools {
      position: static;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 576px) {
    .pastoral-member-files {
      grid-template-columns: 1fr;
    }

    .form-builder-tools {
      grid-template-columns: 1fr;
    }

    .form-question-type {
      width: 120px;
      flex-basis: 120px;
    }
  }

  .form-image-thumb {
    max-width: 180px;
    max-height: 140px;
    border: 1px solid #dfe5ee;
    border-radius: 8px;
    object-fit: cover;
    background: #fff;
  }

  .form-attachment-image {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
  }

    display: inline-block;
    min-width: 76px;
    padding: 4px 10px;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
  }

  .venue-status-available {
    background: #198754;
  }

  .venue-status-busy {
    background: #dc3545;
  }

  .venue-status-unbound {

  }

  .venue-status-error {
    background: #fd7e14;
    color: #1f2933;
  }

  .venue-event-line {
    font-size: 13px;
    color: #344054;
    line-height: 1.5;
  }

    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }

    border-radius: 8px;
    background: #fff;
    min-height: 180px;
    overflow: hidden;
  }

  .resource-calendar-header {
    padding: 12px;
    border-bottom: 1px solid var(--line);
    background: #f8fafc;
  }

  .resource-calendar-body {
    padding: 12px;
    display: grid;
    gap: 10px;
  }

    border-radius: 8px;

    background: #fff;

    background: #f1f5f9;
    color: #334155;
    font-size: 13px;
    font-weight: 700;

  .resource-week-day-body {
    padding: 8px;

    gap: 8px;
  }

    border-radius: 8px;
    padding: 16px;
    text-align: center;
    color: var(--muted);

  }

  .resource-empty-slot-compact {
    padding: 10px;
    font-size: 13px;
  }
