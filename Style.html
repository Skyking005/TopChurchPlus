<style>
  body {
    background: #f5f7fb;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
  }

  .login-verification-box {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #edf0f5;
  }

  .topbar {
    background: white;
    margin: 16px 0;
    padding: 16px 20px;
    border-radius: 16px;
    display: flex;
    gap: 16px;
    justify-content: space-between;
    align-items: center;
  }

  .topbar-left,
  .topbar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .topbar-title {
    flex: 1;
    min-width: 160px;
  }

  .topbar-user {
    justify-content: flex-end;
    text-align: right;
    flex-wrap: wrap;
  }

  #userInfo {
    max-width: 520px;
    overflow-wrap: anywhere;
  }

  .card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
  }

  .card-header {
    background: #fff;
    font-weight: 700;
    border-bottom: 1px solid #edf0f5;
    border-radius: 16px 16px 0 0 !important;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pagination-area {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    margin: 20px 0;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 13px;
    color: white;
  }

  .status-規劃中 {
    background: #6c757d;
  }

  .status-進行中 {
    background: #198754;
  }

  .status-已結案 {
    background: #0d6efd;
  }

  .status-終止 {
    background: #6c757d;
  }

  .project-link {
    border: none;
    background: none;
    color: #0d6efd;
    font-weight: 700;
    padding: 0;
  }

  .summary-box {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    font-size: 18px;
  }

  .compact-summary {
    gap: 12px;
    align-items: center;
    min-height: 38px;
    font-size: 15px;
  }

  .action-bar {
    position: sticky;
    bottom: 0;
    background: rgba(245, 247, 251, 0.95);
    padding: 16px 0;
    text-align: right;
  }

  .mobile-only {
    display: none;
  }

  .project-card-mobile {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
  }

  .project-card-mobile h6 {
    margin-bottom: 6px;
    font-weight: 700;
  }

  .project-meta {
    color: #6c757d;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    max-width: 1120px;
    margin: 48px auto;
  }

  .feature-option {
    border: 1px solid #dfe5ee;
    background: #fff;
    border-radius: 12px;
    padding: 28px;
    text-align: left;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }

  .feature-option:hover {
    border-color: #0d6efd;
    box-shadow: 0 12px 28px rgba(13, 110, 253, 0.12);
    transform: translateY(-2px);
  }

  .feature-title {
    display: block;
    color: #1f2937;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .feature-desc {
    display: block;
    color: #6c757d;
    font-size: 15px;
    line-height: 1.5;
  }

  .feature-access {
    display: inline-block;
    margin-top: 14px;
    padding: 3px 8px;
    border-radius: 6px;
    background: #e9f2ff;
    color: #0d6efd;
    font-size: 13px;
    font-weight: 700;
  }

  .feature-hint {
    display: block;
    margin-top: 12px;
    color: #198754;
    font-size: 13px;
    font-weight: 700;
  }

  .list-loading-cell,
  .list-loading-box {
    color: #667085;
    text-align: center;
    padding: 24px !important;
  }

  .feature-empty {
    grid-column: 1 / -1;
    background: #fff;
    border: 1px solid #dfe5ee;
    border-radius: 12px;
    padding: 24px;
    color: #6c757d;
    text-align: center;
  }

  @media (max-width: 768px) {
    .container-fluid {
      padding: 10px;
    }

    .desktop-only {
      display: none !important;
    }

    .mobile-only {
      display: block;
    }

    .feature-grid {
      grid-template-columns: 1fr;
      margin: 24px auto;
    }

    #addProjectBtn,
    .edit-only,
    #saveBtn {
      display: none !important;
    }

    .topbar {
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar-title {
      order: 3;
      flex-basis: 100%;
    }

    .topbar-user {
      margin-left: auto;
      max-width: calc(100% - 80px);
    }

    .summary-box {
      display: block;
      font-size: 16px;
    }

    .summary-box div {
      margin-bottom: 8px;
    }

    table {
      min-width: 680px;
    }

    .action-bar {
      display: none;
    }

    .feature-grid {
      grid-template-columns: 1fr;
      margin: 24px auto;
    }
  }

  .balance-positive {
    color: #198754;
    font-weight: 700;
  }

  .balance-negative {
    color: #dc3545;
    font-weight: 700;
  }

  .checkbox-group {
    border: 1px solid #dee2e6;
    border-radius: 10px;
    padding: 12px;
    background: white;

    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
  }

  .checkbox-group .form-check {
    margin-bottom: 6px;
  }

  .purchase-sub-list {
    display: grid;
    gap: 10px;
  }

  .purchase-sub-item {
    border: 1px solid #edf0f5;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fff;
  }

  .asset-status-badge {
    display: inline-block;
    min-width: 56px;
    padding: 4px 10px;
    border-radius: 999px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
  }

  .asset-status-active {
    background: #198754;
  }

  .asset-status-repair {
    background: #fd7e14;
  }

  .asset-status-retired {
    background: #6c757d;
  }

  .asset-status-pending {
    background: #0d6efd;
  }

  .asset-status-disabled {
    background: #dc3545;
  }

  .asset-status-default {
    background: #495057;
  }

  .advanced-editor {
    min-height: 280px;
  }

  .note-editor.note-frame {
    border-color: #dee2e6 !important;
    border-radius: 8px;
    overflow: hidden;
  }

  .note-editor .note-editable {
    min-height: 280px;
    background: #fff;
  }

  .pastoral-light {
    display: inline-block;
    min-width: 48px;
    padding: 3px 9px;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
  }

  .pastoral-light.is-green {
    background: #198754;
  }

  .pastoral-light.is-yellow {
    background: #f0ad00;
    color: #1f2933;
  }

  .pastoral-light.is-red {
    background: #dc3545;
  }

  .pastoral-light.is-gray {
    background: #6c757d;
  }

  .pastoral-detail-block {
    border: 1px solid #e7ebf2;
    border-radius: 8px;
    background: #fff;
    padding: 14px;
    height: 100%;
  }

  .pastoral-detail-block h6 {
    font-weight: 800;
    margin-bottom: 12px;
  }

  .detail-dl {
    display: grid;
    grid-template-columns: minmax(84px, 120px) 1fr;
    gap: 8px 12px;
    margin: 0;
  }

  .detail-dl dt {
    color: #667085;
    font-weight: 700;
  }

  .detail-dl dd {
    margin: 0;
    min-width: 0;
    word-break: break-word;
  }

  .pastoral-care-list {
    display: grid;
    gap: 10px;
  }

  .pastoral-care-item {
    border: 1px solid #edf0f5;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fbfcfe;
  }

  .pastoral-care-meta {
    color: #667085;
    font-size: 13px;
    margin-bottom: 4px;
  }
</style>
