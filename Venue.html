<section id="venueView" class="d-none tc-page">
  <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3 tc-page-header">
    <div>
      <h5 class="mb-1">場地預約</h5>
      <div class="text-muted small">依會堂與主要位置查詢場地，並結合 Google 行事曆判斷使用狀況。</div>
    </div>
    <button id="refreshVenueBtn" type="button" class="btn btn-outline-primary btn-sm" onclick="loadVenueAvailability()">重新查詢</button>
  </div>

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <button type="button" class="nav-link active" data-venue-tab="availability" onclick="switchVenueTab('availability')">可借用場地清單</button>
    </li>
    <li class="nav-item" id="venueManagementTab">
      <button type="button" class="nav-link" data-venue-tab="management" onclick="switchVenueTab('management')">場地管理</button>
    </li>
  </ul>

  <div id="venueAvailabilityPanel">
    <div class="filter-panel tc-page-filter-area mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label">週起始日</label>
        <input id="venueDate" type="date" class="form-control">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">預設開始時間</label>
        <input id="venueStartTime" type="time" class="form-control" value="08:00">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">預設結束時間</label>
        <input id="venueEndTime" type="time" class="form-control" value="22:00">
      </div>
      <div class="col-12 col-md-5">
        <label class="form-label">可借用場地</label>
        <select id="venueResourceFilter" class="form-select" onchange="loadVenueAvailability()"></select>
      </div>
      <div class="col-12 text-end">
        <button type="button" class="btn btn-primary" onclick="loadVenueAvailability()">查詢使用狀況</button>
        <button id="openVenueReservationBtn" type="button" class="btn btn-outline-primary" onclick="openVenueReservationModal()">新增借用</button>
      </div>
    </div>
    </div>

    <div id="venueError" class="text-danger small mb-2"></div>

    <div id="venueResourceTableBody" class="resource-calendar-grid"></div>
    <div id="mobileVenueResourceList" class="d-none"></div>
  </div>

  <div id="venueManagementPanel" class="d-none">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h6 class="mb-1">可借用場地設定</h6>
        <div class="text-muted small">先設定哪些主要位置可借用，預約清單只會顯示可借用場地。</div>
      </div>
      <button type="button" class="btn btn-outline-primary btn-sm" onclick="loadVenueResources(renderVenueManagement)">重新整理</button>
    </div>
    <div class="table-responsive tc-table-wrapper">
      <table class="table table-hover tc-table align-middle">
        <thead>
          <tr>
            <th>會堂</th>
            <th>主要位置</th>
            <th>位置數</th>
            <th>可借用</th>
            <th>行事曆</th>
            <th>備註</th>
            <th class="text-end">功能</th>
          </tr>
        </thead>
        <tbody id="venueManagementTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade tc-modal" id="venueCalendarModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">場地行事曆設定</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input id="venueCalendarHall" type="hidden">
          <input id="venueCalendarMainLocation" type="hidden">
          <div class="mb-3">
            <label class="form-label">場地</label>
            <input id="venueCalendarLabel" class="form-control" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label">Google 行事曆 ID</label>
            <input id="venueCalendarId" class="form-control" placeholder="example@group.calendar.google.com">
          </div>
          <div class="mb-3">
            <label class="form-label">備註</label>
            <textarea id="venueCalendarNote" class="form-control" rows="3"></textarea>
          </div>
          <div id="venueCalendarError" class="text-danger small"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button id="saveVenueCalendarBtn" type="button" class="btn btn-primary" onclick="submitVenueCalendar()">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade tc-modal" id="venueReservationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新增場地借用</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">可借用場地</label>
              <select id="venueReservationResource" class="form-select"></select>
            </div>
            <div class="col-12">
              <label class="form-label">借用主題</label>
              <input id="venueReservationTitle" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">開始</label>
              <input id="venueReservationStartAt" type="datetime-local" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">結束</label>
              <input id="venueReservationEndAt" type="datetime-local" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">借用人</label>
              <input id="venueReservationRequester" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">聯絡電話</label>
              <input id="venueReservationPhone" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label">備註</label>
              <textarea id="venueReservationNote" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div id="venueReservationError" class="text-danger small mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button id="saveVenueReservationBtn" type="button" class="btn btn-primary" onclick="submitVenueReservation()">儲存借用</button>
        </div>
      </div>
    </div>
  </div>
</section>
