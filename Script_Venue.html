<script>
let venueResources = [];
let venueAvailability = null;
let venueCalendarModalInstance = null;
let venueReservationModalInstance = null;
let venueCanEdit = false;

function openVenueSystem() {
  recordFeatureUsage('venue');
  document.getElementById('mainTitle').textContent = '場地預約系統';
  venueCanEdit = getFeatureAccess('venue') === 'edit' && currentUser.deviceType !== 'mobile';
  ['featureSelectionView', 'overviewView', 'purchaseView', 'assetView', 'zoomView', 'pastoralView', 'formsView', 'educationView', 'qtView', 'lineBotView', 'qrcodeView', 'counterWorkbenchView', 'detailView', 'systemView'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });
  document.getElementById('venueView').classList.remove('d-none');
  document.getElementById('venueManagementTab').classList.toggle('d-none', !venueCanEdit);
  document.getElementById('openVenueReservationBtn').classList.toggle('d-none', !venueCanEdit);
  setupVenueDefaults();
  switchVenueTab('availability');
  loadVenueResources(() => loadVenueAvailability());
}

function switchVenueTab(tab) {
  document.querySelectorAll('[data-venue-tab]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.venueTab === tab);
  });
  document.getElementById('venueAvailabilityPanel').classList.toggle('d-none', tab !== 'availability');
  document.getElementById('venueManagementPanel').classList.toggle('d-none', tab !== 'management');
  if (tab === 'management') {
    if (!venueCanEdit) return switchVenueTab('availability');
    renderVenueManagement();
  }
}

function setupVenueDefaults() {
  const dateInput = document.getElementById('venueDate');
  if (dateInput && !dateInput.value) dateInput.value = new Date().toISOString().slice(0, 10);
}

function loadVenueResources(callback) {
  setListLoading(['venueResourceTableBody', 'mobileVenueResourceList'], true);
  google.script.run
    .withSuccessHandler(resources => {
      venueResources = resources || [];
      setupVenueFilters();
      if (callback) callback();
    })
    .withFailureHandler(err => {
      document.getElementById('venueError').textContent = err.message || err;
      renderVenueResources([]);
    })
    .getVenueResources({}, currentUser);
}

function setupVenueFilters() {
  const hallSelect = document.getElementById('venueHallFilter');
  const mainLocationSelect = document.getElementById('venueMainLocationFilter');
  const currentHall = hallSelect.value;
  const currentMainLocation = mainLocationSelect.value;
  const halls = [...new Set(venueResources.map(item => item.hall).filter(Boolean))];

  hallSelect.innerHTML = '<option value="">全部會堂</option>';
  halls.forEach(hall => {
    const opt = document.createElement('option');
    opt.value = hall;
    opt.textContent = hall;
    hallSelect.appendChild(opt);
  });
  if (currentHall && halls.includes(currentHall)) hallSelect.value = currentHall;
  setupVenueMainLocationOptions(currentMainLocation);
}

function onVenueHallChanged() {
  setupVenueMainLocationOptions('');
}

function setupVenueMainLocationOptions(selectedValue) {
  const hall = document.getElementById('venueHallFilter').value;
  const select = document.getElementById('venueMainLocationFilter');
  const mainLocations = [...new Set(
    venueResources
      .filter(item => !hall || item.hall === hall)
      .map(item => item.mainLocation)
      .filter(Boolean)
  )];

  select.innerHTML = '<option value="">全部位置</option>';
  mainLocations.forEach(mainLocation => {
    const opt = document.createElement('option');
    opt.value = mainLocation;
    opt.textContent = mainLocation;
    select.appendChild(opt);
  });
  if (selectedValue && mainLocations.includes(selectedValue)) select.value = selectedValue;
}

function loadVenueAvailability() {
  const errorBox = document.getElementById('venueError');
  errorBox.textContent = '';

  let filters;
  try {
    filters = collectVenueAvailabilityFilters();
  } catch (err) {
    errorBox.textContent = err.message || err;
    return;
  }

  setListLoading(['venueResourceTableBody', 'mobileVenueResourceList'], true);
  google.script.run
    .withSuccessHandler(data => {
      venueAvailability = data || { resources: [] };
      renderVenueResources(venueAvailability.resources || []);
      renderVenueCalendarErrors(venueAvailability.calendarErrors || []);
    })
    .withFailureHandler(err => {
      errorBox.textContent = err.message || err;
      renderVenueResources([]);
    })
    .getVenueAvailability(filters, currentUser);
}

function collectVenueAvailabilityFilters() {
  const date = document.getElementById('venueDate').value;
  const startTime = document.getElementById('venueStartTime').value || '00:00';
  const endTime = document.getElementById('venueEndTime').value || '23:59';
  if (!date) throw new Error('請選擇查詢日期');

  const start = new Date(`${date}T${startTime}:00`);
  const end = new Date(`${date}T${endTime}:00`);
  if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) throw new Error('查詢時間格式錯誤');
  if (end <= start) throw new Error('結束時間必須晚於開始時間');

  return {
    hall: document.getElementById('venueHallFilter').value,
    mainLocation: document.getElementById('venueMainLocationFilter').value,
    startAt: start.toISOString(),
    endAt: end.toISOString()
  };
}

function renderVenueResources(resources) {
  const grid = document.getElementById('venueResourceTableBody');
  const mobile = document.getElementById('mobileVenueResourceList');
  grid.innerHTML = '';
  mobile.innerHTML = '';

  if (!resources.length) {
    grid.innerHTML = '<div class="list-loading-box text-muted">查無場地資料</div>';
    mobile.innerHTML = '<div class="list-loading-box text-muted">查無場地資料</div>';
    return;
  }

  resources.forEach(resource => {
    const view = getVenueResourceView(resource);
    const column = document.createElement('div');
    column.className = 'resource-calendar-column';
    column.innerHTML = `
      <div class="resource-calendar-header">
        <div class="d-flex justify-content-between gap-2 align-items-start">
          <div>
            <div class="fw-semibold">${escapeHtml(resource.mainLocation)}</div>
            <div class="small text-muted">${escapeHtml(resource.hall)} / ${escapeHtml(resource.locationCount)} 個位置</div>
          </div>
          <span class="venue-status-badge ${view.statusClass}">${escapeHtml(view.status)}</span>
        </div>
        <div class="small text-muted text-break mt-1">${escapeHtml(view.calendarText)}</div>
      </div>
      <div class="resource-calendar-body">
        ${view.eventsHtml}
        <div class="mt-2">${renderVenueActions(resource)}</div>
      </div>
    `;
    grid.appendChild(column);
  });
}

function renderVenueManagement() {
  const body = document.getElementById('venueManagementTableBody');
  if (!body) return;
  body.innerHTML = '';
  if (!venueResources.length) {
    body.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">目前沒有位置資料</td></tr>';
    return;
  }

  venueResources.forEach(resource => {
    const hall = encodeURIComponent(resource.hall || '');
    const mainLocation = encodeURIComponent(resource.mainLocation || '');
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${escapeHtml(resource.hall || '')}</td>
      <td>${escapeHtml(resource.mainLocation || '')}</td>
      <td>${escapeHtml(resource.locationCount || 0)}</td>
      <td>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" ${resource.isBookable ? 'checked' : ''} onchange="toggleVenueBookable('${hall}', '${mainLocation}', this.checked)">
          <label class="form-check-label">${resource.isBookable ? '可借用' : '不可借用'}</label>
        </div>
      </td>
      <td>${escapeHtml(resource.calendarId || '尚未設定')}</td>
      <td>${escapeHtml(resource.note || '')}</td>
      <td class="text-end">
        <button type="button" class="btn btn-sm btn-outline-primary" onclick="openVenueCalendarModal('${hall}','${mainLocation}')">行事曆</button>
      </td>
    `;
    body.appendChild(row);
  });
}

function toggleVenueBookable(encodedHall, encodedMainLocation, isBookable) {
  const hall = decodeURIComponent(encodedHall || '');
  const mainLocation = decodeURIComponent(encodedMainLocation || '');
  google.script.run
    .withSuccessHandler(res => {
      if (res?.resource) {
        venueResources = venueResources.map(item =>
          item.hall === res.resource.hall && item.mainLocation === res.resource.mainLocation ? res.resource : item
        );
      }
      renderVenueManagement();
      setupVenueFilters();
      loadVenueAvailability();
    })
    .withFailureHandler(err => {
      showError(err);
      renderVenueManagement();
    })
    .saveVenueResourceBookable({
      currentUser,
      resource: { hall, mainLocation, isBookable }
    });
}

function getVenueResourceView(resource) {
  const hasCalendarError = getVenueCalendarError(resource);
  const hasCalendar = Boolean(resource.calendarId);
  const events = resource.events || [];
  let status = '可使用';
  let statusClass = 'venue-status-available';

  if (!hasCalendar) {
    status = '未綁定行事曆';
    statusClass = 'venue-status-unbound';
  } else if (hasCalendarError) {
    status = '行事曆錯誤';
    statusClass = 'venue-status-error';
  } else if (events.length) {
    status = '使用中';
    statusClass = 'venue-status-busy';
  }

  return {
    status,
    statusClass,
    calendarText: hasCalendar ? resource.calendarId : '尚未設定',
    eventsHtml: renderVenueEvents(events)
  };
}

function renderVenueEvents(events) {
  if (!events || !events.length) return '<div class="resource-empty-slot">此時段可借用</div>';
  return events.slice(0, 3).map(event => `
    <div class="resource-reservation-card">
      <div class="fw-semibold">${escapeHtml(formatResourceTimeRange(event.startAt, event.endAt))}</div>
      <div>${escapeHtml(event.title || '未命名')}</div>
      <div class="small text-muted">${escapeHtml(event.requesterName || event.source || '')}</div>
      ${venueCanEdit && event.source !== 'google_calendar' && event.reservationId ? `<button type="button" class="btn btn-sm btn-outline-danger mt-2" onclick="cancelVenueReservationFromUI('${escapeAttr(event.reservationId)}')">取消借用</button>` : ''}
    </div>
  `).join('') + (events.length > 3 ? `<div class="text-muted small">另有 ${events.length - 3} 筆</div>` : '');
}

function renderVenueActions(resource) {
  if (!venueCanEdit) return '';
  const hall = encodeURIComponent(resource.hall || '');
  const mainLocation = encodeURIComponent(resource.mainLocation || '');
  return `<button type="button" class="btn btn-sm btn-outline-primary" onclick="openVenueCalendarModal('${hall}','${mainLocation}')">行事曆</button>`;
}

function openVenueReservationModal() {
  if (!venueCanEdit) return;
  const filters = collectVenueAvailabilityFilters();
  document.getElementById('venueReservationStartAt').value = toResourceDateTimeLocal(filters.startAt);
  document.getElementById('venueReservationEndAt').value = toResourceDateTimeLocal(filters.endAt);
  document.getElementById('venueReservationTitle').value = '';
  document.getElementById('venueReservationRequester').value = currentUser?.name || '';
  document.getElementById('venueReservationPhone').value = '';
  document.getElementById('venueReservationNote').value = '';
  document.getElementById('venueReservationError').textContent = '';
  renderVenueReservationResourceOptions(filters.startAt, filters.endAt);
  venueReservationModalInstance = bootstrap.Modal.getOrCreateInstance(document.getElementById('venueReservationModal'));
  venueReservationModalInstance.show();
}

function renderVenueReservationResourceOptions(startAt, endAt) {
  const select = document.getElementById('venueReservationResource');
  select.innerHTML = '';
  (venueAvailability?.resources || []).forEach(resource => {
    const busy = isVenueResourceBusy(resource, startAt, endAt);
    const opt = document.createElement('option');
    opt.value = JSON.stringify({ hall: resource.hall, mainLocation: resource.mainLocation });
    opt.disabled = busy;
    opt.textContent = `${resource.hall} / ${resource.mainLocation}${busy ? '（已被借用）' : ''}`;
    select.appendChild(opt);
  });
}

function isVenueResourceBusy(resource, startAt, endAt) {
  const start = new Date(startAt).getTime();
  const end = new Date(endAt).getTime();
  return (resource.events || resource.reservations || []).some(event =>
    new Date(event.startAt).getTime() < end &&
    new Date(event.endAt).getTime() > start
  );
}

function submitVenueReservation() {
  const btn = document.getElementById('saveVenueReservationBtn');
  const errorBox = document.getElementById('venueReservationError');
  errorBox.textContent = '';
  const rawResource = document.getElementById('venueReservationResource').value;
  if (!rawResource) { errorBox.textContent = '此時段沒有可借用場地'; return; }
  const resource = JSON.parse(rawResource);
  const reservation = {
    hall: resource.hall,
    mainLocation: resource.mainLocation,
    title: document.getElementById('venueReservationTitle').value.trim(),
    requesterName: document.getElementById('venueReservationRequester').value.trim(),
    contactPhone: document.getElementById('venueReservationPhone').value.trim(),
    startAt: new Date(document.getElementById('venueReservationStartAt').value).toISOString(),
    endAt: new Date(document.getElementById('venueReservationEndAt').value).toISOString(),
    note: document.getElementById('venueReservationNote').value.trim()
  };
  if (!reservation.title) { errorBox.textContent = '請填寫借用主題'; return; }
  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      if (venueReservationModalInstance) venueReservationModalInstance.hide();
      alert(res.message);
      loadVenueAvailability();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .saveVenueReservation({ currentUser, reservation });
}

function cancelVenueReservationFromUI(reservationId) {
  if (!confirm('確定要取消此場地借用？')) return;
  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      loadVenueAvailability();
    })
    .withFailureHandler(showError)
    .cancelVenueReservation({ currentUser, reservationId });
}

function openVenueCalendarModal(encodedHall, encodedMainLocation) {
  const hall = decodeURIComponent(encodedHall || '');
  const mainLocation = decodeURIComponent(encodedMainLocation || '');
  const resource = venueResources.find(item => item.hall === hall && item.mainLocation === mainLocation)
    || (venueAvailability?.resources || []).find(item => item.hall === hall && item.mainLocation === mainLocation)
    || { hall, mainLocation };
  document.getElementById('venueCalendarHall').value = resource.hall;
  document.getElementById('venueCalendarMainLocation').value = resource.mainLocation;
  document.getElementById('venueCalendarLabel').value = [resource.hall, resource.mainLocation].filter(Boolean).join(' / ');
  document.getElementById('venueCalendarId').value = resource.calendarId || '';
  document.getElementById('venueCalendarNote').value = resource.note || '';
  document.getElementById('venueCalendarError').textContent = '';
  venueCalendarModalInstance = bootstrap.Modal.getOrCreateInstance(document.getElementById('venueCalendarModal'));
  venueCalendarModalInstance.show();
}

function submitVenueCalendar() {
  const btn = document.getElementById('saveVenueCalendarBtn');
  const errorBox = document.getElementById('venueCalendarError');
  errorBox.textContent = '';
  const resource = {
    hall: document.getElementById('venueCalendarHall').value,
    mainLocation: document.getElementById('venueCalendarMainLocation').value,
    calendarId: document.getElementById('venueCalendarId').value.trim(),
    note: document.getElementById('venueCalendarNote').value.trim()
  };

  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      if (venueCalendarModalInstance) venueCalendarModalInstance.hide();
      if (res?.resource) {
        venueResources = venueResources.map(item =>
          item.hall === res.resource.hall && item.mainLocation === res.resource.mainLocation ? res.resource : item
        );
        setupVenueFilters();
        renderVenueManagement();
      }
      loadVenueAvailability();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .saveVenueResourceCalendar({ currentUser, resource });
}

function renderVenueCalendarErrors(errors) {
  const errorBox = document.getElementById('venueError');
  if (!errors.length) return;
  errorBox.textContent = errors.map(item =>
    `${item.hall} / ${item.mainLocation}：${item.message}`
  ).join('；');
}

function getVenueCalendarError(resource) {
  return (venueAvailability?.calendarErrors || []).find(item =>
    item.hall === resource.hall && item.mainLocation === resource.mainLocation
  );
}

function formatVenueTime(value) {
  if (!value) return '';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
}
</script>
