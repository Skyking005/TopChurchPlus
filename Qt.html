<section id="qtView" class="d-none tc-page">
  <div class="section-card tc-card tc-page-content p-0 overflow-hidden">
    <div class="qt-toolbar tc-page-toolbar">
      <ul class="nav nav-tabs flex-wrap" id="qtManagementTabs">
        <li class="nav-item">
          <button type="button" class="nav-link active qt-tab-btn" data-qt-tab="orders" onclick="switchQtTab('orders')">訂購管理</button>
        </li>
        <li class="nav-item">
          <button type="button" class="nav-link qt-tab-btn" data-qt-tab="pickup" onclick="switchQtTab('pickup')">領取管理</button>
        </li>
        <li class="nav-item">
          <button type="button" class="nav-link qt-tab-btn" data-qt-tab="finance" onclick="switchQtTab('finance')">財務管理</button>
        </li>
        <li class="nav-item">
          <button type="button" class="nav-link qt-tab-btn" data-qt-tab="reports" onclick="switchQtTab('reports')">報表分析</button>
        </li>
        <li class="nav-item">
          <button type="button" class="nav-link qt-tab-btn" data-qt-tab="inventory" onclick="switchQtTab('inventory')">庫存管理</button>
        </li>
      </ul>
    </div>

    <div class="row g-3 p-3 border-bottom tc-page-kpi-area" id="qtDashboardCards">
      <div class="col-6 col-lg-3">
        <div class="tc-kpi-card">
          <div class="text-muted small">訂購總數</div>
          <div class="fs-4 fw-semibold" id="qtDashboardOrderCount">-</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="tc-kpi-card">
          <div class="text-muted small">未付款</div>
          <div class="fs-4 fw-semibold text-warning" id="qtDashboardUnpaidCount">-</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="tc-kpi-card">
          <div class="text-muted small">待審核</div>
          <div class="fs-4 fw-semibold text-primary" id="qtDashboardPendingReviewCount">-</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="tc-kpi-card">
          <div class="text-muted small">已付款</div>
          <div class="fs-4 fw-semibold text-success" id="qtDashboardPaidCount">-</div>
        </div>
      </div>
    </div>

    <div id="qtOrdersPanel" class="qt-panel">
      <div class="input-group qt-search-row tc-page-filter-area">
        <span class="input-group-text">關鍵字搜尋</span>
        <input id="qtOrderKeyword" class="form-control" placeholder="單號/姓名/電話/牧區搜尋" onkeydown="handleQtOrderSearchKey(event)">
        <button type="button" class="btn btn-outline-secondary" onclick="loadQtOrders(1)">搜尋</button>
      </div>

      <div class="table-responsive">
        <table class="table table-hover tc-table align-middle mb-0">
          <thead>
            <tr>
              <th>數位訂單編號</th>
              <th>牧區</th>
              <th>姓名</th>
              <th>電話</th>
              <th>訂購區間</th>
              <th></th>
              <th>訂購方案</th>
              <th class="text-end">數量</th>
              <th class="text-end">金額</th>
              <th>狀態</th>
              <th>歷史</th>
            </tr>
          </thead>
          <tbody id="qtOrderTableBody"></tbody>
        </table>
      </div>

      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 p-3 border-top">
        <div id="qtOrderPageInfo" class="text-muted small"></div>
        <div class="btn-group">
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="changeQtOrderPage(-1)">上一頁</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="changeQtOrderPage(1)">下一頁</button>
        </div>
      </div>
    </div>

    <div id="qtPickupPanel" class="qt-panel d-none">
      <div class="p-3 border-top">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <div>
            <h6 class="mb-1">開放領取月份</h6>
            <div class="text-muted small">此設定供 QT 領取管理與櫃台流程驗證使用。</div>
          </div>
          <div class="d-flex flex-wrap gap-2 align-items-end">
            <div>
              <label class="form-label small mb-1">月份</label>
              <input id="qtOpenPickupMonth" type="month" class="form-control form-control-sm">
            </div>
            <button type="button" class="btn btn-outline-primary btn-sm" id="saveQtSettingsBtn" onclick="submitQtSettings()">儲存設定</button>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-6 col-lg-4">
            <div class="tc-kpi-card">
              <div class="text-muted small">本月應領取</div>
              <div class="fs-5 fw-semibold" id="qtDashboardPickupTotal">-</div>
            </div>
          </div>
          <div class="col-6 col-lg-4">
            <div class="tc-kpi-card">
              <div class="text-muted small">已領取</div>
              <div class="fs-5 fw-semibold text-success" id="qtDashboardPickupReceived">-</div>
            </div>
          </div>
          <div class="col-12 col-lg-4">
            <div class="tc-kpi-card">
              <div class="text-muted small">未領取</div>
              <div class="fs-5 fw-semibold text-warning" id="qtDashboardPickupUnreceived">-</div>
            </div>
          </div>
        </div>

        <div class="row g-2 align-items-end qt-search-row tc-page-filter-area">
          <div class="col-12 col-md-3">
            <label class="form-label">領取月份</label>
            <input id="qtPickupReportMonth" type="month" class="form-control">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">領取狀態</label>
            <select id="qtPickupStatusFilter" class="form-select">
              <option value="unreceived">未領取</option>
              <option value="received">已領取</option>
              <option value="all">全部</option>
            </select>
          </div>
          <div class="col-12 col-md-2 d-grid">
            <button type="button" class="btn btn-primary" onclick="loadQtPickupReport()">查詢</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover tc-table align-middle mb-0">
            <thead id="qtPickupTableHead"></thead>
            <tbody id="qtPickupTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="qtFinancePanel" class="qt-panel d-none">
      <div class="p-3 border-top">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <div>
            <h6 class="mb-1">分堂財務報表</h6>
            <div class="text-muted small">依月份統計訂購數、數量與金額；匯款審核資料模型需 DBA Review 後實作。</div>
          </div>
        </div>
        <div class="row g-2 align-items-end qt-search-row tc-page-filter-area">
          <div class="col-12 col-md-3">
            <label class="form-label">報表月份</label>
            <input id="qtFinanceReportMonth" type="month" class="form-control">
          </div>
          <div class="col-12 col-md-2 d-grid">
            <button type="button" class="btn btn-primary" onclick="loadQtFinanceReport()">查詢</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover tc-table align-middle mb-0">
            <thead id="qtFinanceTableHead"></thead>
            <tbody id="qtFinanceTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="qtReportsPanel" class="qt-panel d-none">
      <div class="p-3 border-top">
        <div class="row g-2 align-items-end qt-search-row tc-page-filter-area">
          <div class="col-12 col-md-3">
            <label class="form-label">報表類型</label>
            <select id="qtAnalyticsReportType" class="form-select" onchange="loadQtAnalyticsReport()">
              <option value="expiring">本月到期提醒</option>
              <option value="pastoral-summary">牧區訂閱統計</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">報表月份</label>
            <input id="qtAnalyticsReportMonth" type="month" class="form-control">
          </div>
          <div class="col-12 col-md-2 d-grid">
            <button type="button" class="btn btn-primary" onclick="loadQtAnalyticsReport()">查詢</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover tc-table align-middle mb-0">
            <thead id="qtAnalyticsTableHead"></thead>
            <tbody id="qtAnalyticsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="qtInventoryPanel" class="qt-panel d-none">
      <div class="p-3 border-top">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <div>
            <h6 class="mb-1">會堂月庫存</h6>
            <div class="text-muted small">供訂購、櫃台與未來 Line App 下單前檢查使用。</div>
          </div>
          <div class="btn-group">
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="openQtMovementModal()">新增異動</button>
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="openQtTransferModal()">庫存調撥</button>
          </div>
        </div>
        <div class="row g-2 align-items-end mb-3">
          <div class="col-12 col-md-3">
            <label class="form-label">月份</label>
            <input id="qtIssueMonth" type="month" class="form-control">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">會堂</label>
            <select id="qtChurchFilter" class="form-select"></select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">QT 類型</label>
            <select id="qtProductFilter" class="form-select"></select>
          </div>
          <div class="col-12 col-md-3 d-grid">
            <button type="button" class="btn btn-primary" onclick="loadQtInventory()">查詢庫存</button>
          </div>
        </div>
        <div class="row g-3">
          <div class="col-12 col-xl-7">
            <div class="table-responsive border rounded">
              <table class="table table-sm table-hover tc-table align-middle mb-0">
                <thead>
                  <tr>
                    <th>月份</th>
                    <th>會堂</th>
                    <th>QT 類型</th>
                    <th class="text-end">入庫</th>
                    <th class="text-end">出庫/預扣</th>
                    <th class="text-end">可用庫存</th>
                  </tr>
                </thead>
                <tbody id="qtInventoryTableBody"></tbody>
              </table>
            </div>
          </div>
          <div class="col-12 col-xl-5">
            <div class="table-responsive border rounded">
              <table class="table table-sm tc-table align-middle mb-0">
                <thead>
                  <tr>
                    <th>方案</th>
                    <th>類型</th>
                    <th class="text-end">月數</th>
                    <th class="text-end">金額</th>
                  </tr>
                </thead>
                <tbody id="qtPricePlanTableBody"></tbody>
              </table>
            </div>
          </div>
          <div class="col-12">
            <div class="table-responsive border rounded">
              <table class="table table-sm table-hover tc-table align-middle mb-0">
                <thead>
                  <tr>
                    <th>時間</th>
                    <th>月份</th>
                    <th>會堂</th>
                    <th>QT 類型</th>
                    <th>異動</th>
                    <th class="text-end">數量</th>
                    <th>備註</th>
                  </tr>
                </thead>
                <tbody id="qtMovementTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="modal fade" id="qtOrderDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">QT 訂單詳情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="qtOrderDetailBody"></div>
    </div>
  </div>
</div>

<div class="modal fade" id="qtMovementModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">QT 庫存異動</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">月份</label>
            <input id="qtMovementMonth" type="month" class="form-control">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">會堂</label>
            <select id="qtMovementChurch" class="form-select"></select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">QT 類型</label>
            <select id="qtMovementProduct" class="form-select"></select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">異動類型</label>
            <select id="qtMovementType" class="form-select">
              <option value="initial_stock">期初庫存</option>
              <option value="receive">進貨入庫</option>
              <option value="sale">銷售出庫</option>
              <option value="reserve">預扣庫存</option>
              <option value="release">解除預扣</option>
              <option value="adjustment">盤點調整</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">數量</label>
            <input id="qtMovementQuantity" type="number" min="1" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">備註</label>
            <input id="qtMovementNote" class="form-control">
          </div>
        </div>
        <div id="qtMovementError" class="text-danger small mt-3"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="confirmQtMovementBtn" onclick="submitQtMovement()">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="qtTransferModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">QT 庫存調撥</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">月份</label>
            <input id="qtTransferMonth" type="month" class="form-control">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">QT 類型</label>
            <select id="qtTransferProduct" class="form-select"></select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">調出會堂</label>
            <select id="qtTransferFromChurch" class="form-select"></select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">調入會堂</label>
            <select id="qtTransferToChurch" class="form-select"></select>
          </div>
          <div class="col-12">
            <label class="form-label">數量</label>
            <input id="qtTransferQuantity" type="number" min="1" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">備註</label>
            <input id="qtTransferNote" class="form-control">
          </div>
        </div>
        <div id="qtTransferError" class="text-danger small mt-3"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="confirmQtTransferBtn" onclick="submitQtTransfer()">調撥</button>
      </div>
    </div>
  </div>
</div>
