<script>
let allAssets = [];
let currentAssetPage = 1;
let totalAssetCount = 0;
let currentAssetLocations = [];

function openAssetSystem() {
  const canEditFeature = getFeatureAccess('asset') === 'edit';
  document.getElementById('mainTitle').textContent = '資產管理系統';
  document.getElementById('featureSelectionView').classList.add('d-none');
  document.getElementById('overviewView').classList.add('d-none');
  document.getElementById('purchaseView').classList.add('d-none');
  document.getElementById('pastoralView').classList.add('d-none');
  document.getElementById('detailView').classList.add('d-none');
  document.getElementById('systemView').classList.add('d-none');
  document.getElementById('assetView').classList.remove('d-none');
  document.getElementById('assetListView').classList.remove('d-none');
  document.getElementById('assetDetailView').classList.add('d-none');
  document.getElementById('addAssetBtn').classList.toggle('d-none', !canEditFeature);
  document.querySelectorAll('.asset-input').forEach(el => { el.disabled = !canEditFeature; });
  document.getElementById('saveAssetBtn').classList.toggle('d-none', !canEditFeature);
  loadAssetSystem();
}

function loadAssetSystem() {
  ensureInitialData(() => {
    setupAssetOptions();
    loadAssetLocations(() => loadAssets());
  });
}

function ensureInitialData(callback) {
  if (initialData) {
    callback();
    return;
  }

  google.script.run
    .withSuccessHandler(data => {
      initialData = data;
      callback();
    })
    .withFailureHandler(showError)
    .getInitialData();
}

function setupAssetOptions() {
  fillSelect('assetSearchType', initialData.params.assetTypes || [], true);
  fillSelect('assetSearchHall', initialData.params.units || [], true);
  fillSelect('assetSearchStatus', initialData.params.assetStatuses || [], true);
  fillSelect('assetType', initialData.params.assetTypes || [], false);
  fillSelect('assetStatus', initialData.params.assetStatuses || [], false);
  fillSelect('assetVendor', initialData.params.assetVendors || [], false);
}

function loadAssetLocations(callback) {
  google.script.run
    .withSuccessHandler(locations => {
      currentAssetLocations = locations || [];
      fillAssetLocationSelect();
      if (callback) callback();
    })
    .withFailureHandler(showError)
    .getAssetLocations(currentUser);
}

function fillAssetLocationSelect() {
  const select = document.getElementById('assetLocationId');
  select.innerHTML = '';

  currentAssetLocations.forEach(location => {
    const opt = document.createElement('option');
    opt.value = location.locationId;
    opt.textContent = formatLocationLabel(location);
    select.appendChild(opt);
  });
}

function loadAssets() {
  const filters = {
    keyword: document.getElementById('assetSearchKeyword').value,
    assetType: document.getElementById('assetSearchType').value,
    hall: document.getElementById('assetSearchHall').value,
    status: document.getElementById('assetSearchStatus').value,
    page: currentAssetPage,
    pageSize,
    sortBy: document.getElementById('assetSortBy')?.value || 'assetId',
    sortDirection: document.getElementById('assetSortDirection')?.value || 'asc'
  };

  google.script.run
    .withSuccessHandler(result => {
      if (Array.isArray(result)) {
        allAssets = result;
        totalAssetCount = result.length;
      } else {
        allAssets = result.rows || [];
        totalAssetCount = result.total || 0;
      }
      renderAssets();
    })
    .withFailureHandler(showError)
    .getAssets(filters, currentUser);
}

function renderAssets() {
  renderDesktopAssets();
  renderMobileAssets();
  renderAssetPager();
}

function sortAssets() {
  const sortBy = document.getElementById('assetSortBy')?.value || 'assetId';
  const direction = document.getElementById('assetSortDirection')?.value || 'asc';
  const multiplier = direction === 'desc' ? -1 : 1;

  allAssets.sort((a, b) => {
    const left = String(a[sortBy] || '');
    const right = String(b[sortBy] || '');
    return left.localeCompare(right, 'zh-Hant', {
      numeric: true,
      sensitivity: 'base'
    }) * multiplier;
  });
}

function getPagedAssets() {
  return allAssets;
}

function renderDesktopAssets() {
  const body = document.getElementById('assetTableBody');
  body.innerHTML = '';

  getPagedAssets().forEach(asset => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><button class="project-link" onclick="openAsset('${escapeAttr(asset.assetId)}')">${escapeHtml(asset.assetId)}</button></td>
      <td>${escapeHtml(asset.assetName)}</td>
      <td>${escapeHtml(asset.assetType)}</td>
      <td>${escapeHtml(asset.locationLabel)}</td>
      <td><span class="asset-status-badge ${getAssetStatusClass(asset.status)}">${escapeHtml(asset.status)}</span></td>
    `;
    body.appendChild(tr);
  });
}

function renderMobileAssets() {
  const container = document.getElementById('mobileAssetList');
  container.innerHTML = '';

  getPagedAssets().forEach(asset => {
    const card = document.createElement('div');
    card.className = 'project-card-mobile';
    card.innerHTML = `
      <h6><button class="project-link" onclick="openAsset('${escapeAttr(asset.assetId)}')">${escapeHtml(asset.assetId)}</button></h6>
      <div class="project-meta">${escapeHtml(asset.assetName)} / ${escapeHtml(asset.assetType)}</div>
      <div class="project-meta">${escapeHtml(asset.locationLabel)}</div>
      <div class="project-meta"><span class="asset-status-badge ${getAssetStatusClass(asset.status)}">${escapeHtml(asset.status)}</span></div>
    `;
    container.appendChild(card);
  });
}

function renderAssetPager() {
  const totalPages = Math.max(1, Math.ceil(totalAssetCount / pageSize));
  document.getElementById('assetPager').textContent = `${currentAssetPage} / ${totalPages}`;
  document.getElementById('assetPageInfo').textContent = `? ${totalAssetCount} ?`;
}

function prevAssetPage() {
  if (currentAssetPage <= 1) return;
  currentAssetPage -= 1;
  loadAssets();
}

function nextAssetPage() {
  const totalPages = Math.max(1, Math.ceil(totalAssetCount / pageSize));
  if (currentAssetPage >= totalPages) return;
  currentAssetPage += 1;
  loadAssets();
}

function resetAssetPageAndLoad() {
  currentAssetPage = 1;
  loadAssets();
}

function openAsset(assetId) {
  google.script.run
    .withSuccessHandler(renderAssetDetail)
    .withFailureHandler(showError)
    .getAssetDetail(assetId, currentUser);
}

function openNewAsset() {
  if (getFeatureAccess('asset') !== 'edit') {
    alert('目前只有資產唯讀權限，無法新增資產');
    return;
  }
  renderAssetDetail({ asset: createEmptyAsset() });
}

function renderAssetDetail(data) {
  const canEditFeature = getFeatureAccess('asset') === 'edit';
  const asset = data.asset || createEmptyAsset();
  document.getElementById('assetListView').classList.add('d-none');
  document.getElementById('assetDetailView').classList.remove('d-none');

  document.getElementById('assetId').value = asset.assetId || '';
  document.getElementById('assetType').value = asset.assetType || '';
  document.getElementById('assetName').value = asset.assetName || '';
  document.getElementById('assetBrand').value = asset.brand || '';
  document.getElementById('assetModel').value = asset.model || '';
  document.getElementById('assetSerialNo').value = asset.serialNo || '';
  document.getElementById('assetPurchasePrice').value = asset.purchasePrice || '';
  document.getElementById('assetPurchaseDate').value = toDateInputValue(asset.purchaseDate);
  document.getElementById('assetVendor').value = asset.vendor || '';
  document.getElementById('assetStatus').value = asset.status || '使用中';
  document.getElementById('assetLocationId').value = asset.locationId || '';
  document.getElementById('assetNote').value = asset.note || '';
  document.getElementById('assetSourcePurchaseId').value = asset.sourcePurchaseId || '';
  document.getElementById('assetSourcePaymentId').value = asset.sourcePaymentId || '';
  document.getElementById('assetSourcePaymentItemId').value = asset.sourcePaymentItemId || '';
  document.querySelectorAll('.asset-input').forEach(el => { el.disabled = !canEditFeature; });
  document.getElementById('saveAssetBtn').classList.toggle('d-none', !canEditFeature);
}

function backToAssetList() {
  document.getElementById('assetDetailView').classList.add('d-none');
  document.getElementById('assetListView').classList.remove('d-none');
  loadAssets();
}

function saveCurrentAsset() {
  const btn = document.getElementById('saveAssetBtn');
  const asset = collectAssetForm();

  if (!asset.assetName) {
    alert('請填寫設備名稱');
    return;
  }
  if (!asset.assetType) {
    alert('請選擇設備類型');
    return;
  }
  if (!asset.locationId) {
    alert('請選擇存放位置');
    return;
  }

  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      alert(res.message);
      openAsset(res.assetId);
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      showError(err);
    })
    .saveAsset({ currentUser, asset });
}

function collectAssetForm() {
  return {
    assetId: document.getElementById('assetId').value.trim(),
    assetType: document.getElementById('assetType').value,
    assetName: document.getElementById('assetName').value.trim(),
    brand: document.getElementById('assetBrand').value.trim(),
    model: document.getElementById('assetModel').value.trim(),
    serialNo: document.getElementById('assetSerialNo').value.trim(),
    purchasePrice: document.getElementById('assetPurchasePrice').value,
    purchaseDate: document.getElementById('assetPurchaseDate').value,
    vendor: document.getElementById('assetVendor').value,
    status: document.getElementById('assetStatus').value,
    locationId: document.getElementById('assetLocationId').value,
    note: document.getElementById('assetNote').value.trim()
  };
}

function createEmptyAsset() {
  return {
    assetId: '',
    assetType: '',
    assetName: '',
    brand: '',
    model: '',
    serialNo: '',
    purchasePrice: '',
    purchaseDate: '',
    vendor: '',
    status: '使用中',
    locationId: '',
    note: ''
  };
}

function formatLocationLabel(location) {
  return [location.hall, location.mainLocation, location.subLocation].filter(Boolean).join(' / ');
}

function formatMoney(value) {
  const number = Number(value || 0);
  if (!number) return '';
  return number.toLocaleString('zh-TW');
}

function getAssetStatusClass(status) {
  const value = String(status || '').trim();
  if (value === '使用中') return 'asset-status-active';
  if (value === '維修中') return 'asset-status-repair';
  if (value === '已報廢') return 'asset-status-retired';
  if (value === '已請購') return 'asset-status-pending';
  if (value === '已停用') return 'asset-status-disabled';
  return 'asset-status-default';
}
</script>
