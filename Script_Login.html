// Centralize top-level view switching so new modules only need to be added once.
function handleLogin() {
  const btn = event.target;
  const email = document.getElementById('loginEmail').value.trim();
  const deviceType = 'desktop';
  const errorBox = document.getElementById('loginError');
  const verificationBox = document.getElementById('loginVerificationBox');

  errorBox.textContent = '';
  pendingLoginVerification = null;
  if (verificationBox) verificationBox.classList.add('d-none');

  if (!email) {
    errorBox.textContent = '請輸入電子信箱';
    return;
  }

  setButtonLoading(btn, true, '登入中...');

  google.script.run
    .withSuccessHandler(result => {
      setButtonLoading(btn, false);
      if (result && result.requiresVerification) {
        pendingLoginVerification = {
          verificationId: result.verificationId,
          email,
          deviceType
        };
        if (verificationBox) verificationBox.classList.remove('d-none');
        const codeInput = document.getElementById('loginVerificationCode');
        if (codeInput) {
          codeInput.value = '';
          codeInput.focus();
        }
        errorBox.textContent = result.message || '已寄送登入驗證碼，請完成驗證。';
        errorBox.classList.remove('text-danger');
        errorBox.classList.add('text-muted');
        return;
      }

      completeLogin(result);
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      currentUser = null;

      document.getElementById('loginView').classList.remove('d-none');
      document.getElementById('mainView').classList.add('d-none');
      errorBox.classList.add('text-danger');
      errorBox.classList.remove('text-muted');
      errorBox.textContent = err.message || err;
    })
    .login(email, deviceType, getLoginDeviceInfo());
}

function showInternalLogin() {
  document.querySelector('.login-entry-card')?.classList.remove('login-entry-active');
  document.getElementById('loginEntryPanel').classList.add('d-none');
  document.getElementById('counterPinLoginPanel').classList.add('d-none');
  document.getElementById('internalLoginPanel').classList.remove('d-none');
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginEmail').focus();
}

function showCounterPinLogin() {
  document.querySelector('.login-entry-card')?.classList.remove('login-entry-active');
  document.getElementById('loginEntryPanel').classList.add('d-none');
  document.getElementById('internalLoginPanel').classList.add('d-none');
  document.getElementById('counterPinLoginPanel').classList.remove('d-none');
  document.getElementById('loginError').textContent = '';
  document.getElementById('counterPinCode').value = '';
  document.getElementById('counterPinCode').focus();
}

function backToLoginEntry() {
  document.querySelector('.login-entry-card')?.classList.add('login-entry-active');
  document.getElementById('loginEntryPanel').classList.remove('d-none');
  document.getElementById('internalLoginPanel').classList.add('d-none');
  document.getElementById('counterPinLoginPanel').classList.add('d-none');
  document.getElementById('loginVerificationBox').classList.add('d-none');
  document.getElementById('loginError').textContent = '';
  pendingLoginVerification = null;
}

function handleCounterPinLogin() {
  const btn = event.target;
  const errorBox = document.getElementById('loginError');
  const pinCode = document.getElementById('counterPinCode').value.trim().toUpperCase();
  errorBox.textContent = '';
  errorBox.classList.add('text-danger');
  errorBox.classList.remove('text-muted');
  if (!/^[A-Z][0-9]{5}$/.test(pinCode)) {
    errorBox.textContent = 'PIN Code 格式需為 1 碼英文 + 5 碼數字';
    return;
  }

  setButtonLoading(btn, true, '驗證中...');
  google.script.run
    .withSuccessHandler(user => {
      setButtonLoading(btn, false);
      completeCounterLogin(user);
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .loginCounterPin(pinCode, getLoginDeviceInfo());
}

function handleLoginVerification() {
  const btn = event.target;
  const errorBox = document.getElementById('loginError');
  const code = document.getElementById('loginVerificationCode').value.trim();

  errorBox.textContent = '';
  errorBox.classList.add('text-danger');
  errorBox.classList.remove('text-muted');

  if (!pendingLoginVerification || !pendingLoginVerification.verificationId) {
    errorBox.textContent = '驗證流程已失效，請重新登入。';
    return;
  }
  if (!code) {
    errorBox.textContent = '請輸入驗證碼';
    return;
  }

  setButtonLoading(btn, true, '驗證中...');

  google.script.run
    .withSuccessHandler(user => {
      setButtonLoading(btn, false);
      pendingLoginVerification = null;
      completeLogin(user);
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .verifyLogin({
      verificationId: pendingLoginVerification.verificationId,
      code,
      deviceType: pendingLoginVerification.deviceType,
      ...getLoginDeviceInfo()
    });
}

function completeLogin(user) {
  currentUser = user;

  loadInitialDataAfterLogin(() => {
    document.getElementById('loginView').classList.add('d-none');
    document.getElementById('mainView').classList.remove('d-none');
    document.getElementById('loginVerificationBox').classList.add('d-none');
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginError').classList.add('text-danger');
    document.getElementById('loginError').classList.remove('text-muted');
    updateUserInfo(user);
    startIdleLogoutWatcher();

    if (user.deviceType === 'mobile') {
      document.getElementById('addProjectBtn').classList.add('d-none');
    }

    backToFeatureMenu();
  });
}

function completeCounterLogin(user) {
  currentUser = user;
  loadInitialDataAfterLogin(() => {
    document.getElementById('loginView').classList.add('d-none');
    document.getElementById('mainView').classList.remove('d-none');
    document.getElementById('loginError').textContent = '';
    updateUserInfo(user);
    startIdleLogoutWatcher();
    openCounterWorkbench();
  });
}

function getLoginDeviceInfo() {
  return {
    deviceId: getOrCreateLoginDeviceId(),
    deviceLabel: buildLoginDeviceLabel(),
    userAgent: navigator.userAgent || '',
    language: navigator.language || '',
    screen: `${window.screen?.width || 0}x${window.screen?.height || 0}`
  };
}

function getOrCreateLoginDeviceId() {
  const key = 'topchurch_login_device_id';
  let value = localStorage.getItem(key);
  if (!value) {
    value = window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    localStorage.setItem(key, value);
  }
  return value;
}

function buildLoginDeviceLabel() {
  const platform = navigator.platform || 'Unknown platform';
  const browser = (navigator.userAgent || '').match(/(Chrome|Edg|Firefox|Safari)\/?\s*([\d.]+)/);
  return [platform, browser ? browser[0] : 'Browser'].filter(Boolean).join(' / ');
}


function loadInitialDataAfterLogin(callback) {
  preloadInitialData(callback);
}

function preloadInitialData(callback) {
  if (initialData) {
    if (callback) callback(initialData);
    return;
  }
  if (callback) initialDataCallbacks.push(callback);
  if (initialDataLoading) return;
  initialDataLoading = true;

  google.script.run
    .withSuccessHandler(data => {
      initialData = data;
      initialDataLoading = false;
      const callbacks = initialDataCallbacks.slice();
      initialDataCallbacks = [];
      callbacks.forEach(fn => fn(initialData));
    })
    .withFailureHandler(err => {
      initialDataLoading = false;
      initialDataCallbacks = [];
      const loginError = document.getElementById('loginError');
      if (loginError) loginError.textContent = err.message || err;
    })
    .getInitialData();
}

window.addEventListener('load', () => {
  const publicFormId = String(window.APP_BOOTSTRAP?.publicFormId || '').trim();
  if (publicFormId) {
    const publicResponseId = String(window.APP_BOOTSTRAP?.publicResponseId || '').trim();
    const publicEditToken = String(window.APP_BOOTSTRAP?.publicEditToken || '').trim();
    if (publicResponseId && publicEditToken && typeof openPublicFormEdit === 'function') {
      openPublicFormEdit(publicFormId, publicResponseId, publicEditToken);
    } else {
      openPublicFormFill(publicFormId);
    }
    return;
  }
  preloadInitialData();
});

function logout() {
  currentUser = null;
  pendingLoginVerification = null;
  stopIdleLogoutWatcher();
  resetAppToLogin();
}

function startIdleLogoutWatcher() {
  ensureIdleWarningModal();
  resetIdleLogoutTimers();
  ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'].forEach(eventName => {
    document.removeEventListener(eventName, handleUserActivity, true);
    document.addEventListener(eventName, handleUserActivity, true);
  });
}

function stopIdleLogoutWatcher() {
  clearTimeout(idleWarningTimer);
  clearTimeout(idleLogoutTimer);
  idleWarningTimer = null;
  idleLogoutTimer = null;
  idleWarningVisible = false;
  ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'].forEach(eventName => {
    document.removeEventListener(eventName, handleUserActivity, true);
  });
  if (idleWarningModal) idleWarningModal.hide();
}

function handleUserActivity() {
  if (!currentUser) return;
  if (idleWarningVisible && idleWarningModal) {
    idleWarningVisible = false;
    idleWarningModal.hide();
  }
  resetIdleLogoutTimers();
}

function resetIdleLogoutTimers() {
  clearTimeout(idleWarningTimer);
  clearTimeout(idleLogoutTimer);
  idleWarningTimer = setTimeout(showIdleWarning, idleWarningMs);
  idleLogoutTimer = setTimeout(autoLogoutByIdle, idleLogoutMs);
}

function ensureIdleWarningModal() {
  if (document.getElementById('idleWarningModal')) {
    idleWarningModal = bootstrap.Modal.getOrCreateInstance(document.getElementById('idleWarningModal'));
    return;
  }

  const wrapper = document.createElement('div');
  wrapper.innerHTML = `
    <div class="modal fade" id="idleWarningModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">系統閒置提醒</h5>
          </div>
          <div class="modal-body">
            系統已閒置 3 分鐘。若持續沒有操作，將於 5 分鐘閒置時自動登出。
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" onclick="continueIdleSession()">繼續使用</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(wrapper.firstElementChild);
  idleWarningModal = bootstrap.Modal.getOrCreateInstance(document.getElementById('idleWarningModal'));
}

function showIdleWarning() {
  if (!currentUser) return;
  ensureIdleWarningModal();
  idleWarningVisible = true;
  idleWarningModal.show();
}

function continueIdleSession() {
  idleWarningVisible = false;
  if (idleWarningModal) idleWarningModal.hide();
  resetIdleLogoutTimers();
}

function autoLogoutByIdle() {
  if (!currentUser) return;
  stopIdleLogoutWatcher();
  currentUser = null;
  pendingLoginVerification = null;
  resetAppToLogin();
  const loginError = document.getElementById('loginError');
  if (loginError) loginError.textContent = '系統已閒置 5 分鐘，已自動登出。';
}

function updateUserInfo(user) {
  const info = document.getElementById('userInfo');
  if (!info) return;

  const displayName = [user.name, user.position].filter(Boolean).join(' ');
  const roles = getUserRoles(user).join('、') || '未設定身分';
  const deviceLabel = user.deviceType === 'mobile' ? '手機瀏覽模式' : '電腦完整模式';
  const counterChurch = user.workspaceMode === 'counter' && user.counterChurchName ? `｜${user.counterChurchName}` : '';
  info.textContent = `${displayName}｜${roles}${counterChurch}｜${deviceLabel}`;
}

function resetAppToLogin() {
  ['mainView', 'featureSelectionView', 'overviewView', 'detailView', 'purchaseView', 'adminSupplyView', 'assetView', 'venueView', 'zoomView', 'sundayMessageView', 'pastoralView', 'attendanceView', 'formsView', 'educationView', 'qtView', 'lineBotView', 'qrcodeView', 'counterWorkbenchView', 'systemView'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });

  const loginView = document.getElementById('loginView');
  if (loginView) loginView.classList.remove('d-none');
  backToLoginEntry();

  const userInfo = document.getElementById('userInfo');
  if (userInfo) userInfo.textContent = '';

  const mainTitle = document.getElementById('mainTitle');
  if (mainTitle) mainTitle.textContent = '系統功能選擇';

  const loginError = document.getElementById('loginError');
  if (loginError) {
    loginError.textContent = '';
    loginError.classList.add('text-danger');
    loginError.classList.remove('text-muted');
  }

  const verificationBox = document.getElementById('loginVerificationBox');
  if (verificationBox) verificationBox.classList.add('d-none');

  const verificationCode = document.getElementById('loginVerificationCode');
  if (verificationCode) verificationCode.value = '';

  const addProjectBtn = document.getElementById('addProjectBtn');
  if (addProjectBtn) addProjectBtn.classList.remove('d-none');
}

function hideAllMainViews() {
  MAIN_VIEW_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });
}

function showMainView(viewId) {
  hideAllMainViews();
  const el = document.getElementById(viewId);
  if (el) el.classList.remove('d-none');
}

function loadInitialData() {
  preloadInitialData(() => {
    setupSearchOptions();
    setupDetailOptions();
    loadProjects();
  });
}

function backToFeatureMenu() {
  document.getElementById('mainTitle').textContent = '系統功能選擇';
  renderFeatureMenu();
  showMainView('featureSelectionView');
}

function renderFeatureMenu() {
  const grid = document.getElementById('featureGrid');
  if (!grid || !currentUser) return;

  const allowedKeys = getAllowedFeatureKeys(currentUser);
  const preferences = getFeaturePreferences();
  const features = SYSTEM_FEATURES
    .filter(feature => allowedKeys.includes(feature.key))
    .map(feature => ({
      ...feature,
      mode: getFeatureAccessLabel(getFeatureAccess(feature.key)),
      usageCount: getFeatureUsageCount(feature.key),
      pinned: preferences.pinned.includes(feature.key)
    }))
    .sort((a, b) => compareFeatureOrder(a, b, preferences));
  grid.innerHTML = '';
  renderFeatureToolbar(preferences);

  if (!features.length) {
    grid.innerHTML = '<div class="feature-empty">目前帳號尚未被授權任何系統入口，請洽管理員。</div>';
    return;
  }

  features.forEach((feature, index) => {
    const card = document.createElement('div');
    card.className = `feature-option${feature.pinned ? ' feature-option-pinned' : ''}`;
    card.tabIndex = 0;
    card.role = 'button';
    card.dataset.featureKey = feature.key;
    card.onclick = () => window[feature.action](feature);
    card.onkeydown = evt => {
      if (evt.key === 'Enter' || evt.key === ' ') {
        evt.preventDefault();
        window[feature.action](feature);
      }
    };
    card.innerHTML = `
      <span class="feature-card-head">
        <span class="feature-icon" aria-hidden="true">${getFeatureIconSvg(feature.icon || feature.key)}</span>
        <span class="feature-title">${escapeHtml(feature.title)}</span>
      </span>
      <span class="feature-desc">${escapeHtml(feature.desc)}</span>
      <span class="feature-meta">
        ${feature.usageCount > 0 ? `<span class="feature-hint">常用：近 180 天 ${escapeHtml(feature.usageCount)} 次</span>` : ''}
        ${feature.mode ? `<span class="feature-access">${escapeHtml(feature.mode)}</span>` : ''}
        ${feature.action === 'openComingSoonSystem' ? '<span class="feature-soon">建置中</span>' : ''}
      </span>
      <span class="feature-custom-actions" onclick="event.stopPropagation()" onkeydown="event.stopPropagation()">
        <button type="button" class="feature-action-btn${feature.pinned ? ' feature-action-btn-active' : ''}" title="${feature.pinned ? '取消釘選' : '釘選'}" onclick="toggleFeaturePin('${escapeAttr(feature.key)}')">${feature.pinned ? '已釘選' : '釘選'}</button>
        <button type="button" class="feature-action-icon" title="向前移動" ${index === 0 ? 'disabled' : ''} onclick="moveFeatureOrder('${escapeAttr(feature.key)}', -1)">←</button>
        <button type="button" class="feature-action-icon" title="向後移動" ${index === features.length - 1 ? 'disabled' : ''} onclick="moveFeatureOrder('${escapeAttr(feature.key)}', 1)">→</button>
      </span>
    `;
    grid.appendChild(card);
  });
}

function renderFeatureToolbar(preferences) {
  const toolbar = document.getElementById('featureToolbar');
  if (!toolbar) return;
  const hasCustom = hasFeatureCustomOrder(preferences);
  toolbar.innerHTML = `
    <div class="feature-toolbar-note">${hasCustom ? '已使用個人功能排序' : '依常用程度動態排序'}</div>
    ${hasCustom ? '<button type="button" class="btn btn-outline-secondary btn-sm" onclick="resetFeaturePreferences()">恢復動態排序</button>' : ''}
  `;
}

function compareFeatureOrder(a, b, preferences) {
  const hasCustom = hasFeatureCustomOrder(preferences);
  const aPinned = preferences.pinned.includes(a.key);
  const bPinned = preferences.pinned.includes(b.key);
  if (aPinned !== bPinned) return aPinned ? -1 : 1;
  if (hasCustom) {
    const aRank = getFeaturePreferenceRank(a.key, preferences.order);
    const bRank = getFeaturePreferenceRank(b.key, preferences.order);
    if (aRank !== bRank) return aRank - bRank;
  }
  return b.usageCount - a.usageCount || getSystemFeatureRank(a.key) - getSystemFeatureRank(b.key);
}

function getSystemFeatureRank(featureKey) {
  const index = SYSTEM_FEATURES.findIndex(item => item.key === featureKey);
  return index >= 0 ? index : 9999;
}

function getFeaturePreferenceRank(featureKey, order) {
  const index = order.indexOf(featureKey);
  return index >= 0 ? index : 9999 + getSystemFeatureRank(featureKey);
}

function hasFeatureCustomOrder(preferences = getFeaturePreferences()) {
  return Boolean(preferences.pinned.length || preferences.order.length);
}

function getFeaturePreferences() {
  const empty = { pinned: [], order: [] };
  try {
    const raw = localStorage.getItem(getFeaturePreferencesKey());
    const parsed = raw ? JSON.parse(raw) : empty;
    return {
      pinned: normalizeFeatureKeys(parsed.pinned),
      order: normalizeFeatureKeys(parsed.order)
    };
  } catch (err) {
    return empty;
  }
}

function saveFeaturePreferences(preferences) {
  localStorage.setItem(getFeaturePreferencesKey(), JSON.stringify({
    pinned: normalizeFeatureKeys(preferences.pinned),
    order: normalizeFeatureKeys(preferences.order)
  }));
}

function getFeaturePreferencesKey() {
  const userKey = currentUser?.staffId || currentUser?.email || currentUser?.name || 'anonymous';
  return `topchurch_feature_preferences_${userKey}`;
}

function normalizeFeatureKeys(keys) {
  const validKeys = new Set(SYSTEM_FEATURES.map(feature => feature.key));
  return [...new Set((Array.isArray(keys) ? keys : [])
    .map(key => String(key || '').trim())
    .filter(key => validKeys.has(key)))];
}

function getRenderedFeatureKeys() {
  return [...document.querySelectorAll('#featureGrid .feature-option')]
    .map(card => card.dataset.featureKey)
    .filter(Boolean);
}

function toggleFeaturePin(featureKey) {
  const preferences = getFeaturePreferences();
  const pinned = new Set(preferences.pinned);
  if (pinned.has(featureKey)) {
    pinned.delete(featureKey);
  } else {
    pinned.add(featureKey);
    if (!preferences.order.includes(featureKey)) {
      preferences.order = [featureKey].concat(preferences.order);
    }
  }
  preferences.pinned = [...pinned];
  saveFeaturePreferences(preferences);
  renderFeatureMenu();
}

function moveFeatureOrder(featureKey, direction) {
  const keys = getRenderedFeatureKeys();
  const index = keys.indexOf(featureKey);
  const targetIndex = index + direction;
  if (index < 0 || targetIndex < 0 || targetIndex >= keys.length) return;
  [keys[index], keys[targetIndex]] = [keys[targetIndex], keys[index]];
  const preferences = getFeaturePreferences();
  preferences.order = keys;
  saveFeaturePreferences(preferences);
  renderFeatureMenu();
}

function resetFeaturePreferences() {
  localStorage.removeItem(getFeaturePreferencesKey());
  renderFeatureMenu();
}

function getUserRoles(user) {
  const roles = Array.isArray(user.roles) ? user.roles : [];
  const values = roles.concat(user.role || [])
    .map(role => String(role || '').trim())
    .filter(Boolean);
  return [...new Set(values)];
}

function getAllowedFeatureKeys(user) {
  const permissions = getEffectiveFeatureAccess();
  const keys = Object.keys(permissions).filter(key => permissions[key] === 'read' || permissions[key] === 'edit');
  if (keys.length) return keys;
  return [...new Set(getUserRoles(user).flatMap(role => ROLE_FEATURE_ACCESS[role] || []))];
}

function getFeatureUsageCount(featureKey) {
  return Number(currentUser?.featureUsage?.[featureKey]?.count || 0);
}

function recordFeatureUsage(featureKey, action = 'open', metadata = {}) {
  if (!currentUser || !featureKey) return;
  google.script.run
    .withSuccessHandler(() => {})
    .withFailureHandler(() => {})
    .recordSystemUsage({ currentUser, featureKey, action, metadata });
}

function getFeatureAccess(featureKey) {
  return getEffectiveFeatureAccess()[featureKey] || 'none';
}

function getEffectiveFeatureAccess() {
  const result = {};
  const rank = { none: 0, read: 1, edit: 2 };
  const permissions = initialData?.featurePermissions || [];
  getUserRoles(currentUser).forEach(role => {
    permissions
      .filter(item => item.role === role)
      .forEach(item => {
        const current = result[item.featureKey] || 'none';
        if ((rank[item.accessLevel] || 0) > (rank[current] || 0)) result[item.featureKey] = item.accessLevel;
      });
  });
  if (currentUser?.featurePermissions) {
    Object.assign(result, currentUser.featurePermissions);
  }
  const roles = getUserRoles(currentUser);
  const grantRead = featureKey => {
    const current = result[featureKey] || 'none';
    if ((rank[current] || 0) < rank.read) result[featureKey] = 'read';
  };
  if (roles.includes('超級管理者')) {
    SYSTEM_FEATURES.forEach(feature => grantRead(feature.key));
  } else if (roles.includes('管理員')) {
    SYSTEM_FEATURES
      .filter(feature => !['system', 'sunday_message', 'dev_management'].includes(feature.key))
      .forEach(feature => grantRead(feature.key));
  }
  return result;
}

function getFeatureAccessLabel(access) {
  if (access === 'edit') return '操作';
  if (access === 'read') return '唯讀';
  return '';
}

function openProjectSystem() {
  recordFeatureUsage('project');
  const canEditFeature = getFeatureAccess('project') === 'edit';
  document.getElementById('mainTitle').textContent = '專案管理系統';
  showMainView('overviewView');
  document.getElementById('addProjectBtn').classList.toggle('d-none', !canEditFeature || currentUser.deviceType === 'mobile');
  loadInitialData();
}

function openPurchaseSystem() {
  recordFeatureUsage('finance');
  const canEditFeature = getFeatureAccess('finance') === 'edit';
  document.getElementById('mainTitle').textContent = '財務系統';
  showMainView('purchaseView');
  document.getElementById('purchaseListView').classList.remove('d-none');
  document.getElementById('purchaseDetailView').classList.add('d-none');
  document.querySelectorAll('.purchase-input, #savePurchaseBtn').forEach(el => {
    el.disabled = !canEditFeature;
    if (el.id === 'savePurchaseBtn') el.classList.toggle('d-none', !canEditFeature);
  });
  loadPurchaseSystem();
}

function openComingSoonSystem(feature) {
  alert(`${feature.title}入口已建立，功能將於後續階段開放。`);
}
