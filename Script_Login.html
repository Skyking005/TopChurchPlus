<script>
const SYSTEM_FEATURES = [
  {
    key: 'project',
    title: '專案管理系統',
    desc: '專案建立、預算、會議與文件匯出',
    action: 'openProjectSystem'
  },
  {
    key: 'finance',
    title: '財務系統',
    desc: '採購申請、預借、支出證明與請款流程',
    action: 'openPurchaseSystem'
  },
  {
    key: 'asset',
    title: '資產管理系統',
    desc: '固定資產清冊、位置管理、狀態追蹤與財務購置來源',
    action: 'openAssetSystem'
  },
  {
    key: 'system',
    title: '系統管理',
    desc: '參數、位置、使用者與權限身分設定',
    action: 'openSystemManagement'
  },
  {
    key: 'venue',
    title: '場地預約系統',
    desc: '場地借用、時段查詢與預約管理',
    action: 'openComingSoonSystem'
  },
  {
    key: 'forms',
    title: '表單系統',
    desc: '行政表單、申請資料與流程追蹤',
    action: 'openComingSoonSystem'
  },
  {
    key: 'counter',
    title: '櫃台系統',
    desc: '櫃台值勤、接待與服務紀錄',
    action: 'openComingSoonSystem'
  },
  {
    key: 'pastoral',
    title: '牧養管理系統',
    desc: '牧養關懷、名單與跟進紀錄',
    action: 'openComingSoonSystem'
  },
  {
    key: 'education',
    title: '教育管理系統',
    desc: '課程、學員、教材與教育行政',
    action: 'openComingSoonSystem'
  },
  {
    key: 'media',
    title: '媒體管理系統',
    desc: '媒體排程、素材、製作與發布管理',
    action: 'openComingSoonSystem'
  },
  {
    key: 'worship',
    title: '敬拜管理系統',
    desc: '敬拜團隊、服事排程、歌單與預備事項管理',
    action: 'openComingSoonSystem'
  },
  {
    key: 'attendance',
    title: '聚會統計系統',
    desc: '聚會人數、出席紀錄與統計分析',
    action: 'openComingSoonSystem'
  },
  {
    key: 'serving',
    title: '服事管理系統',
    desc: '服事人員、排班、崗位與出勤紀錄管理',
    action: 'openComingSoonSystem'
  }
];

const ROLE_FEATURE_ACCESS = {
  '超級管理者': ['project', 'finance', 'asset', 'venue', 'forms', 'counter', 'pastoral', 'education', 'media', 'worship', 'attendance', 'serving', 'system'],
  '管理員': ['project', 'finance', 'asset', 'venue', 'forms', 'counter', 'pastoral', 'education', 'media', 'worship', 'attendance', 'serving'],
  '全職同工': ['project', 'finance', 'venue', 'forms', 'counter', 'worship', 'attendance', 'serving'],
  '技術同工': ['asset'],
  '牧養同工': ['pastoral'],
  '教育同工': ['education'],
  '媒體同工': ['media', 'worship'],
  '義工': ['counter', 'serving']
};

function handleLogin() {
  const btn = event.target;
  const email = document.getElementById('loginEmail').value.trim();
  const deviceType = 'desktop';
  const errorBox = document.getElementById('loginError');

  errorBox.textContent = '';

  if (!email) {
    errorBox.textContent = '請輸入電子信箱';
    return;
  }

  setButtonLoading(btn, true, '登入中...');

  google.script.run
    .withSuccessHandler(user => {
      setButtonLoading(btn, false);
      currentUser = user;

      loadInitialDataAfterLogin(() => {
        document.getElementById('loginView').classList.add('d-none');
        document.getElementById('mainView').classList.remove('d-none');
        updateUserInfo(user);

        if (user.deviceType === 'mobile') {
          document.getElementById('addProjectBtn').classList.add('d-none');
        }

        backToFeatureMenu();
      });
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      currentUser = null;

      document.getElementById('loginView').classList.remove('d-none');
      document.getElementById('mainView').classList.add('d-none');
      errorBox.textContent = err.message || err;
    })
    .login(email, deviceType);
}


function loadInitialDataAfterLogin(callback) {
  google.script.run
    .withSuccessHandler(data => {
      initialData = data;
      if (callback) callback();
    })
    .withFailureHandler(err => {
      currentUser = null;
      document.getElementById('loginError').textContent = err.message || err;
    })
    .getInitialData();
}

function logout() {
  currentUser = null;
  resetAppToLogin();
}

function updateUserInfo(user) {
  const info = document.getElementById('userInfo');
  if (!info) return;

  const displayName = [user.name, user.position].filter(Boolean).join(' ');
  const roles = getUserRoles(user).join('、') || '未設定身分';
  const deviceLabel = user.deviceType === 'mobile' ? '手機瀏覽模式' : '電腦完整模式';
  info.textContent = `${displayName}｜${roles}｜${deviceLabel}`;
}

function resetAppToLogin() {
  ['mainView', 'featureSelectionView', 'overviewView', 'detailView', 'purchaseView', 'assetView', 'systemView'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });

  const loginView = document.getElementById('loginView');
  if (loginView) loginView.classList.remove('d-none');

  const userInfo = document.getElementById('userInfo');
  if (userInfo) userInfo.textContent = '';

  const mainTitle = document.getElementById('mainTitle');
  if (mainTitle) mainTitle.textContent = '系統功能選擇';

  const loginError = document.getElementById('loginError');
  if (loginError) loginError.textContent = '';

  const addProjectBtn = document.getElementById('addProjectBtn');
  if (addProjectBtn) addProjectBtn.classList.remove('d-none');
}

function loadInitialData() {
  if (initialData) {
    setupSearchOptions();
    setupDetailOptions();
    loadProjects();
    return;
  }

  google.script.run
    .withSuccessHandler(data => {
      initialData = data;
      setupSearchOptions();
      setupDetailOptions();
      loadProjects();
    })
    .withFailureHandler(showError)
    .getInitialData();
}

function backToFeatureMenu() {
  document.getElementById('mainTitle').textContent = '系統功能選擇';
  renderFeatureMenu();
  document.getElementById('featureSelectionView').classList.remove('d-none');
  document.getElementById('purchaseView').classList.add('d-none');
  document.getElementById('assetView').classList.add('d-none');
  document.getElementById('overviewView').classList.add('d-none');
  document.getElementById('detailView').classList.add('d-none');
  document.getElementById('systemView').classList.add('d-none');
}

function renderFeatureMenu() {
  const grid = document.getElementById('featureGrid');
  if (!grid || !currentUser) return;

  const allowedKeys = getAllowedFeatureKeys(currentUser);
  const features = SYSTEM_FEATURES
    .filter(feature => allowedKeys.includes(feature.key))
    .map(feature => ({ ...feature, mode: getFeatureAccessLabel(getFeatureAccess(feature.key)) }));
  grid.innerHTML = '';

  if (!features.length) {
    grid.innerHTML = '<div class="feature-empty">目前帳號尚未被授權任何系統入口，請洽管理員。</div>';
    return;
  }

  features.forEach(feature => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'feature-option';
    button.onclick = () => window[feature.action](feature);
    button.innerHTML = `
      <span class="feature-title">${escapeHtml(feature.title)}</span>
      <span class="feature-desc">${escapeHtml(feature.desc)}</span>
      ${feature.mode ? `<span class="feature-access">${escapeHtml(feature.mode)}</span>` : ''}
    `;
    grid.appendChild(button);
  });
}

function getUserRoles(user) {
  const roles = Array.isArray(user.roles) ? user.roles : [];
  const values = roles.concat(user.role || [])
    .map(role => String(role || '').trim())
    .filter(Boolean);
  return [...new Set(values)];
}

function getAllowedFeatureKeys(user) {
  const permissions = getEffectiveFeatureAccess();
  const keys = Object.keys(permissions).filter(key => permissions[key] === 'read' || permissions[key] === 'edit');
  if (keys.length) return keys;
  return [...new Set(getUserRoles(user).flatMap(role => ROLE_FEATURE_ACCESS[role] || []))];
}

function getFeatureAccess(featureKey) {
  return getEffectiveFeatureAccess()[featureKey] || 'none';
}

function getEffectiveFeatureAccess() {
  const result = {};
  const rank = { none: 0, read: 1, edit: 2 };
  const permissions = initialData?.featurePermissions || [];
  getUserRoles(currentUser).forEach(role => {
    permissions
      .filter(item => item.role === role)
      .forEach(item => {
        const current = result[item.featureKey] || 'none';
        if ((rank[item.accessLevel] || 0) > (rank[current] || 0)) result[item.featureKey] = item.accessLevel;
      });
  });
  if (currentUser?.featurePermissions) {
    Object.assign(result, currentUser.featurePermissions);
  }
  return result;
}

function getFeatureAccessLabel(access) {
  if (access === 'edit') return '操作';
  if (access === 'read') return '唯讀';
  return '';
}

function openProjectSystem() {
  const canEditFeature = getFeatureAccess('project') === 'edit';
  document.getElementById('mainTitle').textContent = '專案管理系統';
  document.getElementById('featureSelectionView').classList.add('d-none');
  document.getElementById('purchaseView').classList.add('d-none');
  document.getElementById('assetView').classList.add('d-none');
  document.getElementById('detailView').classList.add('d-none');
  document.getElementById('systemView').classList.add('d-none');
  document.getElementById('overviewView').classList.remove('d-none');
  document.getElementById('addProjectBtn').classList.toggle('d-none', !canEditFeature || currentUser.deviceType === 'mobile');
  loadInitialData();
}

function openPurchaseSystem() {
  const canEditFeature = getFeatureAccess('finance') === 'edit';
  document.getElementById('mainTitle').textContent = '財務系統';
  document.getElementById('featureSelectionView').classList.add('d-none');
  document.getElementById('overviewView').classList.add('d-none');
  document.getElementById('assetView').classList.add('d-none');
  document.getElementById('detailView').classList.add('d-none');
  document.getElementById('systemView').classList.add('d-none');
  document.getElementById('purchaseView').classList.remove('d-none');
  document.getElementById('purchaseListView').classList.remove('d-none');
  document.getElementById('purchaseDetailView').classList.add('d-none');
  document.querySelectorAll('.purchase-input, #savePurchaseBtn').forEach(el => {
    el.disabled = !canEditFeature;
    if (el.id === 'savePurchaseBtn') el.classList.toggle('d-none', !canEditFeature);
  });
  loadPurchaseSystem();
}


function openComingSoonSystem(feature) {
  alert(`${feature.title}入口已建立，功能將於後續階段開放。`);
}
</script>
