
<script>
let systemUsers = [];
let featurePermissions = [];
let systemPastoralOptions = null;
let shortLinks = [];
let systemLogs = [];

const PARAMETER_TYPE_OPTIONS = [
  { key: 'projectTypes', label: '專案類型' },
  { key: 'duties', label: '職務' },
  { key: 'positions', label: '職稱' },
  { key: 'units', label: '會堂' },
  { key: 'churchTypes', label: '會堂類型' },
  { key: 'differenceMethods', label: '收支差額處理方式' },
  { key: 'meetingStatus', label: '會議狀態' },
  { key: 'projectStatus', label: '專案狀態' },
  { key: 'projectPermissions', label: '專案權限' },
  { key: 'departments', label: '部門' },
  { key: 'purchaseStatus', label: '採購狀態' },
  { key: 'paymentMethods', label: '支付方式' },
  { key: 'assetTypes', label: '資產類型' },
  { key: 'assetVendors', label: '資產廠商' },
  { key: 'assetStatuses', label: '資產狀態' }
];

const SYSTEM_ROLE_OPTIONS = ['超級管理者','管理員','全職同工','技術同工','牧養同工','教育同工','媒體同工','義工','使用者','一般使用者'];

function openSystemManagement() {
  if (!currentUser || !currentUser.isSuperAdmin) return;
  recordFeatureUsage('system');
  document.getElementById('mainTitle').textContent = '系統管理';
  document.getElementById('featureSelectionView').classList.add('d-none');
  document.getElementById('overviewView').classList.add('d-none');
  document.getElementById('purchaseView').classList.add('d-none');
  document.getElementById('assetView').classList.add('d-none');
  document.getElementById('venueView').classList.add('d-none');
  document.getElementById('zoomView').classList.add('d-none');
  document.getElementById('pastoralView').classList.add('d-none');
  document.getElementById('attendanceView').classList.add('d-none');
  document.getElementById('formsView').classList.add('d-none');
  document.getElementById('educationView').classList.add('d-none');
  document.getElementById('qtView').classList.add('d-none');
  document.getElementById('lineBotView').classList.add('d-none');
  document.getElementById('qrcodeView').classList.add('d-none');
  document.getElementById('counterWorkbenchView').classList.add('d-none');
  document.getElementById('detailView').classList.add('d-none');
  document.getElementById('systemView').classList.remove('d-none');
  setupSystemManagement();
}

function setupSystemManagement() {
  renderParameterTypeOptions();
  renderSystemPositionOptions();
  renderSystemDepartmentOptions();
  renderSystemLogOptions();
  loadParameterItems();
}

function getSystemFeatureOptions() {
  return (typeof SYSTEM_FEATURES !== 'undefined' ? SYSTEM_FEATURES : []).map(feature => ({
    key: feature.key,
    title: feature.title
  }));
}

function renderParameterTypeOptions() {
  const typeSelect = document.getElementById('parameterType');
  typeSelect.innerHTML = '';
  PARAMETER_TYPE_OPTIONS.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.key;
    opt.textContent = item.label;
    typeSelect.appendChild(opt);
  });
}

function renderSystemPositionOptions() {
  const select = document.getElementById('systemUserPosition');
  if (!select) return;
  select.innerHTML = '';
  (initialData?.params?.positions || []).forEach(position => {
    const opt = document.createElement('option');
    opt.value = position;
    opt.textContent = position;
    select.appendChild(opt);
  });
}

function renderSystemDepartmentOptions() {
  const select = document.getElementById('systemUserDepartment');
  if (!select) return;
  select.innerHTML = '';
  (initialData?.params?.departments || []).forEach(department => {
    const opt = document.createElement('option');
    opt.value = department;
    opt.textContent = department;
    select.appendChild(opt);
  });
}

function loadParameterItems() {
  const type = document.getElementById('parameterType').value;
  const errorBox = document.getElementById('parameterModalError');
  errorBox.textContent = '';
  document.getElementById('parameterTableBody').innerHTML = '';
  google.script.run
    .withSuccessHandler(items => renderParameterItems(items || []))
    .withFailureHandler(err => { errorBox.textContent = err.message || err; })
    .getParameterItems(type, currentUser);
}

function renderParameterItems(items) {
  const body = document.getElementById('parameterTableBody');
  body.innerHTML = '';
  if (!items.length) {
    body.innerHTML = '<tr><td colspan="2" class="text-muted">目前沒有參數</td></tr>';
    return;
  }
  items.forEach(value => {
    const encodedValue = encodeURIComponent(value);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(value)}</td><td class="text-end"><button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="editParameterItem('${encodedValue}')">編輯</button><button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteParameterItem('${encodedValue}')">刪除</button></td>`;
    body.appendChild(tr);
  });
}

function addParameterItem() {
  const type = document.getElementById('parameterType').value;
  const input = document.getElementById('newParameterValue');
  const value = input.value.trim();
  const errorBox = document.getElementById('parameterModalError');
  const btn = document.getElementById('addParameterBtn');
  errorBox.textContent = '';
  if (!value) { errorBox.textContent = '請填寫參數內容'; return; }
  setButtonLoading(btn, true, '儲存中...');
  google.script.run.withSuccessHandler(res => { setButtonLoading(btn, false); input.value = ''; alert(res.message); refreshParametersAfterChange(); })
    .withFailureHandler(err => { setButtonLoading(btn, false); errorBox.textContent = err.message || err; })
    .addParameterItem({ currentUser, type, value });
}

function editParameterItem(encodedOldValue) {
  const type = document.getElementById('parameterType').value;
  const oldValue = decodeURIComponent(encodedOldValue);
  const newValue = prompt('請輸入新的參數內容', oldValue);
  const errorBox = document.getElementById('parameterModalError');
  if (newValue === null) return;
  const value = newValue.trim();
  if (!value) { errorBox.textContent = '參數內容不可空白'; return; }
  google.script.run.withSuccessHandler(res => { alert(res.message); refreshParametersAfterChange(); })
    .withFailureHandler(err => { errorBox.textContent = err.message || err; })
    .updateParameterItem({ currentUser, type, oldValue, newValue: value });
}

function deleteParameterItem(encodedValue) {
  const type = document.getElementById('parameterType').value;
  const value = decodeURIComponent(encodedValue);
  const errorBox = document.getElementById('parameterModalError');
  if (!confirm(`確定要刪除「${value}」？`)) return;
  google.script.run.withSuccessHandler(res => { alert(res.message); refreshParametersAfterChange(); })
    .withFailureHandler(err => { errorBox.textContent = err.message || err; })
    .deleteParameterItem({ currentUser, type, value });
}

function refreshParametersAfterChange() {
  google.script.run.withSuccessHandler(data => { initialData = data; setupSearchOptions(); setupDetailOptions(); renderSystemPositionOptions(); renderSystemDepartmentOptions(); loadParameterItems(); })
    .withFailureHandler(err => { document.getElementById('parameterModalError').textContent = err.message || err; })
    .getInitialData();
}

function loadLocationItems() {
  const errorBox = document.getElementById('locationModalError');
  errorBox.textContent = '';
  google.script.run.withSuccessHandler(locations => { currentAssetLocations = locations || []; renderLocationItems(currentAssetLocations); })
    .withFailureHandler(err => { errorBox.textContent = err.message || err; })
    .getAssetLocations(currentUser);
}

function renderLocationItems(locations) {
  const body = document.getElementById('locationTableBody');
  body.innerHTML = '';
  if (!locations.length) { body.innerHTML = '<tr><td colspan="5" class="text-muted">目前沒有位置資料</td></tr>'; return; }
  locations.forEach(location => {
    const encodedId = encodeURIComponent(location.locationId);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(location.hall)}</td><td>${escapeHtml(location.mainLocation)}</td><td>${escapeHtml(location.subLocation)}</td><td>${location.isBookable ? '是' : '否'}</td><td class="text-end"><button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="editLocationItem('${encodedId}')">編輯</button><button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteLocationItem('${encodedId}')">刪除</button></td>`;
    body.appendChild(tr);
  });
}

function resetLocationForm() {
  document.getElementById('editingLocationId').value = '';
  document.getElementById('locationHall').value = '';
  document.getElementById('locationMain').value = '';
  document.getElementById('locationSub').value = '';
  document.getElementById('locationSortOrder').value = '0';
  document.getElementById('locationIsBookable').checked = false;
  document.getElementById('locationModalError').textContent = '';
}

function editLocationItem(encodedLocationId) {
  const locationId = decodeURIComponent(encodedLocationId);
  const location = (currentAssetLocations || []).find(item => String(item.locationId) === String(locationId));
  if (!location) return;
  document.getElementById('editingLocationId').value = location.locationId;
  document.getElementById('locationHall').value = location.hall || '';
  document.getElementById('locationMain').value = location.mainLocation || '';
  document.getElementById('locationSub').value = location.subLocation || '';
  document.getElementById('locationSortOrder').value = location.sortOrder || 0;
  document.getElementById('locationIsBookable').checked = Boolean(location.isBookable);
}

function saveLocationItem() {
  const btn = document.getElementById('saveLocationBtn');
  const errorBox = document.getElementById('locationModalError');
  const locationId = document.getElementById('editingLocationId').value;
  const location = { hall: document.getElementById('locationHall').value.trim(), mainLocation: document.getElementById('locationMain').value.trim(), subLocation: document.getElementById('locationSub').value.trim(), sortOrder: document.getElementById('locationSortOrder').value, isBookable: document.getElementById('locationIsBookable').checked };
  errorBox.textContent = '';
  if (!location.hall || !location.mainLocation) { errorBox.textContent = '請填寫會堂與主位置'; return; }
  setButtonLoading(btn, true, '儲存中...');
  const runner = google.script.run.withSuccessHandler(res => { setButtonLoading(btn, false); alert(res.message); resetLocationForm(); loadLocationItems(); if (typeof loadAssetLocations === 'function') loadAssetLocations(); })
    .withFailureHandler(err => { setButtonLoading(btn, false); errorBox.textContent = err.message || err; });
  if (locationId) runner.updateLocationItem({ currentUser, locationId, location }); else runner.addLocationItem({ currentUser, location });
}

function deleteLocationItem(encodedLocationId) {
  const locationId = decodeURIComponent(encodedLocationId);
  const location = (currentAssetLocations || []).find(item => String(item.locationId) === String(locationId));
  const errorBox = document.getElementById('locationModalError');
  if (!confirm(`確定要刪除位置「${location ? formatLocationLabel(location) : locationId}」？`)) return;
  google.script.run.withSuccessHandler(res => { alert(res.message); resetLocationForm(); loadLocationItems(); if (typeof loadAssetLocations === 'function') loadAssetLocations(); })
    .withFailureHandler(err => { errorBox.textContent = err.message || err; })
    .deleteLocationItem({ currentUser, locationId });
}

function loadSystemUsers() {
  const userError = document.getElementById('systemUserError');
  const roleError = document.getElementById('systemRoleError');
  if (userError) userError.textContent = '';
  if (roleError) roleError.textContent = '';
  setListLoading('systemUserTableBody', true);
  google.script.run.withSuccessHandler(users => { systemUsers = users || []; renderSystemUsers(); renderRoleUserSelect(); renderSelectedUserRoles(); renderPastoralPermissionUserSelect(); renderSelectedPastoralChurchPermissions(); })
    .withFailureHandler(err => { if (userError) userError.textContent = err.message || err; if (roleError) roleError.textContent = err.message || err; })
    .getSystemUsers(currentUser);
}

function renderSystemUsers() {
  const body = document.getElementById('systemUserTableBody');
  if (!body) return;
  body.innerHTML = '';
  if (!systemUsers.length) { body.innerHTML = '<tr><td colspan="6" class="text-muted">目前沒有使用者資料</td></tr>'; return; }
  systemUsers.forEach(user => {
    const encodedStaffId = encodeURIComponent(user.staffId);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(user.staffId)}</td><td>${escapeHtml(user.name)}</td><td>${escapeHtml(user.email)}</td><td>${escapeHtml(user.position)}</td><td>${escapeHtml(formatUserDepartments(user))}</td><td class="text-end"><button type="button" class="btn btn-sm btn-outline-secondary" onclick="editSystemUser('${encodedStaffId}')">編輯</button></td>`;
    body.appendChild(tr);
  });
}

function resetSystemUserForm() {
  document.getElementById('systemUserStaffId').value = '';
  document.getElementById('systemUserStaffId').disabled = false;
  document.getElementById('systemUserEmail').value = '';
  document.getElementById('systemUserName').value = '';
  document.getElementById('systemUserPosition').value = '';
  setSystemUserDepartmentSelection([]);
  document.getElementById('systemUserError').textContent = '';
}

function editSystemUser(encodedStaffId) {
  const staffId = decodeURIComponent(encodedStaffId);
  const user = systemUsers.find(item => String(item.staffId) === String(staffId));
  if (!user) return;
  document.getElementById('systemUserStaffId').value = user.staffId;
  document.getElementById('systemUserStaffId').disabled = true;
  document.getElementById('systemUserEmail').value = user.email || '';
  document.getElementById('systemUserName').value = user.name || '';
  document.getElementById('systemUserPosition').value = user.position || '';
  setSystemUserDepartmentSelection(getUserDepartmentValues(user));
}

function saveSystemUser() {
  const btn = document.getElementById('saveSystemUserBtn');
  const errorBox = document.getElementById('systemUserError');
  const staffIdInput = document.getElementById('systemUserStaffId');
  const user = {
    staffId: staffIdInput.value.trim(),
    email: document.getElementById('systemUserEmail').value.trim(),
    name: document.getElementById('systemUserName').value.trim(),
    position: document.getElementById('systemUserPosition').value,
    departments: getSelectedSystemUserDepartments()
  };
  errorBox.textContent = '';
  if (!user.staffId || !user.email || !user.name) { errorBox.textContent = '請填寫序號、Email 與姓名'; return; }
  setButtonLoading(btn, true, '儲存中...');
  google.script.run.withSuccessHandler(res => { setButtonLoading(btn, false); alert(res.message); resetSystemUserForm(); loadSystemUsers(); reloadInitialDataOnly(); })
    .withFailureHandler(err => { setButtonLoading(btn, false); errorBox.textContent = err.message || err; })
    .saveSystemUser({ currentUser, user });
}

function getSelectedSystemUserDepartments() {
  const select = document.getElementById('systemUserDepartment');
  if (!select) return [];
  return [...select.selectedOptions].map(opt => opt.value).filter(Boolean);
}

function setSystemUserDepartmentSelection(departments) {
  const select = document.getElementById('systemUserDepartment');
  if (!select) return;
  const selected = new Set((departments || []).map(value => String(value).trim()).filter(Boolean));
  [...select.options].forEach(opt => {
    opt.selected = selected.has(opt.value);
  });
}

function getUserDepartmentValues(user) {
  if (Array.isArray(user?.departments)) return user.departments;
  return String(user?.department || '')
    .split(/[、,，]/)
    .map(value => value.trim())
    .filter(Boolean);
}

function formatUserDepartments(user) {
  return getUserDepartmentValues(user).join('、');
}

function renderRoleUserSelect() {
  const select = document.getElementById('roleUserSelect');
  if (!select) return;
  const currentValue = select.value;
  select.innerHTML = '';
  systemUsers.forEach(user => {
    const opt = document.createElement('option');
    opt.value = user.staffId;
    opt.textContent = `${user.staffId} ${user.name} ${user.position || ''}`.trim();
    select.appendChild(opt);
  });
  if (currentValue) select.value = currentValue;
}

function renderSelectedUserRoles() {
  const select = document.getElementById('roleUserSelect');
  const container = document.getElementById('roleCheckboxGroup');
  if (!select || !container) return;
  const user = systemUsers.find(item => String(item.staffId) === String(select.value));
  const selected = new Set(user ? user.roles || [] : []);
  container.innerHTML = '';
  renderCheckboxBulkActions(container, 'system-role-checkbox', SYSTEM_ROLE_OPTIONS.length);
  SYSTEM_ROLE_OPTIONS.forEach(role => {
    const id = `system_role_${role}`;
    const wrapper = document.createElement('div');
    wrapper.className = 'form-check';
    wrapper.innerHTML = `<input class="form-check-input system-role-checkbox" type="checkbox" id="${escapeAttr(id)}" value="${escapeAttr(role)}" ${selected.has(role) ? 'checked' : ''}><label class="form-check-label" for="${escapeAttr(id)}">${escapeHtml(role)}</label>`;
    container.appendChild(wrapper);
  });
}

function saveSelectedUserRoles() {
  const btn = document.getElementById('saveUserRolesBtn');
  const errorBox = document.getElementById('systemRoleError');
  const staffId = document.getElementById('roleUserSelect').value;
  const roles = [...document.querySelectorAll('.system-role-checkbox:checked')].map(el => el.value);
  errorBox.textContent = '';
  if (!staffId) { errorBox.textContent = '請選擇使用者'; return; }
  if (!roles.length) { errorBox.textContent = '請至少選擇一個權限身分'; return; }
  setButtonLoading(btn, true, '儲存中...');
  google.script.run.withSuccessHandler(res => { setButtonLoading(btn, false); alert(res.message); loadSystemUsers(); reloadInitialDataOnly(); })
    .withFailureHandler(err => { setButtonLoading(btn, false); errorBox.textContent = err.message || err; })
    .saveSystemUserRoles({ currentUser, staffId, roles });
}

function reloadInitialDataOnly() {
  google.script.run.withSuccessHandler(data => { initialData = data; renderSystemPositionOptions(); renderSystemDepartmentOptions(); featurePermissions = data.featurePermissions || []; }).withFailureHandler(showError).getInitialData();
}

function loadPastoralPermissionOptions() {
  const errorBox = document.getElementById('pastoralPermissionError');
  if (errorBox) errorBox.textContent = '';
  if (systemPastoralOptions) {
    if (!systemUsers.length) loadSystemUsers();
    renderPastoralPermissionUserSelect();
    renderSelectedPastoralChurchPermissions();
    return;
  }
  google.script.run
    .withSuccessHandler(options => {
      systemPastoralOptions = options || { churches: [] };
      if (!systemUsers.length) loadSystemUsers();
      renderPastoralPermissionUserSelect();
      renderSelectedPastoralChurchPermissions();
    })
    .withFailureHandler(err => { if (errorBox) errorBox.textContent = err.message || err; })
    .getPastoralOptions(currentUser);
}

function renderPastoralPermissionUserSelect() {
  const select = document.getElementById('pastoralPermissionUserSelect');
  if (!select) return;
  const currentValue = select.value;
  select.innerHTML = '';
  systemUsers.forEach(user => {
    const opt = document.createElement('option');
    opt.value = user.staffId;
    opt.textContent = formatAccountName(user);
    select.appendChild(opt);
  });
  if (currentValue && [...select.options].some(opt => opt.value === currentValue)) select.value = currentValue;
}

function renderSelectedPastoralChurchPermissions() {
  const select = document.getElementById('pastoralPermissionUserSelect');
  const group = document.getElementById('pastoralChurchPermissionGroup');
  if (!select || !group || !systemPastoralOptions) return;
  const user = systemUsers.find(item => String(item.staffId) === String(select.value));
  const selected = new Set((user?.pastoralChurchIds || []).map(String));
  group.innerHTML = '';

  const churches = systemPastoralOptions.churches || [];
  renderCheckboxBulkActions(group, 'pastoral-church-permission-checkbox', churches.length);

  churches.forEach(church => {
    const id = `pastoral_church_permission_${church.id}`;
    const wrapper = document.createElement('div');
    wrapper.className = 'form-check';
    wrapper.innerHTML = `
      <input class="form-check-input pastoral-church-permission-checkbox" type="checkbox" id="${escapeAttr(id)}" value="${escapeAttr(church.id)}" ${selected.has(String(church.id)) ? 'checked' : ''}>
      <label class="form-check-label" for="${escapeAttr(id)}">${escapeHtml(church.name)} ${church.churchType ? `(${escapeHtml(church.churchType)})` : ''}</label>
    `;
    group.appendChild(wrapper);
  });
}

function renderCheckboxBulkActions(container, checkboxClass, itemCount) {
  if (!container || Number(itemCount) <= 3) return;
  const tools = document.createElement('div');
  tools.className = 'd-flex flex-wrap gap-2 mb-2';
  tools.innerHTML = `
    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setCheckboxGroupChecked('${escapeAttr(checkboxClass)}', true)">全選</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setCheckboxGroupChecked('${escapeAttr(checkboxClass)}', false)">清除</button>
  `;
  container.appendChild(tools);
}

function setCheckboxGroupChecked(checkboxClass, checked) {
  document.querySelectorAll(`.${checkboxClass}`).forEach(el => {
    if (!el.disabled) el.checked = Boolean(checked);
  });
}

function saveSelectedPastoralChurchPermissions() {
  const select = document.getElementById('pastoralPermissionUserSelect');
  const btn = document.getElementById('savePastoralChurchPermissionsBtn');
  const errorBox = document.getElementById('pastoralPermissionError');
  if (!select || !select.value) return;
  const churchIds = [...document.querySelectorAll('.pastoral-church-permission-checkbox:checked')].map(el => Number(el.value));
  const staffId = select.value;
  errorBox.textContent = '';
  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      systemUsers = res.users || systemUsers;
      alert(res.message);
      renderPastoralPermissionUserSelect();
      select.value = String(staffId);
      renderSelectedPastoralChurchPermissions();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .savePastoralChurchPermissions({ currentUser, staffId, churchIds });
}

function loadFeaturePermissions() {
  const errorBox = document.getElementById('featurePermissionError');
  if (errorBox) errorBox.textContent = '';
  setListLoading('featurePermissionBody', true);
  google.script.run
    .withSuccessHandler(items => {
      featurePermissions = items || [];
      if (initialData) initialData.featurePermissions = featurePermissions;
      renderFeaturePermissionMatrix();
    })
    .withFailureHandler(err => { if (errorBox) errorBox.textContent = err.message || err; })
    .getFeaturePermissions(currentUser);
}

function renderFeaturePermissionMatrix() {
  const head = document.getElementById('featurePermissionHead');
  const body = document.getElementById('featurePermissionBody');
  if (!head || !body) return;

  const features = getSystemFeatureOptions();
  head.innerHTML = `
    <tr>
      <th style="min-width: 140px;">權限身分</th>
      ${features.map(feature => `<th>${escapeHtml(feature.title)}</th>`).join('')}
    </tr>
  `;
  body.innerHTML = '';

  SYSTEM_ROLE_OPTIONS.forEach(role => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <th>${escapeHtml(role)}</th>
      ${features.map(feature => {
        const value = getRoleFeatureAccess(role, feature.key);
        return `
          <td>
            <select class="form-select form-select-sm feature-permission-select" data-role="${escapeAttr(role)}" data-feature-key="${escapeAttr(feature.key)}">
              <option value="none" ${value === 'none' ? 'selected' : ''}>無權限</option>
              <option value="read" ${value === 'read' ? 'selected' : ''}>唯讀</option>
              <option value="edit" ${value === 'edit' ? 'selected' : ''}>操作</option>
            </select>
          </td>
        `;
      }).join('')}
    `;
    body.appendChild(tr);
  });
}

function getRoleFeatureAccess(role, featureKey) {
  const item = (featurePermissions || []).find(permission => permission.role === role && permission.featureKey === featureKey);
  return item ? item.accessLevel : 'none';
}

function saveFeaturePermissionsFromUI() {
  const btn = document.getElementById('saveFeaturePermissionsBtn');
  const errorBox = document.getElementById('featurePermissionError');
  const permissions = [...document.querySelectorAll('.feature-permission-select')].map(select => ({
    role: select.dataset.role,
    featureKey: select.dataset.featureKey,
    accessLevel: select.value
  }));

  if (errorBox) errorBox.textContent = '';
  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      featurePermissions = res.featurePermissions || permissions;
      if (initialData) initialData.featurePermissions = featurePermissions;
      alert(res.message);
      renderFeaturePermissionMatrix();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      if (errorBox) errorBox.textContent = err.message || err;
    })
    .saveFeaturePermissions({ currentUser, permissions });
}

function loadShortLinks() {
  const errorBox = document.getElementById('shortLinkError');
  if (errorBox) errorBox.textContent = '';
  setListLoading('shortLinkTableBody', true, '短連結載入中...');
  google.script.run
    .withSuccessHandler(data => {
      shortLinks = data?.rows || [];
      renderShortLinks();
    })
    .withFailureHandler(err => {
      if (errorBox) errorBox.textContent = err.message || err;
    })
    .getShortLinks({
      keyword: document.getElementById('shortLinkKeyword')?.value || '',
      status: document.getElementById('shortLinkStatusFilter')?.value || ''
    }, currentUser);
}

function renderShortLinks() {
  const body = document.getElementById('shortLinkTableBody');
  if (!body) return;
  body.innerHTML = '';
  if (!shortLinks.length) {
    body.innerHTML = '<tr><td colspan="7" class="text-muted text-center py-4">尚未建立短連結</td></tr>';
    return;
  }
  shortLinks.forEach(link => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="fw-semibold">${escapeHtml(link.shortCode)}</div>
        <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="copyShortLinkUrl('${escapeAttr(link.linkId)}')">複製</button>
      </td>
      <td>${escapeHtml(link.title || '')}<div class="text-muted small">${escapeHtml(link.description || '')}</div></td>
      <td class="text-break" style="max-width: 360px;">${escapeHtml(link.targetUrl || '')}</td>
      <td>${escapeHtml([link.sourceSystem, link.sourceType].filter(Boolean).join(' / '))}<div class="text-muted small">${escapeHtml(link.sourceId || '')}</div></td>
      <td>${renderShortLinkStatusBadge(link.status)}</td>
      <td class="text-end">${escapeHtml(link.clickCount || 0)}</td>
      <td class="text-end"><button type="button" class="btn btn-sm btn-outline-secondary" onclick="editShortLink('${escapeAttr(link.linkId)}')">編輯</button></td>
    `;
    body.appendChild(tr);
  });
}

function resetShortLinkForm() {
  document.getElementById('shortLinkId').value = '';
  document.getElementById('shortLinkCode').value = '';
  document.getElementById('shortLinkTitle').value = '';
  document.getElementById('shortLinkTargetUrl').value = '';
  document.getElementById('shortLinkStatus').value = 'active';
  document.getElementById('shortLinkSourceSystem').value = 'manual';
  document.getElementById('shortLinkSourceType').value = '';
  document.getElementById('shortLinkSourceId').value = '';
  document.getElementById('shortLinkExpiresAt').value = '';
  document.getElementById('shortLinkDescription').value = '';
  document.getElementById('shortLinkError').textContent = '';
}

function editShortLink(linkId) {
  const link = shortLinks.find(item => String(item.linkId) === String(linkId));
  if (!link) return;
  document.getElementById('shortLinkId').value = link.linkId || '';
  document.getElementById('shortLinkCode').value = link.shortCode || '';
  document.getElementById('shortLinkTitle').value = link.title || '';
  document.getElementById('shortLinkTargetUrl').value = link.targetUrl || '';
  document.getElementById('shortLinkStatus').value = link.status || 'active';
  document.getElementById('shortLinkSourceSystem').value = link.sourceSystem || 'manual';
  document.getElementById('shortLinkSourceType').value = link.sourceType || '';
  document.getElementById('shortLinkSourceId').value = link.sourceId || '';
  document.getElementById('shortLinkExpiresAt').value = toDateTimeLocalInputValue(link.expiresAt);
  document.getElementById('shortLinkDescription').value = link.description || '';
}

function saveShortLinkFromUI() {
  const btn = document.getElementById('saveShortLinkBtn');
  const errorBox = document.getElementById('shortLinkError');
  const linkId = document.getElementById('shortLinkId').value;
  const link = {
    shortCode: document.getElementById('shortLinkCode').value.trim(),
    title: document.getElementById('shortLinkTitle').value.trim(),
    targetUrl: document.getElementById('shortLinkTargetUrl').value.trim(),
    status: document.getElementById('shortLinkStatus').value,
    sourceSystem: document.getElementById('shortLinkSourceSystem').value.trim() || 'manual',
    sourceType: document.getElementById('shortLinkSourceType').value.trim(),
    sourceId: document.getElementById('shortLinkSourceId').value.trim(),
    expiresAt: document.getElementById('shortLinkExpiresAt').value,
    description: document.getElementById('shortLinkDescription').value.trim()
  };
  errorBox.textContent = '';
  if (!link.targetUrl) {
    errorBox.textContent = '請填寫目的網址';
    return;
  }
  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      alert(`${res.message}\n${res.link?.shortUrl || ''}`);
      resetShortLinkForm();
      loadShortLinks();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .saveShortLink({ currentUser, linkId, link });
}

function copyShortLinkUrl(linkId) {
  const link = shortLinks.find(item => String(item.linkId) === String(linkId));
  if (!link || !link.shortUrl) return;
  copyTextToClipboard(link.shortUrl)
    .then(() => alert('短連結已複製'))
    .catch(() => prompt('請複製短連結', link.shortUrl));
}

function handleShortLinkSearchKey(event) {
  if (event.key === 'Enter') loadShortLinks();
}

function renderShortLinkStatusBadge(status) {
  const map = {
    active: '<span class="badge bg-success">啟用</span>',
    disabled: '<span class="badge bg-secondary">停用</span>',
    expired: '<span class="badge bg-warning text-dark">過期</span>'
  };
  return map[status] || escapeHtml(status || '');
}

function toDateTimeLocalInputValue(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return '';
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  const hh = String(date.getHours()).padStart(2, '0');
  const min = String(date.getMinutes()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
}

function renderSystemLogOptions() {
  const systemSelect = document.getElementById('systemLogSystemKey');
  if (systemSelect) {
    const selectedSystem = systemSelect.value;
    systemSelect.innerHTML = '<option value="">全部系統</option>';
    getSystemFeatureOptions().forEach(feature => {
      const opt = document.createElement('option');
      opt.value = feature.key;
      opt.textContent = feature.title;
      systemSelect.appendChild(opt);
    });
    systemSelect.value = selectedSystem;
  }

  const staffSelect = document.getElementById('systemLogStaffId');
  if (staffSelect) {
    const selectedStaffId = staffSelect.value;
    const users = systemUsers.length ? systemUsers : (initialData?.accounts || []);
    staffSelect.innerHTML = '<option value="">全部使用者</option>';
    users.forEach(user => {
      const opt = document.createElement('option');
      opt.value = user.staffId;
      opt.textContent = [user.name, user.position].filter(Boolean).join(' ');
      staffSelect.appendChild(opt);
    });
    staffSelect.value = selectedStaffId;
  }
}

function loadSystemLogs() {
  renderSystemLogOptions();
  const errorBox = document.getElementById('systemLogError');
  if (errorBox) errorBox.textContent = '';
  setListLoading('systemLogTableBody', true, '系統日誌載入中...');
  google.script.run
    .withSuccessHandler(data => {
      systemLogs = data?.rows || [];
      renderSystemLogs();
    })
    .withFailureHandler(err => {
      if (errorBox) errorBox.textContent = err.message || err;
      setListLoading('systemLogTableBody', false);
    })
    .getSystemLogs({
      type: document.getElementById('systemLogType')?.value || 'audit',
      keyword: document.getElementById('systemLogKeyword')?.value || '',
      systemKey: document.getElementById('systemLogSystemKey')?.value || '',
      staffId: document.getElementById('systemLogStaffId')?.value || '',
      limit: document.getElementById('systemLogLimit')?.value || 100
    }, currentUser);
}

function renderSystemLogs() {
  const body = document.getElementById('systemLogTableBody');
  if (!body) return;
  body.innerHTML = '';
  if (!systemLogs.length) {
    body.innerHTML = '<tr><td colspan="8" class="text-muted text-center py-4">目前沒有符合條件的系統日誌</td></tr>';
    return;
  }
  systemLogs.forEach(log => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="text-nowrap">${escapeHtml(formatSystemLogDateTime(log.createdAt))}</td>
      <td>${escapeHtml(formatSystemLogType(log.type))}</td>
      <td>${escapeHtml(log.staffName || log.staffId || log.email || '')}</td>
      <td>${escapeHtml(formatSystemLogFeature(log.systemKey))}</td>
      <td>${escapeHtml(formatSystemLogAction(log))}</td>
      <td>${escapeHtml(formatSystemLogEntity(log))}</td>
      <td>${escapeHtml(formatSystemLogSource(log))}</td>
      <td class="text-break" style="min-width: 240px;">${escapeHtml(formatSystemLogMetadata(log.metadata))}</td>
    `;
    body.appendChild(tr);
  });
}

function handleSystemLogSearchKey(event) {
  if (event.key === 'Enter') loadSystemLogs();
}

function formatSystemLogType(type) {
  const map = { audit: '稽核', login: '登入', usage: '使用' };
  return map[type] || type || '';
}

function formatSystemLogFeature(featureKey) {
  if (!featureKey) return '';
  const feature = getSystemFeatureOptions().find(item => item.key === featureKey);
  return feature ? feature.title : featureKey;
}

function formatSystemLogAction(log) {
  if (log.type === 'login') return formatLoginEventType(log.action);
  if (log.type === 'usage') return log.action === 'open' ? '開啟功能' : log.action;
  return log.action || '';
}

function formatLoginEventType(action) {
  const map = {
    success: '登入成功',
    challenge_required: '需要驗證',
    challenge_success: '驗證成功',
    challenge_failed: '驗證失敗',
    failed: '登入失敗'
  };
  return map[action] || action || '';
}

function formatSystemLogEntity(log) {
  return [log.entityType, log.entityId].filter(Boolean).join(' / ');
}

function formatSystemLogSource(log) {
  if (log.type === 'login') {
    return [log.deviceType, log.deviceLabel, log.ipAddress].filter(Boolean).join(' / ');
  }
  return [log.ipAddress, log.apiIp].filter(Boolean).join(' / ');
}

function formatSystemLogMetadata(metadata) {
  if (!metadata || typeof metadata !== 'object' || !Object.keys(metadata).length) return '';
  return Object.entries(metadata)
    .slice(0, 4)
    .map(([key, value]) => `${key}: ${typeof value === 'object' ? JSON.stringify(value) : value}`)
    .join('；');
}

function formatSystemLogDateTime(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  const hh = String(date.getHours()).padStart(2, '0');
  const min = String(date.getMinutes()).padStart(2, '0');
  return `${yyyy}/${mm}/${dd} ${hh}:${min}`;
}
</script>
