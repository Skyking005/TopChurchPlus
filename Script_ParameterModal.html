<script>
let parameterModalInstance = null;

const PARAMETER_TYPE_OPTIONS = [
  { key: 'projectTypes', label: '????' },
  { key: 'duties', label: '??' },
  { key: 'units', label: '??' },
  { key: 'differenceMethods', label: '????????' },
  { key: 'meetingStatus', label: '????' },
  { key: 'projectStatus', label: '????' },
  { key: 'projectPermissions', label: '????' },
  { key: 'departments', label: '??' },
  { key: 'purchaseStatus', label: '????' },
  { key: 'paymentMethods', label: '????' },
  { key: 'assetTypes', label: '????' },
  { key: 'assetVendors', label: '????' },
  { key: 'assetStatuses', label: '????' }
];

function openParameterModal() {
  if (!currentUser || !currentUser.isSuperAdmin) return;

  const typeSelect = document.getElementById('parameterType');
  typeSelect.innerHTML = '';

  PARAMETER_TYPE_OPTIONS.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.key;
    opt.textContent = item.label;
    typeSelect.appendChild(opt);
  });

  document.getElementById('newParameterValue').value = '';
  document.getElementById('parameterModalError').textContent = '';

  parameterModalInstance = new bootstrap.Modal(
    document.getElementById('parameterModal')
  );

  parameterModalInstance.show();
  loadParameterItems();
}

function loadParameterItems() {
  const type = document.getElementById('parameterType').value;
  const errorBox = document.getElementById('parameterModalError');

  errorBox.textContent = '';
  document.getElementById('parameterTableBody').innerHTML = '';

  google.script.run
    .withSuccessHandler(items => {
      renderParameterItems(items || []);
    })
    .withFailureHandler(err => {
      errorBox.textContent = err.message || err;
    })
    .getParameterItems(type, currentUser);
}

function renderParameterItems(items) {
  const body = document.getElementById('parameterTableBody');
  body.innerHTML = '';

  if (!items.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="2" class="text-muted">尚無參數</td>';
    body.appendChild(tr);
    return;
  }

  items.forEach(value => {
    const encodedValue = encodeURIComponent(value);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(value)}</td>
      <td class="text-end">
        <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="editParameterItem('${encodedValue}')">編輯</button>
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteParameterItem('${encodedValue}')">刪除</button>
      </td>
    `;
    body.appendChild(tr);
  });
}

function addParameterItem() {
  const type = document.getElementById('parameterType').value;
  const input = document.getElementById('newParameterValue');
  const value = input.value.trim();
  const errorBox = document.getElementById('parameterModalError');
  const btn = document.getElementById('addParameterBtn');

  errorBox.textContent = '';

  if (!value) {
    errorBox.textContent = '請輸入參數內容';
    return;
  }

  setButtonLoading(btn, true, '新增中...');

  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      input.value = '';
      alert(res.message);
      refreshParametersAfterChange();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .addParameterItem({ currentUser, type, value });
}

function editParameterItem(encodedOldValue) {
  const type = document.getElementById('parameterType').value;
  const oldValue = decodeURIComponent(encodedOldValue);
  const newValue = prompt('請輸入新的參數內容', oldValue);
  const errorBox = document.getElementById('parameterModalError');

  if (newValue === null) return;

  const value = newValue.trim();
  if (!value) {
    errorBox.textContent = '參數內容不可空白';
    return;
  }

  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      refreshParametersAfterChange();
    })
    .withFailureHandler(err => {
      errorBox.textContent = err.message || err;
    })
    .updateParameterItem({ currentUser, type, oldValue, newValue: value });
}

function deleteParameterItem(encodedValue) {
  const type = document.getElementById('parameterType').value;
  const errorBox = document.getElementById('parameterModalError');
  const value = decodeURIComponent(encodedValue);

  if (!confirm(`確定刪除「${value}」？`)) return;

  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      refreshParametersAfterChange();
    })
    .withFailureHandler(err => {
      errorBox.textContent = err.message || err;
    })
    .deleteParameterItem({ currentUser, type, value });
}

function refreshParametersAfterChange() {
  google.script.run
    .withSuccessHandler(data => {
      initialData = data;
      setupSearchOptions();
      setupDetailOptions();
      loadParameterItems();
    })
    .withFailureHandler(err => {
      document.getElementById('parameterModalError').textContent = err.message || err;
    })
    .getInitialData();
}


function loadLocationItems() {
  const errorBox = document.getElementById('locationModalError');
  if (!errorBox) return;

  errorBox.textContent = '';
  google.script.run
    .withSuccessHandler(locations => {
      currentAssetLocations = locations || [];
      renderLocationItems(currentAssetLocations);
    })
    .withFailureHandler(err => {
      errorBox.textContent = err.message || err;
    })
    .getAssetLocations(currentUser);
}

function renderLocationItems(locations) {
  const body = document.getElementById('locationTableBody');
  body.innerHTML = '';

  if (!locations.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="5" class="text-muted">????????</td>';
    body.appendChild(tr);
    return;
  }

  locations.forEach(location => {
    const encodedId = encodeURIComponent(location.locationId);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(location.hall)}</td>
      <td>${escapeHtml(location.mainLocation)}</td>
      <td>${escapeHtml(location.subLocation)}</td>
      <td>${location.isBookable ? '?' : '?'}</td>
      <td class="text-end">
        <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="editLocationItem('${encodedId}')">??</button>
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteLocationItem('${encodedId}')">??</button>
      </td>
    `;
    body.appendChild(tr);
  });
}

function resetLocationForm() {
  document.getElementById('editingLocationId').value = '';
  document.getElementById('locationHall').value = '';
  document.getElementById('locationMain').value = '';
  document.getElementById('locationSub').value = '';
  document.getElementById('locationSortOrder').value = '0';
  document.getElementById('locationIsBookable').checked = false;
  document.getElementById('locationModalError').textContent = '';
}

function editLocationItem(encodedLocationId) {
  const locationId = decodeURIComponent(encodedLocationId);
  const location = (currentAssetLocations || []).find(item => String(item.locationId) === String(locationId));
  if (!location) return;

  document.getElementById('editingLocationId').value = location.locationId;
  document.getElementById('locationHall').value = location.hall || '';
  document.getElementById('locationMain').value = location.mainLocation || '';
  document.getElementById('locationSub').value = location.subLocation || '';
  document.getElementById('locationSortOrder').value = location.sortOrder || 0;
  document.getElementById('locationIsBookable').checked = Boolean(location.isBookable);
}

function saveLocationItem() {
  const btn = document.getElementById('saveLocationBtn');
  const errorBox = document.getElementById('locationModalError');
  const locationId = document.getElementById('editingLocationId').value;
  const location = {
    hall: document.getElementById('locationHall').value.trim(),
    mainLocation: document.getElementById('locationMain').value.trim(),
    subLocation: document.getElementById('locationSub').value.trim(),
    sortOrder: document.getElementById('locationSortOrder').value,
    isBookable: document.getElementById('locationIsBookable').checked
  };

  errorBox.textContent = '';
  if (!location.hall || !location.mainLocation) {
    errorBox.textContent = '?????????';
    return;
  }

  setButtonLoading(btn, true, '???...');
  const runner = google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      alert(res.message);
      resetLocationForm();
      loadLocationItems();
      loadAssetLocations();
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    });

  if (locationId) {
    runner.updateLocationItem({ currentUser, locationId, location });
  } else {
    runner.addLocationItem({ currentUser, location });
  }
}

function deleteLocationItem(encodedLocationId) {
  const locationId = decodeURIComponent(encodedLocationId);
  const location = (currentAssetLocations || []).find(item => String(item.locationId) === String(locationId));
  const errorBox = document.getElementById('locationModalError');
  if (!confirm(`????????${location ? formatLocationLabel(location) : locationId}??`)) return;

  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      resetLocationForm();
      loadLocationItems();
      loadAssetLocations();
    })
    .withFailureHandler(err => {
      errorBox.textContent = err.message || err;
    })
    .deleteLocationItem({ currentUser, locationId });
}

</script>
