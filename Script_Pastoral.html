<script>
let pastoralOptions = null;
let pastoralMembers = [];
let pastoralCurrentPage = 1;
let pastoralTotalCount = 0;
let pastoralCurrentTab = 'members';
let pastoralOpenDetails = [];
let pastoralActiveDetailId = null;
let pastoralMemberModalInstance = null;

function openPastoralSystem() {
  recordFeatureUsage('pastoral');
  const canEditPastoral = getFeatureAccess('pastoral') === 'edit' && currentUser.deviceType !== 'mobile';
  document.getElementById('mainTitle').textContent = '牧養管理系統';
  ['featureSelectionView', 'overviewView', 'purchaseView', 'assetView', 'formsView', 'detailView', 'systemView'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('d-none');
  });
  document.getElementById('pastoralView').classList.remove('d-none');
  document.getElementById('addPastoralMemberBtn').classList.toggle('d-none', !canEditPastoral);
  updatePastoralDetailActionButtons();
  switchPastoralTab('members');
  loadPastoralSystem();
}

function loadPastoralSystem() {
  setListLoading(['pastoralMemberTableBody', 'mobilePastoralMemberList', 'pastoralGroupTableBody'], true);
  google.script.run
    .withSuccessHandler(options => {
      pastoralOptions = options || { churches: [], categories: [], groups: [] };
      setupPastoralOptions();
      loadPastoralMembers();
      renderPastoralGroups();
    })
    .withFailureHandler(showError)
    .getPastoralOptions(currentUser);
}

function setupPastoralOptions() {
  fillObjectSelect('pastoralChurchFilter', pastoralOptions.churches || [], 'id', 'name', true);
  fillObjectSelect('pastoralCategoryFilter', pastoralOptions.categories || [], 'code', 'name', true);
  fillObjectSelect('pastoralGroupFilter', pastoralOptions.groups || [], 'groupId', 'path', true);
  fillObjectSelect('pastoralEditChurchId', pastoralOptions.churches || [], 'id', 'name', false);
  fillObjectSelect('pastoralEditCategoryCode', pastoralOptions.categories || [], 'code', 'name', true);
  fillObjectSelect('pastoralEditTitleId', pastoralOptions.titles || [], 'id', 'name', true);
  fillObjectSelect('pastoralEditProfessionId', pastoralOptions.professions || [], 'id', 'name', true);
  fillObjectSelect('pastoralEditMaritalStatusId', pastoralOptions.maritalStatuses || [], 'id', 'name', true);
  fillObjectSelect('pastoralEditGroupId', pastoralOptions.groups || [], 'groupId', 'path', true);
  fillObjectSelect('pastoralEditRegionId', pastoralOptions.regions || [], 'id', 'label', true);
  fillObjectSelect('pastoralEditFollowupStaffId', pastoralOptions.accounts || [], 'staffId', 'name', true);
}

function fillObjectSelect(id, items, valueKey, labelKey, includeAll) {
  const select = document.getElementById(id);
  if (!select) return;
  select.innerHTML = includeAll ? '<option value="">全部</option>' : '';
  items.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item[valueKey];
    opt.textContent = item[labelKey] || item.name || item[valueKey];
    select.appendChild(opt);
  });
}

function switchPastoralTab(tab) {
  pastoralCurrentTab = tab;
  document.getElementById('pastoralMembersPanel').classList.toggle('d-none', tab !== 'members');
  document.getElementById('pastoralGroupsPanel').classList.toggle('d-none', tab !== 'groups');
  document.getElementById('pastoralMembersTabBtn').classList.toggle('active', tab === 'members');
  document.getElementById('pastoralGroupsTabBtn').classList.toggle('active', tab === 'groups');
}

function loadPastoralMembers() {
  setListLoading(['pastoralMemberTableBody', 'mobilePastoralMemberList'], true);
  const filters = {
    keyword: document.getElementById('pastoralKeyword').value,
    churchId: document.getElementById('pastoralChurchFilter').value,
    category: document.getElementById('pastoralCategoryFilter').value,
    groupId: document.getElementById('pastoralGroupFilter').value,
    page: pastoralCurrentPage,
    pageSize
  };

  google.script.run
    .withSuccessHandler(result => {
      pastoralMembers = result.rows || [];
      pastoralTotalCount = result.total || 0;
      renderPastoralMembers();
    })
    .withFailureHandler(showError)
    .getPastoralMembers(filters, currentUser);
}

function renderPastoralMembers() {
  renderPastoralMemberTable();
  renderPastoralMemberCards();
  renderPastoralPager();
}

function renderPastoralMemberTable() {
  const body = document.getElementById('pastoralMemberTableBody');
  body.innerHTML = '';
  pastoralMembers.forEach(member => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><button type="button" class="btn btn-sm btn-outline-secondary rounded-circle" title="查看" onclick="openPastoralMember('${escapeAttr(member.memberId)}')">○</button></td>
      <td>${escapeHtml(member.churchName)}</td>
      <td>${escapeHtml(member.createdDate)}</td>
      <td>${escapeHtml(member.followupName || '暫無分配')}</td>
      <td><span class="pastoral-light ${getPastoralLightClass(member.lightStatus)}">${escapeHtml(member.lightStatus)}</span></td>
      <td>${escapeHtml(member.categoryName)}</td>
      <td><button type="button" class="project-link" onclick="openPastoralMember('${escapeAttr(member.memberId)}')">${escapeHtml(member.name)}</button></td>
      <td>${escapeHtml(member.faithStatus)}</td>
      <td>${escapeHtml(member.maritalStatusName)}</td>
      <td>${escapeHtml(member.birthday)}</td>
      <td>${escapeHtml(member.mobilePhone)}</td>
      <td>${escapeHtml(member.address)}</td>
      <td>${escapeHtml(member.communityText)}</td>
    `;
    body.appendChild(tr);
  });
}

function renderPastoralMemberCards() {
  const container = document.getElementById('mobilePastoralMemberList');
  container.innerHTML = '';
  pastoralMembers.forEach(member => {
    const card = document.createElement('div');
    card.className = 'project-card-mobile';
    card.innerHTML = `
      <h6><button type="button" class="project-link" onclick="openPastoralMember('${escapeAttr(member.memberId)}')">${escapeHtml(member.name)}</button></h6>
      <div class="project-meta">${escapeHtml(member.churchName)} / ${escapeHtml(member.categoryName)} / ${escapeHtml(member.faithStatus)}</div>
      <div class="project-meta">${escapeHtml(member.communityText)}</div>
      <div class="project-meta">${escapeHtml(member.mobilePhone || '無電話')} <span class="pastoral-light ${getPastoralLightClass(member.lightStatus)}">${escapeHtml(member.lightStatus)}</span></div>
    `;
    container.appendChild(card);
  });
}

function renderPastoralPager() {
  const totalPages = Math.max(1, Math.ceil(pastoralTotalCount / pageSize));
  document.getElementById('pastoralPager').textContent = `${pastoralCurrentPage} / ${totalPages}`;
  document.getElementById('pastoralPageInfo').textContent = `共 ${pastoralTotalCount} 筆`;
}

function prevPastoralPage() {
  if (pastoralCurrentPage <= 1) return;
  pastoralCurrentPage -= 1;
  loadPastoralMembers();
}

function nextPastoralPage() {
  const totalPages = Math.max(1, Math.ceil(pastoralTotalCount / pageSize));
  if (pastoralCurrentPage >= totalPages) return;
  pastoralCurrentPage += 1;
  loadPastoralMembers();
}

function resetPastoralPageAndLoad() {
  pastoralCurrentPage = 1;
  loadPastoralMembers();
}

function handlePastoralSearchKey(event) {
  if (event.key === 'Enter') resetPastoralPageAndLoad();
}

function renderPastoralGroups() {
  if (!pastoralOptions) return;
  setListLoading('pastoralGroupTableBody', true);
  const body = document.getElementById('pastoralGroupTableBody');
  body.innerHTML = '';
  (pastoralOptions.groups || []).forEach(group => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="padding-left:${Math.min(Number(group.levelNo || 0) * 16, 72)}px">${escapeHtml(group.path || group.name)}</td>
      <td>${escapeHtml(group.groupType)}</td>
      <td>${escapeHtml(group.churchName)}</td>
      <td>${escapeHtml(group.memberCount)}</td>
    `;
    body.appendChild(tr);
  });
}

function openPastoralMember(memberId) {
  setListLoading('pastoralCareRecords', true, '會友資料載入中...');
  google.script.run
    .withSuccessHandler(renderPastoralMemberDetail)
    .withFailureHandler(showError)
    .getPastoralMemberDetail(memberId, currentUser);
}

function renderPastoralMemberDetail(data) {
  const member = data.member || {};
  const existingIndex = pastoralOpenDetails.findIndex(item => String(item.member.memberId) === String(member.memberId));
  if (existingIndex >= 0) pastoralOpenDetails.splice(existingIndex, 1);
  pastoralOpenDetails.unshift(data);
  pastoralOpenDetails = pastoralOpenDetails.slice(0, 6);
  pastoralActiveDetailId = member.memberId;
  renderPastoralDetailTabs();
  renderActivePastoralDetail();
  document.getElementById('pastoralDetailPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderPastoralDetailTabs() {
  const tabs = document.getElementById('pastoralDetailTabs');
  tabs.innerHTML = '';
  pastoralOpenDetails.forEach(item => {
    const member = item.member || {};
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `
      <button type="button" class="nav-link ${String(member.memberId) === String(pastoralActiveDetailId) ? 'active' : ''}" onclick="activatePastoralDetail('${escapeAttr(member.memberId)}')">
        ${escapeHtml(member.name)}
        <span class="ms-2 text-muted" onclick="event.stopPropagation(); closePastoralDetail('${escapeAttr(member.memberId)}')">×</span>
      </button>
    `;
    tabs.appendChild(li);
  });
}

function renderActivePastoralDetail() {
  const data = pastoralOpenDetails.find(item => String(item.member?.memberId) === String(pastoralActiveDetailId));
  if (!data) {
    closePastoralDetailPanel();
    return;
  }
  const member = data.member || {};
  document.getElementById('pastoralDetailPanel').classList.remove('d-none');
  updatePastoralDetailActionButtons();

  renderDefinitionList('pastoralBasicInfo', [
    ['會堂', member.churchName],
    ['分類', member.categoryName],
    ['職分', member.titleName],
    ['性別', member.gender],
    ['生日', member.birthday],
    ['職業', [member.professionName, member.professionNote].filter(Boolean).join(' / ')],
    ['婚姻', [member.maritalStatusName, member.maritalNote].filter(Boolean).join(' / ')],
    ['牧區', member.groupPath],
    ['來源', member.sourceText]
  ]);

  renderDefinitionList('pastoralContactInfo', [
    ['手機', member.mobilePhone],
    ['住家', member.homePhone],
    ['公司', member.officePhone],
    ['Email', member.email],
    ['地址', member.address],
    ['聯絡時間', member.preferredContactTime],
    ['介紹人', [member.referrerName, member.referrerPhone].filter(Boolean).join(' / ')],
    ['Line綁定', member.lineBound ? '已綁定' : '未綁定']
  ]);

  renderDefinitionList('pastoralFaithInfo', [
    ['基督徒', member.isChristian],
    ['原教會', member.previousChurchText],
    ['願意加入教會', member.willingJoinChurch],
    ['願意聯絡', member.willingContact],
    ['接受基督', member.acceptedChrist],
    ['願意小家', member.willingContinueGroup],
    ['願意受洗', member.willingBaptism],
    ['受洗日期', member.baptizedDate],
    ['配偶', member.spouseText],
    ['父親', member.fatherText],
    ['母親', member.motherText],
    ['子女', member.childrenText]
  ]);

  renderPastoralCareRecords(data.careRecords || []);
}

function updatePastoralDetailActionButtons() {
  const canEditPastoral = currentUser && getFeatureAccess('pastoral') === 'edit' && currentUser.deviceType !== 'mobile' && pastoralActiveDetailId;
  const editBtn = document.getElementById('editPastoralMemberBtn');
  const deleteBtn = document.getElementById('deletePastoralMemberBtn');
  if (editBtn) editBtn.classList.toggle('d-none', !canEditPastoral);
  if (deleteBtn) deleteBtn.classList.toggle('d-none', !canEditPastoral);
}

function openPastoralMemberEditor(data = null) {
  if (!pastoralOptions) {
    alert('牧養選項尚未載入完成');
    return;
  }
  const member = data?.member || {};
  document.getElementById('pastoralMemberModalTitle').textContent = member.memberId ? '編輯會友' : '新增會友';
  document.getElementById('pastoralMemberModalError').textContent = '';
  setPastoralFieldValues(member);
  pastoralMemberModalInstance = bootstrap.Modal.getOrCreateInstance(document.getElementById('pastoralMemberModal'));
  pastoralMemberModalInstance.show();
}

function editActivePastoralMember() {
  const data = pastoralOpenDetails.find(item => String(item.member?.memberId) === String(pastoralActiveDetailId));
  if (!data) return;
  openPastoralMemberEditor(data);
}

function setPastoralFieldValues(member) {
  const today = new Date().toISOString().slice(0, 10);
  setFieldValue('pastoralEditMemberId', member.memberId || '');
  setFieldValue('pastoralEditChurchId', member.churchId || '');
  setFieldValue('pastoralEditName', member.name || '');
  setFieldValue('pastoralEditGender', member.genderValue ?? genderTextToValue(member.gender));
  setFieldValue('pastoralEditBirthday', member.birthday || '');
  setFieldValue('pastoralEditLightStatus', member.lightStatusValue ?? lightTextToValue(member.lightStatus));
  setFieldValue('pastoralEditCategoryCode', member.categoryCode || '');
  setFieldValue('pastoralEditTitleId', member.titleId || '');
  setFieldValue('pastoralEditProfessionId', member.professionId || '');
  setFieldValue('pastoralEditProfessionNote', member.professionNote || '');
  setFieldValue('pastoralEditMaritalStatusId', member.maritalStatusId || '');
  setFieldValue('pastoralEditFollowupStaffId', member.followupStaffId || '');
  setFieldValue('pastoralEditGroupId', member.groupId || '');
  setFieldValue('pastoralEditCreatedDate', member.createdDate || today);
  setFieldValue('pastoralEditMobilePhone', member.mobilePhone || '');
  setFieldValue('pastoralEditHomePhone', member.homePhone || '');
  setFieldValue('pastoralEditOfficePhone', member.officePhone || '');
  setFieldValue('pastoralEditEmail', member.email || '');
  setFieldValue('pastoralEditRegionId', member.regionId || '');
  setFieldValue('pastoralEditCity', member.city || '');
  setFieldValue('pastoralEditDistrict', member.district || '');
  setFieldValue('pastoralEditPostalCode', member.postalCode || '');
  setFieldValue('pastoralEditAddressLine', member.addressLine || '');
  setFieldValue('pastoralEditIsChristian', booleanTextToValue(member.isChristian));
  setFieldValue('pastoralEditAcceptedChrist', booleanTextToValue(member.acceptedChrist));
  setFieldValue('pastoralEditWillingBaptism', booleanTextToValue(member.willingBaptism));
  setFieldValue('pastoralEditBaptizedDate', member.baptizedDate || '');
  setFieldValue('pastoralEditPreviousChurchText', member.previousChurchText || '');
  setFieldValue('pastoralEditSourceText', member.sourceText || '');
  setFieldValue('pastoralEditSpouseText', member.spouseText || '');
  setFieldValue('pastoralEditFatherText', member.fatherText || '');
  setFieldValue('pastoralEditMotherText', member.motherText || '');
  setFieldValue('pastoralEditChildrenText', member.childrenText || '');
  setFieldValue('pastoralEditNote', member.note || '');
}

function setFieldValue(id, value) {
  const el = document.getElementById(id);
  if (el) el.value = value == null ? '' : value;
}

function getFieldValue(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function submitPastoralMember() {
  const errorBox = document.getElementById('pastoralMemberModalError');
  const btn = document.getElementById('savePastoralMemberBtn');
  errorBox.textContent = '';
  const memberId = getFieldValue('pastoralEditMemberId');
  const name = getFieldValue('pastoralEditName');
  const churchId = getFieldValue('pastoralEditChurchId');
  if (!churchId) {
    errorBox.textContent = '請選擇會堂';
    return;
  }
  if (!name) {
    errorBox.textContent = '請填寫姓名';
    return;
  }

  const payload = {
    memberId,
    currentUser,
    member: {
      base: {
        churchId,
        name,
        gender: getFieldValue('pastoralEditGender'),
        birthday: getFieldValue('pastoralEditBirthday'),
        categoryCode: getFieldValue('pastoralEditCategoryCode'),
        titleId: getFieldValue('pastoralEditTitleId'),
        professionId: getFieldValue('pastoralEditProfessionId'),
        professionNote: getFieldValue('pastoralEditProfessionNote'),
        maritalStatusId: getFieldValue('pastoralEditMaritalStatusId'),
        followupStaffId: getFieldValue('pastoralEditFollowupStaffId'),
        lightStatus: getFieldValue('pastoralEditLightStatus'),
        createdDate: getFieldValue('pastoralEditCreatedDate'),
        baptizedDate: getFieldValue('pastoralEditBaptizedDate'),
        sourceText: getFieldValue('pastoralEditSourceText'),
        note: getFieldValue('pastoralEditNote')
      },
      contact: {
        mobilePhone: getFieldValue('pastoralEditMobilePhone'),
        homePhone: getFieldValue('pastoralEditHomePhone'),
        officePhone: getFieldValue('pastoralEditOfficePhone'),
        email: getFieldValue('pastoralEditEmail')
      },
      address: {
        regionId: getFieldValue('pastoralEditRegionId'),
        city: getFieldValue('pastoralEditCity'),
        district: getFieldValue('pastoralEditDistrict'),
        postalCode: getFieldValue('pastoralEditPostalCode'),
        addressLine: getFieldValue('pastoralEditAddressLine')
      },
      faith: {
        isChristian: getFieldValue('pastoralEditIsChristian'),
        acceptedChrist: getFieldValue('pastoralEditAcceptedChrist'),
        willingBaptism: getFieldValue('pastoralEditWillingBaptism'),
        previousChurchText: getFieldValue('pastoralEditPreviousChurchText')
      },
      family: {
        spouseText: getFieldValue('pastoralEditSpouseText'),
        fatherText: getFieldValue('pastoralEditFatherText'),
        motherText: getFieldValue('pastoralEditMotherText'),
        childrenText: getFieldValue('pastoralEditChildrenText')
      },
      groupId: getFieldValue('pastoralEditGroupId')
    }
  };

  setButtonLoading(btn, true, '儲存中...');
  google.script.run
    .withSuccessHandler(res => {
      setButtonLoading(btn, false);
      if (pastoralMemberModalInstance) pastoralMemberModalInstance.hide();
      alert(res.message);
      pastoralCurrentPage = 1;
      loadPastoralMembers();
      if (res.memberId) openPastoralMember(res.memberId);
    })
    .withFailureHandler(err => {
      setButtonLoading(btn, false);
      errorBox.textContent = err.message || err;
    })
    .savePastoralMember(payload);
}

function deleteActivePastoralMember() {
  const data = pastoralOpenDetails.find(item => String(item.member?.memberId) === String(pastoralActiveDetailId));
  const member = data?.member || {};
  if (!member.memberId) return;
  if (!confirm(`確定要停用「${member.name}」的會友資料？`)) return;
  google.script.run
    .withSuccessHandler(res => {
      alert(res.message);
      closePastoralDetail(member.memberId);
      loadPastoralMembers();
    })
    .withFailureHandler(showError)
    .deletePastoralMember({ memberId: member.memberId, currentUser });
}

function genderTextToValue(text) {
  if (text === '男') return '1';
  if (text === '女') return '0';
  return text || '';
}

function lightTextToValue(text) {
  if (text === '灰燈') return '0';
  if (text === '綠燈') return '1';
  if (text === '黃燈') return '2';
  if (text === '紅燈') return '3';
  return text || '';
}

function booleanTextToValue(text) {
  if (text === '是') return 'true';
  if (text === '否') return 'false';
  return text || '';
}

function activatePastoralDetail(memberId) {
  pastoralActiveDetailId = memberId;
  renderPastoralDetailTabs();
  renderActivePastoralDetail();
}

function renderDefinitionList(id, rows) {
  const dl = document.getElementById(id);
  dl.innerHTML = '';
  rows.forEach(([label, value]) => {
    const dt = document.createElement('dt');
    dt.textContent = label;
    const dd = document.createElement('dd');
    dd.textContent = value || '-';
    dl.appendChild(dt);
    dl.appendChild(dd);
  });
}

function renderPastoralCareRecords(records) {
  const container = document.getElementById('pastoralCareRecords');
  container.innerHTML = '';
  if (!records.length) {
    container.innerHTML = '<div class="text-muted">尚無關懷紀錄</div>';
    return;
  }
  records.forEach(record => {
    const item = document.createElement('div');
    item.className = 'pastoral-care-item';
    item.innerHTML = `
      <div class="pastoral-care-meta">${escapeHtml(formatPastoralDateTime(record.careAt))} ${escapeHtml(record.staffName || '')}</div>
      <div>${escapeHtml(record.content)}</div>
    `;
    container.appendChild(item);
  });
}

function closePastoralDetail(memberId) {
  pastoralOpenDetails = pastoralOpenDetails.filter(item => String(item.member?.memberId) !== String(memberId));
  if (String(pastoralActiveDetailId) === String(memberId)) {
    pastoralActiveDetailId = pastoralOpenDetails[0]?.member?.memberId || null;
  }
  renderPastoralDetailTabs();
  renderActivePastoralDetail();
}

function closePastoralDetailPanel() {
  pastoralOpenDetails = [];
  pastoralActiveDetailId = null;
  document.getElementById('pastoralDetailPanel').classList.add('d-none');
  updatePastoralDetailActionButtons();
}

function getPastoralLightClass(status) {
  if (status === '綠燈') return 'is-green';
  if (status === '黃燈') return 'is-yellow';
  if (status === '紅燈') return 'is-red';
  return 'is-gray';
}

function formatPastoralDateTime(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('zh-TW', { hour12: false });
}
</script>
